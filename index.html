<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PPDS IKA UNS - Tryout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--s:#1e293b;--s2:#263248;--b:#334155;--t:#e2e8f0;--m:#94a3b8;--p:#7c3aed;--a:#2563eb;--ok:#16a34a;--err:#dc2626;--w:#d97706}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
#root{max-width:780px;margin:0 auto;padding:16px}
/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--m)}
.spinner{width:40px;height:40px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* HOME */
.home-wrap{padding:32px 0}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:1.8em;font-weight:800;background:linear-gradient(135deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:var(--m);font-size:.9em;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px;text-align:center}
.stat .n{font-size:1.6em;font-weight:800;color:var(--p)}
.stat .l{font-size:.7em;color:var(--m);margin-top:2px}
.section-title{font-size:.75em;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.topic-wrap{margin-bottom:20px}
.topic-scroll{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;font-size:.78em;font-weight:600;cursor:pointer;border:1px solid var(--b);background:var(--s);color:var(--m);transition:.15s}
.chip.active{background:var(--p);border-color:var(--p);color:#fff}
.qty-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.qty-btn{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:.15s}
.qty-btn:hover{border-color:var(--p)}
.qty-btn .n{font-size:1.5em;font-weight:800;color:var(--p)}
.qty-btn .l{font-size:.7em;color:var(--m);margin-top:2px}
.btn-all{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;font-weight:700;font-size:.95em;cursor:pointer;margin-bottom:8px}
/* QUIZ */
.quiz-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;position:sticky;top:0;background:var(--bg);z-index:10;padding:10px 0}
.back{background:var(--s);border:1px solid var(--b);color:var(--m);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.82em;font-weight:600;white-space:nowrap}
.bar-wrap{flex:1;height:6px;background:var(--s);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--a));border-radius:3px;transition:width .3s}
.counter{font-size:.82em;color:var(--m);font-weight:600;white-space:nowrap}
.topic-badge{display:inline-block;background:#1e1b4b;color:#a5b4fc;font-size:.72em;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.q-box{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:18px;margin-bottom:14px;font-size:.95em;line-height:1.65}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.opt{padding:12px 14px;border-radius:10px;border:2px solid var(--b);background:var(--s);color:var(--t);cursor:pointer;text-align:left;font-size:.88em;line-height:1.4;display:flex;align-items:flex-start;gap:10px;transition:.15s}
.opt:hover:not(:disabled){border-color:var(--p);background:var(--s2)}
.opt .ltr{min-width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78em;background:var(--bg);color:var(--m);flex-shrink:0}
.opt.sel .ltr{background:var(--p);color:#fff}
.opt.ok{border-color:var(--ok);background:#052e16;color:#86efac}
.opt.ok .ltr{background:var(--ok);color:#fff}
.opt.ng{border-color:var(--err);background:#450a0a;color:#fca5a5}
.opt.ng .ltr{background:var(--err);color:#fff}
.opt.show-ok{border-color:var(--ok);background:#052e16;color:#86efac}
.exp{background:var(--s);border-left:3px solid var(--p);border-radius:8px;padding:12px 14px;font-size:.83em;line-height:1.6;color:#cbd5e1;margin-bottom:12px;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.nav{display:flex;gap:8px}
.btn-prev{flex:1;padding:12px;border-radius:10px;background:var(--s);border:1px solid var(--b);color:var(--t);cursor:pointer;font-weight:600;font-size:.88em}
.btn-next{flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;cursor:pointer;font-weight:700;font-size:.88em}
.dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:14px;justify-content:center}
.dot{height:8px;border-radius:4px;cursor:pointer;transition:all .2s;opacity:.35;background:var(--b)}
.dot.cur{width:20px;opacity:1;background:var(--p)}
.dot.ans-ok{width:8px;opacity:1;background:var(--ok)}
.dot.ans-ng{width:8px;opacity:1;background:var(--err)}
.dot.ans-sel{width:8px;opacity:1;background:var(--p)}
/* RESULT */
.result-wrap{padding:28px 0}
.score-card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:28px;text-align:center;margin-bottom:20px}
.score-ring{width:100px;height:100px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:1.6em;font-weight:800;border:4px solid}
.review-list{background:var(--s);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:20px}
.rev-item{padding:10px 0;border-bottom:1px solid var(--b);font-size:.85em}
.rev-item:last-child{border-bottom:none}
.rev-q{color:var(--t);line-height:1.5;margin-bottom:6px}
.rev-ans{display:flex;flex-wrap:wrap;gap:6px;font-size:.82em}
.rev-ok{color:#86efac;background:#052e16;padding:3px 10px;border-radius:6px}
.rev-ng{color:#fca5a5;background:#450a0a;padding:3px 10px;border-radius:6px}
.rev-exp{color:var(--m);margin-top:6px;line-height:1.5}
.result-btns{display:flex;gap:10px}
.btn-home{flex:1;padding:13px;border-radius:10px;background:var(--s);border:1px solid var(--b);color:var(--t);cursor:pointer;font-weight:600}
.btn-retry{flex:1;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;cursor:pointer;font-weight:700}
</style>
</head>

// Decompress
async function loadData(){
  const bin=atob(B64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');
  const writer=ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const reader=ds.readable.getReader();
  const chunks=[];
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((a,c)=>a+c.length,0);
  const result=new Uint8Array(total);
  let pos=0; for(const c of chunks){result.set(c,pos);pos+=c.length;}
  return JSON.parse(new TextDecoder().decode(result));
}

let BANK=[];
let state={screen:'home',qs:[],cur:0,ans:{},topic:'Semua'};

// ── UTILS ─────────────────────────────────
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}
  return r;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pool(){return state.topic==='Semua'?BANK:BANK.filter(q=>q.topic===state.topic);}

function startQuiz(n){
  const p=pool();
  const qs=n==='all'?[...p]:shuffle(p).slice(0,Math.min(n,p.length));
  state={...state,screen:'quiz',qs,cur:0,ans:{}};
  render();
}

// ── RENDER HOME ───────────────────────────
function renderHome(){
  const p=pool();
  const tpcChips=TOPICS.map(t=>`
    <span class="chip${state.topic===t?' active':''}" onclick="setTopic('${esc(t)}')">${esc(t)}${t!=='Semua'?` <small>(${BANK.filter(q=>q.topic===t).length})</small>`:''}</span>
  `).join('');
  const qtys=[10,25,50].map(n=>`
    <div class="qty-btn" onclick="startQuiz(${n})">
      <div class="n">${n}</div>
      <div class="l">soal</div>
    </div>
  `).join('');
  return`<div class="home-wrap">
  <div class="logo">
    <div style="font-size:2.5em;margin-bottom:6px">🩺</div>
    <h1>PPDS IKA UNS</h1>
    <p>Bank Soal Tryout Ilmu Kesehatan Anak</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="n">${BANK.length}</div><div class="l">Total Soal</div></div>
    <div class="stat"><div class="n">${TOPICS.length-1}</div><div class="l">Topik</div></div>
    <div class="stat"><div class="n">${p.length}</div><div class="l">Filter Aktif</div></div>
  </div>
  <div class="topic-wrap">
    <div class="section-title">Filter Topik</div>
    <div class="topic-scroll">${tpcChips}</div>
  </div>
  <div class="section-title">Pilih Jumlah Soal</div>
  <div class="qty-grid">${qtys}</div>
  <button class="btn-all" onclick="startQuiz('all')">Semua ${p.length} Soal</button>
</div>`;
}

// ── RENDER QUIZ ───────────────────────────
function renderQuiz(){
  const q=state.qs[state.cur];
  const pct=((state.cur+1)/state.qs.length*100).toFixed(1);
  const ans=state.ans[state.cur];
  const answered=ans!==undefined;

  const opts=q.options.map((o,i)=>{
    let cls='opt';
    if(answered){
      if(i===q.answer) cls+=' ok';
      else if(i===ans) cls+=' ng';
    } else if(ans===i) cls+=' sel';
    return`<button class="${cls}" ${answered?'disabled':''} onclick="doAnswer(${i})">
      <span class="ltr">${String.fromCharCode(65+i)}</span>
      <span>${esc(o)}</span>
      ${answered&&i===q.answer?'<span style="margin-left:auto">✓</span>':''}
      ${answered&&i===ans&&i!==q.answer?'<span style="margin-left:auto">✗</span>':''}
    </button>`;
  }).join('');

  const expHtml=answered?`<div class="exp">💡 ${esc(q.e)}</div>`:'';
  const isLast=state.cur===state.qs.length-1;

  const dots=state.qs.map((_,i)=>{
    const a=state.ans[i];
    let cls='dot';
    if(i===state.cur) cls+=' cur';
    else if(a!==undefined) cls+=a===state.qs[i].answer?' ans-ok':' ans-ng';
    return`<div class="${cls}" onclick="gotoQ(${i})"></div>`;
  }).join('');

  return`<div>
  <div class="quiz-top">
    <button class="back" onclick="goHome()">← Keluar</button>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
    <span class="counter">${state.cur+1}/${state.qs.length}</span>
  </div>
  <div class="topic-badge">${esc(q.topic)}</div>
  <div class="q-box">${esc(q.q)}</div>
  <div class="opts">${opts}</div>
  ${expHtml}
  <div class="nav">
    ${state.cur>0?`<button class="btn-prev" onclick="goPrev()">← Prev</button>`:''}
    ${answered?`<button class="btn-next" onclick="${isLast?'goResult()':'goNext()}">${isLast?'Lihat Hasil ':'Selanjutnya →'}</button>`:''}
  </div>
  <div class="dots">${dots}</div>
</div>`;
}

// ── RENDER RESULT ─────────────────────────
function renderResult(){
  const total=state.qs.length;
  const correct=state.qs.filter((q,i)=>state.ans[i]===q.answer).length;
  const pct=Math.round(correct/total*100);
  const sc=pct>=80?{bg:'#052e16',brd:'#16a34a',col:'#86efac'}:
           pct>=60?{bg:'#1c1917',brd:'#ca8a04',col:'#fde68a'}:
                   {bg:'#450a0a',brd:'#dc2626',col:'#fca5a5'};

  const reviews=state.qs.map((q,i)=>{
    const ok=state.ans[i]===q.answer;
    const ua=state.ans[i];
    return`<div class="rev-item">
      <div class="rev-q">${ok?'✅':'❌'} ${esc(q.q.substring(0,100))}${q.q.length>100?'...':''}</div>
      <div class="rev-ans">
        <span class="rev-ok">✓ ${esc(q.options[q.answer])}</span>
        ${ua!==undefined&&!ok?`<span class="rev-ng">✗ ${esc(q.options[ua])}</span>`:''}
      </div>
      ${!ok&&q.e?`<div class="rev-exp">💡 ${esc(q.e)}</div>`:''}
    </div>`;
  }).join('');

  return`<div class="result-wrap">
  <div class="score-card">
    <div class="score-ring" style="background:${sc.bg};border-color:${sc.brd};color:${sc.col}">${pct}%</div>
    <div style="font-size:1.2em;font-weight:700;color:${sc.col};margin-bottom:6px">${pct>=80?'Luar Biasa! 🏆':pct>=60?'Bagus! Terus Semangat 💪':'Tetap Semangat! 📚'}</div>
    <div style="color:var(--m);font-size:.9em">Benar: ${correct}/${total} soal (${pct}%)</div>
  </div>
  <div class="review-list">
    <div class="section-title" style="margin-bottom:12px">Review Jawaban</div>
    ${reviews}
  </div>
  <div class="result-btns">
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
    <button class="btn-retry" onclick="startQuiz(state.qs.length)">🔄 Ulangi</button>
  </div>
</div>`;
}

// ── ACTIONS ───────────────────────────────
function setTopic(t){state.topic=t;render();}
function doAnswer(i){if(state.ans[state.cur]!==undefined)return;state.ans[state.cur]=i;render();}
function goNext(){if(state.cur<state.qs.length-1){state.cur++;render();}}
function goPrev(){if(state.cur>0){state.cur--;render();}}
function gotoQ(i){state.cur=i;render();}
function goResult(){state.screen='result';render();}
function goHome(){state.screen='home';render();}

// ── RENDER ────────────────────────────────
function render(){
  const r=document.getElementById('root');
  if(state.screen==='home') r.innerHTML=renderHome();
  else if(state.screen==='quiz') r.innerHTML=renderQuiz();
  else r.innerHTML=renderResult();
  window.scrollTo(0,0);
}

// ── INIT ──────────────────────────────────
loadData().then(data=>{
  BANK=data;
  document.getElementById('loading').style.display='none';
  document.getElementById('root').style.display='block';
  render();
}).catch(err=>{
  document.getElementById('loading').innerHTML=`<div style="color:#fca5a5;text-align:center;padding:40px">
    <div style="font-size:2em;margin-bottom:12px">⚠️</div>
    <div>Gagal memuat data. Coba refresh halaman.</div>
    <div style="font-size:.8em;margin-top:8px;color:#64748b">${err.message}</div>
  </div>`;
});
</script>
