<!DOCTYPE html>

<head>

<title>PPDS IKA UNS - Tryout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:16px}
/* HOME */
.home{text-align:center;padding:40px 16px}
.home h1{font-size:2em;font-weight:800;background:linear-gradient(135deg,#7c3aed,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.home p{color:#94a3b8;margin-bottom:32px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-box{background:#1e293b;border-radius:12px;padding:16px;border:1px solid #334155}
.stat-box .num{font-size:1.8em;font-weight:800;color:#7c3aed}
.stat-box .lbl{font-size:0.75em;color:#64748b;margin-top:4px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.mode-card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;cursor:pointer;text-align:left;transition:all .2s}
.mode-card:hover{border-color:#7c3aed;background:#1e293b}
.mode-card h3{font-size:1em;font-weight:700;margin-bottom:4px}
.mode-card p{font-size:0.8em;color:#64748b}
.topic-select{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:10px 12px;width:100%;margin-bottom:12px;font-size:0.9em}
.btn-start{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:1em;font-weight:700;cursor:pointer}
/* QUIZ */
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.85em}
.progress-bar{flex:1;height:8px;background:#1e293b;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .3s}
.timer{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;font-size:0.85em;color:#94a3b8}
.q-num{font-size:0.8em;color:#64748b;margin-bottom:8px}
.q-topic{display:inline-block;background:#312e81;color:#a5b4fc;font-size:0.75em;padding:3px 10px;border-radius:20px;margin-bottom:12px}
.q-text{font-size:1em;line-height:1.6;margin-bottom:20px;color:#e2e8f0}
.opt-btn{width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;border-radius:10px;border:2px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:0.9em;line-height:1.4;transition:all .15s}
.opt-btn:hover:not(:disabled){border-color:#7c3aed;background:#1e1b3a}
.opt-btn.correct{border-color:#16a34a;background:#14532d;color:#bbf7d0}
.opt-btn.wrong{border-color:#dc2626;background:#450a0a;color:#fca5a5}
.opt-btn.reveal{border-color:#16a34a;background:#052e16;color:#86efac}
.explanation{background:#1e293b;border-left:3px solid #7c3aed;border-radius:8px;padding:14px;margin-top:12px;font-size:0.85em;line-height:1.6;color:#cbd5e1}
.nav-row{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:0.9em;font-weight:600;cursor:pointer}
.btn-next{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff}
.btn-prev{background:#1e293b;border:1px solid #334155;color:#e2e8f0}
/* RESULT */
.result{padding:20px 0}
.score-box{background:#1e293b;border-radius:16px;padding:32px;text-align:center;margin-bottom:24px;border:1px solid #334155}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2em;font-weight:800;border:4px solid}
.score-lbl{color:#94a3b8;font-size:0.9em;margin-bottom:8px}
.review-item{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #334155}
.review-item.wrong{border-color:#7f1d1d}
.review-q{font-size:0.9em;line-height:1.5;margin-bottom:8px}
.review-ans{font-size:0.8em;padding:4px 10px;border-radius:6px;display:inline-block;margin:2px}
.ans-correct{background:#14532d;color:#86efac}
.ans-wrong{background:#450a0a;color:#fca5a5}
.review-exp{font-size:0.8em;color:#94a3b8;margin-top:8px;padding-top:8px;border-top:1px solid #334155;line-height:1.5}
.result-btns{display:flex;gap:10px}
.btn-home{flex:1;padding:14px;border-radius:10px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-weight:600;cursor:pointer}
.btn-retry{flex:1;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-weight:700;cursor:pointer}
</style>

<script>
const BANK_SOAL=[{"id":"m1_1","q":"Seorang anak perempuan 13 tahun dibawa ke poliklinik oleh orang tuanya dengan keluhan anak makin kurus dan mudah lelah. Dalam 2 bulan terakhir BB menurun dari 36 kg menjadi 34 kg. Orang tua melaporkan bahwa anak makan cukup banyak. Gejala lain adalah anak sering haus dan sering kencing. Pemeriksaan laboratorium menunjukkan GDS 325 mg/dl, ketonuri +2. Saat itu anak belum mendapatkan terapi dan datang kembali keesokan harinya dalam keadaan tidak sadar. GDS: 550 mg/dl. Bagaimana penanganan awal pada pasien ini jika anda bertugas sebagai dokter jaga di UGD?","options":["Segera kirim ke Intensive Care Unit","Insulin basal bolus merupakan pilihan terbaik pada saat ini","Berikan insulin rapid 0.1 mg/kg sesegera mungkin","Berikan cairan kristaloid sesuai derajat dehidrasi","Berikan insulin dan cairan sesegera mungkin"],"answer":3,"topic":"Endokrinologi","explanation":"Pada ketoasidosis diabetikum (KAD), penanganan awal di UGD adalah resusitasi cairan dengan kristaloid (NaCl 0,9% atau RL) sesuai derajat dehidrasi."},{"id":"m1_2","q":"Seorang anak perempuan usia 12 tahun yang sebelumnya sehat datang dengan keluhan mual dan muntah selama 12 jam terakhir, pada muntahan terakhir didapatkan bercak darah berwarna merah terang. Penjelasan paling mungkin dari asal bercak darah ini adalah:","options":["Varices esophagus","Gastritis","Defisiensi Vit K","Robekan Mallory Weiss","Ulkus peptikum"],"answer":3,"topic":"Gastroenterologi","explanation":"Robekan Mallory-Weiss terjadi akibat muntah berulang yang menyebabkan robekan mukosa di persambungan gastroesofageal. Bercak darah merah terang pada muntahan setelah episode muntah berulang khas untuk kondisi ini."},{"id":"m1_3","q":"Sesuai dengan Tetralogy of Fallot, yang benar adalah:","options":["Split bunyi jantung II","Foto toraks: vaskularisasi paru bertambah","Sebagian besar meninggal pada usia < 3 tahun bila tidak dioperasi","Sianosis central"],"answer":3,"topic":"Kardiologi","explanation":"Tetralogy of Fallot (ToF) ditandai dengan sianosis sentral akibat pirau kanan ke kiri. Komponen ToF: VSD, overriding aorta, stenosis pulmonal, dan hipertrofi ventrikel kanan."},{"id":"m1_4","q":"Bayi lahir dari Ibu G2P1Ao 30 minggu hamil. Sudah ada tanda persalinan. Keadaan ibu tekanan darah 130/90 mmHg, edema pada kaki sedikit, protein uria positip 1. Denyut jantung janin masih bagus. Advis terapi yang dianjurkan adalah:","options":["Tidur miring ke kanan","Tidur miring ke kiri","Pemberian terapi anti tokolitik","Pemberian antenatal steroid","Pemberian antibiotika profilaksis"],"answer":3,"topic":"Neonatologi","explanation":"Pada ancaman persalinan prematur dengan usia gestasi 30 minggu, pemberian antenatal steroid (deksametason/betametason) sangat penting untuk memacu pematangan paru janin dan menurunkan risiko Respiratory Distress Syndrome..."},{"id":"m1_5","q":"Seorang bayi berusia 4 bulan datang dengan keluhan batuk selama >2 minggu, batuk tidak terputus-putus, disertai bunyi tarikan napas di awal batuk, demam (+). Bayi belum pernah mendapatkan imunisasi. Apakah diagnosis pasien tersebut?","options":["Pneumonia","Bronkiolitis","Pertusis","Difteri","Batuk Kronik Berulang"],"answer":2,"topic":"Infeksi","explanation":"Pertusis ditandai batuk paroksismal >2 minggu dengan inspiratory whoop, pada bayi yang belum diimunisasi. Batuk panjang tidak terputus dengan tarikan napas keras di awal (whoop) adalah ciri khas pertusis."},{"id":"m1_6","q":"Seorang anak perempuan berusia 3 tahun, BB 14 kg, datang dengan keluhan utama kejang. Kejang terjadi dua kali dan hanya sebelah kanan tubuh selama 15 menit, setelah kejang anak sadar. Demam tinggi dialami sejak sehari yang lalu. Pada pasien tersebut, dapat diberikan pengobatan berupa:","options":["Paracetamol dan diazepam tanpa terapi rumatan jangka panjang","Paracetamol dan diazepam dengan terapi rumatan jangka panjang selama satu tahun","Paracetamol dan diazepam dengan terapi rumatan jangka panjang selama satu tahun bebas kejang","Paracetamol dan diazepam dengan terapi rumatan jangka panjang selama dua tahun","Paracetamol dan diazepam dengan terapi rumatan jangka panjang selama dua tahun bebas kejang"],"answer":2,"topic":"Neurologi","explanation":"Kejang demam kompleks (fokal, >15 menit, berulang dalam 24 jam) memerlukan terapi rumatan antikonvulsan. Terapi rumatan diberikan selama 1 tahun bebas kejang, kemudian diturunkan bertahap."},{"id":"m1_7","q":"Bayi Ny. A, lahir dari ibu G1P0A0, umur 3 hari dirujuk dengan klasifikasi ikterus berat. Ikterus Kramer 4, bayi cukup aktif. Ibu golongan darah O dan ayah golongan darah B. Sebagai dokter di puskesmas, tindakan yang dilakukan adalah:","options":["Rujuk untuk dilakukan tranfusi tukar","Dirawat di puskesmas dan dilakukan fototerapi/terapi sinar","Diberi obat luminal dan dipulangkan"],"answer":1,"topic":"Neonatologi","explanation":"Pada ikterus neonatorum berat (Kramer 4) di puskesmas yang memiliki fasilitas perawatan, tindakan yang tepat adalah fototerapi. Bayi masih aktif dan minum baik sehingga belum perlu transfusi tukar."},{"id":"m1_8","q":"Seorang anak perempuan umur 6 tahun 10 bulan, berat badan 22 kg, datang dengan keluhan demam sejak 10 hari yang lalu. Kesadaran sopor, akral dingin, pucat, CRT 5 detik, nadi halus 180x/menit, TD 60 mmHg/palpasi. Setelah tunjangan hidup dasar, tatalaksana selanjutnya adalah:","options":["Dextran 20 cc/kgBB bolus secepatnya","Ringer Laktat 10 cc/kgBB dalam 1 jam","Ringer Laktat 20 cc/kgBB bolus secepatnya","Inj Dopamin 5 mikrogram/kgBB/menit","Inj Dobutamin 5 mikrogram/kgBB/menit"],"answer":2,"topic":"Kegawatdaruratan","explanation":"Pada syok dengan tanda hipoperfusi berat, resusitasi cairan kristaloid (RL) 20 cc/kgBB bolus secepatnya merupakan langkah pertama setelah tunjangan hidup dasar."},{"id":"m1_9","q":"Bayi baru lahir usia 1 hari dengan usia gestasi 32 minggu dan BBL 1500 gram, sesak nafas sejak lahir. Frekuensi nafas 80x/menit, merintih, retraksi. Foto dada menunjukkan gambaran retikulogranular difus bilateral. Diagnosis pasien adalah:","options":["Neonatal pneumonia","Aspirasi Mekonium","Persisten Pulmonary Hypertention in Newborn","Respiratory Distress Syndrome","Transient Tachypnea of the Newborn"],"answer":3,"topic":"Neonatologi","explanation":"RDS (Penyakit Membran Hialin) terjadi pada bayi prematur akibat defisiensi surfaktan. Gambaran retikulogranular difus bilateral (ground glass appearance) pada foto toraks adalah ciri khas RDS."},{"id":"m1_10","q":"Anak 18 bulan, diare >10x/hari, gelisah, mata cekung, turgor kurang, BB 10 kg. Obat yang dipertimbangkan (menurut WHO):","options":["Kaolin/Pectin","Loperamide","Antibiotik","Lactobacillus","Zinc"],"answer":4,"topic":"Gastroenterologi","explanation":"Menurut WHO, suplementasi zinc selama 10-14 hari diberikan pada semua anak dengan diare untuk mengurangi durasi dan keparahan diare serta mencegah episode diare selanjutnya."},{"id":"m1_11","q":"Seorang anak laki-laki berusia 18 bulan dibawa dengan keluhan batuk lama disertai suara whoop. Belum pernah diimunisasi. Pemeriksaan apa saja yang dapat dilakukan untuk mendiagnosis penyakit tersebut?","options":["Leukosit darah dan hitung leukosit","Pemeriksaan serologi/IgG terhadap bakteri yang dicurigai","Kultur bakteri dari apus tenggorokan","A dan C Benar","A, B, dan C benar"],"answer":4,"topic":"Infeksi","explanation":"Diagnosis pertusis dapat ditegakkan melalui: leukositosis dengan limfositosis absolut, kultur Bordetella pertussis dari nasofaring, dan pemeriksaan serologi. Semua pemeriksaan tersebut dapat membantu diagnosis."},{"id":"m1_12","q":"Seorang anak perempuan lahir 13 Februari 2014 datang ke poliklinik pada 25 Juni 2014 untuk diimunisasi. Baru mendapatkan Hepatitis B0 dan Polio1. Imunisasi apa yang akan Anda berikan saat ini?","options":["Hepatitis B1, Polio 2, DPT 1, Hib 1","Hepatitis B1, Polio 2, BCG, Campak","Hepatitis B1, Polio 2, BCG, Hib 1","Hepatitis B1, Polio 2, BCG, DPT 1, Hib 1","Hepatitis B1, Polio 2, BCG, MMR"],"answer":0,"topic":"Imunisasi","explanation":"Usia anak saat datang adalah sekitar 4 bulan. Pada usia ini, imunisasi yang diberikan adalah Hepatitis B1, Polio 2, DPT 1, dan Hib 1. BCG sebaiknya diberikan sebelum usia 3 bulan."},{"id":"m1_13","q":"Anak usia 1 tahun, BB 10 kg, demam 3 hari, akral dingin, nadi 150x/mnt lemah, TD 80/60. Lab: leukosit 1300, Hb 16.4, PCV 48.8, trombosit 74.000. Pilihan cairan yang harus diberikan:","options":["Ringer Asetat","D5%","D5 NS 0,45%","D10%","D5 NS 0,9%"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Pada syok dengue (DBD derajat III/IV), cairan kristaloid seperti Ringer Asetat atau Ringer Laktat merupakan pilihan utama untuk resusitasi cairan. Cairan dekstrosa tidak digunakan untuk resusitasi syok."},{"id":"m1_14","q":"Seorang anak perempuan berumur 6 tahun, rewel dan gatal-gatal pada anus dan vagina. Daerah perineum kemerahan, luka bekas garukan, cairan putih di mulut vagina. Pemeriksaan yang dianjurkan:","options":["Pemeriksaan feses lengkap","Pemeriksaan urine lengkap","Pemeriksaan hapusan vagina","Pemeriksaan hapusan anus","Kerokan kulit perianal"],"answer":2,"topic":"Parasitologi","explanation":"Gejala pruritus perianal/perivaginal terutama malam hari mengarah ke infeksi Enterobius vermicularis (cacing kremi). Pemeriksaan kerokan kulit perianal (scotch tape test/anal swab) adalah metode diagnostik yang tepat."},{"id":"m1_15","q":"Nenek membawa cucunya usia 2 tahun. Ayah pernah sakit kuning saat kecil. Hasil serologi: HBsAg (-), Anti HBs (+), Anti HBc (-). Kesimpulan pemeriksaan serologi:","options":["Mengidap Hepatitis B Khronis","Mengidap Hepatitis B Akut","Immun dari Hepatitis B karena infeksi terdahulu","Immun dari Hepatitis B karena imunisasi","Rentan terhadap infeksi Hepatitis B"],"answer":3,"topic":"Hepatologi","explanation":"HBsAg (-), Anti-HBs (+), Anti-HBc (-) menunjukkan imunitas akibat vaksinasi. Jika imun karena infeksi sebelumnya, Anti-HBc akan positif."},{"id":"m1_16","q":"Seorang anak laki-laki umur 3 tahun 6 bulan mendapatkan makan selama 6 bulan terakhir dengan kalori 110 Kkal/kgBB/hari, terdiri dari 15% protein, 50% karbohidrat, dan 35% lemak. Kondisi ini bisa menyebabkan anak menjadi:","options":["Marasmus","Kwasiorkor","Marasmus-Kwasiorkor","Obesitas","Richetsia"],"answer":3,"topic":"Nutrisi","explanation":"Asupan kalori 110 Kkal/kgBB/hari melebihi kebutuhan normal anak usia 3 tahun (sekitar 90-100 Kkal/kgBB/hari). Kelebihan kalori kronik akan menyebabkan obesitas."},{"id":"m1_17","q":"Seorang anak laki-laki, 12 tahun, sesak napas dan biduren setelah mengkonsumsi roti berisi kacang almond. Sianosis, urtikaria, angioedema, wheezing. Tindakan pertama yang harus dilakukan:","options":["Injeksi difenhidramin 1 mg/kg IM","Injeksi metil prednisolone 0,5 mg/kg IV","Injeksi adrenalin 0,01 mg/kg IM","Nebulisasi salbutamol","Injeksi aminofilin 0,5 mg/kg IV"],"answer":2,"topic":"Alergi-Imunologi","explanation":"Pada anafilaksis, epinefrin/adrenalin IM merupakan terapi lini pertama yang harus diberikan sesegera mungkin. Diberikan di paha anterolateral dengan dosis 0,01 mg/kgBB (1:1000) IM."},{"id":"m1_18","q":"Bayi perempuan usia 3 minggu dengan ruam kemerahan di pipi. Ruam berkurang kalau minum ASI saja, bertambah dengan susu formula. Didiagnosis dermatitis atopi karena alergi protein susu sapi. Susu formula yang paling tepat:","options":["Susu formula bebas laktosa","Susu formula terhidrolisat sebagian","Susu formula terhidrolisat sempurna","Susu formula soya","Susu formula regular"],"answer":2,"topic":"Alergi-Imunologi","explanation":"Pada alergi protein susu sapi yang terbukti, susu formula terhidrolisat sempurna (extensively hydrolyzed formula) merupakan pilihan utama. Protein sudah dipecah menjadi peptida kecil sehingga tidak memicu reaksi alergi."},{"id":"m1_19","q":"Seorang anak usia 6 tahun mengeluh sukar BAB. Perut membuncit. TB dan BB persentil 50. Didapatkan sacral dimple. Tata laksana yang utama:","options":["Pemeriksaan BNO","Colok dubur","MRI lumbosakral spinal","Edukasi program bowel training"],"answer":2,"topic":"Gastroenterologi","explanation":"Adanya sacral dimple menunjukkan kemungkinan anomali spinal (spina bifida okulta) yang dapat menyebabkan konstipasi neurogenik. MRI lumbosakral diperlukan untuk evaluasi kelainan tulang belakang."},{"id":"m1_20","q":"Seorang ibu ingin memberikan ASI eksklusif kepada bayinya. Penyakit yang termasuk indikasi kontra ASI adalah:","options":["Infeksi Saluran Nafas Atas","Putting susu lecet dan berdarah","Mastitis","Putting yang terbenam (inverted nipples)","Infeksi HIV"],"answer":4,"topic":"Nutrisi","explanation":"Infeksi HIV pada ibu merupakan kontraindikasi pemberian ASI karena virus HIV dapat ditransmisikan melalui ASI. ISPA, puting lecet, mastitis, dan inverted nipples bukan kontraindikasi ASI."},{"id":"m1_21","q":"Anak usia 6 bulan belum bisa tengkurap. Mikrosefali, jarak kedua mata jauh, hidung pesek, telinga kecil letak rendah. Anggota gerak lembek, refleks fisiologis menurun. Pemeriksaan laboratorium yang penting:","options":["Glukosa darah","Hormon tiroid","Natrium darah","Kalium darah","Hormon Pertumbuhan"],"answer":1,"topic":"Endokrinologi","explanation":"Gambaran klinis hipotiroid kongenital: hipotonia, keterlambatan perkembangan, wajah dismorfik, mikrosefali. Pemeriksaan hormon tiroid (TSH dan FT4) sangat penting untuk diagnosis."},{"id":"m1_22","q":"Seorang anak laki-laki bayi umur 14 hari, sejak lahir BAB frekuensi 6-8 kali/hari, encer bercampur bentuk padat, berbau asam. BB tetap 3000 gram. Bayi sehat, tidak dehidrasi. Yang dilakukan terhadap ibu/bayi:","options":["Beri air putih setiap bayi BAB","Beri antibiotika","Ganti ASI dengan susu formula","Beri nasehat bahwa bayi sehat dan ASI bisa menyebabkan keadaan tersebut","Melakukan pemeriksaan penunjang lain"],"answer":3,"topic":"Nutrisi","explanation":"BAB bayi ASI eksklusif normal bisa frekuensi tinggi (6-8x/hari), konsistensi cair-lembek, berbau asam, berwarna kuning. Ini adalah kondisi normal dan ibu perlu diedukasi."},{"id":"ika_1","q":"Anak 4 tahun mengeluh muntah dan diare selama 3 hari. Tatalaksana yang tepat?","options":["Acyclovir + cefixime","Acyclovir","Ciprofloxacin","Metronidazol","Simtomatis"],"answer":4,"topic":"Gastroenterologi","explanation":"Diare akut pada anak usia 4 tahun dengan durasi 3 hari tanpa tanda infeksi bakteri berat paling sering disebabkan virus (rotavirus)."},{"id":"ika_2","q":"Anak 2 tahun mengeluh demam tinggi lebih dari 5 hari, lecet di bibir, lidah kemerahan disertai limfadenopati. Diagnosis yang paling mungkin?","options":["Kawasaki disease","Demam dengue","Morbili","Demam skarlet","Stomatitis herpetika"],"answer":0,"topic":"Kardiologi","explanation":"Kawasaki disease (penyakit Kawasaki) ditegakkan jika demam >=5 hari + minimal 4 dari 5 kriteria: (1) konjungtivitis bilateral non-purulen, (2) perubahan mulut/bibir (bibir kering/pecah, lidah strawberry, eritema mukosa),..."},{"id":"ika_3","q":"Anak 9 tahun datang dengan keluhan nyeri sendi dan kemerahan pada os tibia. Pemeriksaan tenggorokan ditemukan tonsilitis eksudativa. Mikroorganisme penyebab yang paling mungkin?","options":["RSV","Chlamydia","Grup A Streptococcus","H. influenza","Mycoplasma pneumonia"],"answer":2,"topic":"Infeksi","explanation":"Kombinasi tonsilitis eksudativa + nyeri sendi (artritis) sangat khas untuk infeksi Streptococcus beta-hemolyticus Grup A (GABHS/S. pyogenes)."},{"id":"ika_4","q":"Penyebab tersering pneumonia pada usia 2-6 bulan adalah?","options":["Chlamydia trachomatis","Streptococcus Grup B","H. influenza","Mycoplasma pneumonia","RSV"],"answer":0,"topic":"Pulmonologi","explanation":"Pada bayi 2-6 bulan, Chlamydia trachomatis merupakan penyebab pneumonia yang tersering disebut afebrile pneumonia atau staccato cough pneumonia."},{"id":"ika_5","q":"Anak 13 tahun datang ke poliklinik dengan keluhan wajah bengkak dan sulit bernapas setelah disengat lebah. Penanganan yang tepat?","options":["O2 100% + nebul salbutamol","O2 100%, adrenalin, hidrokortison","Dexametason saja","IV hidrokortison + antihistamin oral","Suportif saja"],"answer":1,"topic":"Alergi-Imunologi","explanation":"Ini adalah reaksi anafilaksis berat (angioedema wajah + distres napas setelah sengatan lebah). Penanganan anafilaksis: (1) EPINEFRIN/ADRENALIN IM 0,01 mg/kgBB (1:1000) di paha adalah obat PERTAMA dan UTAMA;"},{"id":"ika_6","q":"Anak 4 tahun datang dengan batuk menggonggong dan stridor. Penanganan yang tepat?","options":["O2 100% + nebul salbutamol","O2 100%, adrenalin, nebul, hidrokortison","Dexametason oral/nebul","IV hidrokortison + antihistamin oral","Suportif saja"],"answer":2,"topic":"Pulmonologi","explanation":"Batuk menggonggong (barking cough) + stridor = CROUP (laryngotracheobronchitis), paling sering disebabkan virus Parainfluenza. Penanganan: (1) Deksametason oral 0,15-0,6 mg/kgBB (lini pertama, gold standard);"},{"id":"ika_7","q":"Anak datang dengan batuk, demam, distres pernapasan ringan. Auskultasi ditemukan crackles di seluruh lapangan paru. Penanganan yang tepat?","options":["O2 100% + nebul salbutamol","O2 100%, adrenalin, hidrokortison","Deksametason","IV hidrokortison + antihistamin oral","Antibiotik + suportif"],"answer":4,"topic":"Pulmonologi","explanation":"Demam + batuk + distres napas ringan + crackles bilateral = PNEUMONIA. Crackles (ronki basah) menandakan konsolidasi alveolar akibat infeksi bakteri/virus."},{"id":"ika_8","q":"Anak usia 4 bulan, BB susah naik sejak lahir, minum susu sedikit, saat minum susu tampak terengah, takipnea, berkeringat, takikardi, hepatomegali, bising jantung grade II pansistolik di sternum kiri bawah. Diagnosis?","options":["Hiperventilasi","Tuberkulosis","Cystic fibrosis","Pneumonia carinii","VSD"],"answer":4,"topic":"Kardiologi","explanation":"VSD (Ventricular Septal Defect): bising pansistolik paling keras di ICS 3-4 sternal kiri."},{"id":"ika_9","q":"Anak perempuan usia 13 tahun, episode intermiten di tempat ramai, ambil napas dalam-dalam, napas cepat, merasa ada sensasi seperti jarum di sekitar mulut dan tangan. AGD: pO2 normal, pCO2 menurun. Diagnosis?","options":["Hiperventilasi","Tuberkulosis","Cystic fibrosis","Pneumonia carinii","Asma"],"answer":0,"topic":"Pulmonologi","explanation":"Hiperventilasi psikogenik: napas cepat-dalam sehingga CO2 dibuang berlebihan ke hipokapnia (pCO2 turun) ke alkalosis respiratorik ke parestesi perioralis dan akral (rasa kesemutan/jarum di sekitar mulut dan tangan)."},{"id":"ika_10","q":"Anak usia 3 tahun, batuk dan dyspnea 3 minggu. Ibu pengguna narkoba jarum suntik, anak rentan infeksi, usia 2 tahun pernah terkena cacar selama 4 minggu. Temp 37 derajat C, krepitasi bilateral, limfopenia berat. Diagnosis?","options":["Hiperventilasi","Tuberkulosis","Cystic fibrosis","Pneumonia carinii (PCP)","VSD"],"answer":3,"topic":"Infeksi","explanation":"Pneumocystis jirovecii Pneumonia (PCP): infeksi oportunistik pada penderita imunosupresi berat, terutama HIV/AIDS. Klue: ibu pengguna narkoba suntik (risiko HIV) sehingga anak HIV (+);"},{"id":"ika_11","q":"Bising ejeksi sistolik di interkostal ketiga kiri, S2 tunggal, sianosis tidak jelas, desaturasi ringan. X-ray: cekungan di batas jantung kiri, vaskularisasi paru menurun. Diagnosis?","options":["Defek septum atrioventrikuler","PDA","Stenosis katup paru","Koarktasio aorta","Tetralogy of Fallot"],"answer":2,"topic":"Kardiologi","explanation":"Stenosis Katup Paru (PS): bising ejeksi sistolik di ICS 2-3 parasternal kiri; S2 tunggal atau melebar; sianosis ringan jika ada pirau foramen ovale pada PS berat;"},{"id":"ika_12","q":"Bayi usia 7 minggu sesak saat makan, gagal tumbuh, arteri femoralis teraba tapi sangat lemah. Ro: kardiomegali, corakan vaskuler meningkat. Diagnosis?","options":["Defek septum atrioventrikuler","PDA","Stenosis katup paru","Koarktasio aorta","Tetralogy of Fallot"],"answer":3,"topic":"Kardiologi","explanation":"Koarktasio Aorta (CoA): penyempitan aorta descending di dekat duktus arteriosus. Klue utama: nadi femoralis lemah/tidak teraba dibanding nadi brakial (perbedaan tekanan darah lengan jauh lebih tinggi dari kaki)."},{"id":"ika_13","q":"Bayi prematur usia 3 minggu, usia kehamilan 27 minggu, terintubasi dengan ventilator, distres karena defisiensi surfaktan, murmur sistolik grade 2 di sternum kiri, pulsasi kuat, Ro: pletora pulmonal. Diagnosis?","options":["PDA","Stenosis katup aorta","Tetralogy of Fallot","Anomali drainase vena paru","Transposisi arteri besar"],"answer":0,"topic":"Kardiologi","explanation":"PDA (Patent Ductus Arteriosus) pada prematur: duktus arteriosus tetap terbuka karena kadar prostaglandin tinggi dan jaringan duktus belum matur."},{"id":"ika_14","q":"Bayi usia 2 hari sianosis, letargi, murmur sistolik halus inkonsisten di sternum kiri, S2 tunggal. Ro: mediastinum atas sempit, hipertrofi ventrikel kanan, vaskularisasi meningkat. Diagnosis?","options":["PDA","Stenosis katup aorta","Tetralogy of Fallot","Anomali drainase vena paru","Transposisi arteri besar"],"answer":4,"topic":"Kardiologi","explanation":"Transposisi Arteri Besar (TGA): aorta keluar dari ventrikel kanan, arteri pulmonalis dari ventrikel kiri sehingga sianosis sejak lahir berat."},{"id":"ika_15","q":"Mikroorganisme penyebab paling umum diare menular pada anak-anak di negara maju adalah?","options":["Citomegalovirus","E. coli","Hepatitis A","Rotavirus","Salmonella"],"answer":3,"topic":"Gastroenterologi","explanation":"Rotavirus adalah penyebab tersering diare akut berat pada anak di seluruh dunia. Menyerang anak 6 bulan - 2 tahun. Karakteristik: diare cair profus, muntah, demam, dehidrasi berat. Transmisi fecal-oral."},{"id":"ika_16","q":"Bayi usia 4 bulan, eksim atopik berat, diare, BB tidak naik dalam beberapa pekan. Hasil DL: eosinofilia. Diagnosis yang paling sesuai?","options":["Alergi protein susu sapi","Diare balita","IBS","Migrain abdomen","HUS"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Alergi Protein Susu Sapi (APSS): trias klue = bayi + eksim atopik berat + diare kronis + gagal tumbuh + eosinofilia. APSS adalah alergi makanan tersering pada bayi."},{"id":"ika_17","q":"Anak perempuan usia 14 tahun, ISK berulang, nyeri abdomen berat menjalar ke punggung, dysuria, hematuria makroskopis. Diagnosis yang paling mungkin?","options":["Ginjal polikistik","Pielonefritis","Batu renal","Asidosis tubulus renal","SLE"],"answer":2,"topic":"Nefrologi","explanation":"Batu Renal (Nefrolitiasis): ISK berulang + nyeri kolik (nyeri abdomen berat menjalar ke punggung/selangkangan = kolik renoureteral) + hematuria makroskopis + disuria adalah kombinasi khas batu saluran kemih."},{"id":"ika_18","q":"Anak usia 2 tahun dengan hiperkarotenemia. Pemeriksaan yang penting untuk membedakan dari ikterus adalah?","options":["Sklera","Kulit","Kuku","Rongga mulut","Mukosa"],"answer":0,"topic":"Gastroenterologi","explanation":"Perbedaan KUNCI hiperkarotenemia vs ikterus: pada hiperkarotenemia, kulit berwarna kuning-oranye TETAPI SKLERA PUTIH (tidak ikterik)."},{"id":"ika_19","q":"Bayi usia 11 bulan, diare kronis, gagal tumbuh, berhenti menyusu usia 9 bulan. Mendapat antibiotik 2 minggu untuk infeksi saluran napas. Kalium klorida menurun, alkalosis metabolik. Diagnosis?","options":["Celiac disease","Colitis ulseratif","Cystic fibrosis","Intoleransi protein susu sapi","Intoleransi laktosa"],"answer":4,"topic":"Gastroenterologi","explanation":"Intoleransi laktosa post-antibiotik: antibiotik merusak vili usus ke defisiensi laktase sementara ke laktosa tidak tercerna ke fermentasi bakteri ke diare osmotik, tinja asam."},{"id":"ika_20","q":"Bayi umur 4 hari, muntah hijau seperti feses. Diagnosis yang paling mungkin?","options":["Hirschsprung disease","Intususepsi","Atresia duodenum","Malrotasi usus","Stenosis pilorus"],"answer":0,"topic":"Gastroenterologi","explanation":"Hirschsprung Disease: tidak adanya sel ganglion parasimpatis di kolon distal ke segmen aganglionik tidak dapat relaksasi ke obstruksi fungsional."},{"id":"ika_21","q":"Anak umur 10 tahun dengan Down syndrome, akhir-akhir ini tampak lemas dan demam, gusi berdarah. Diagnosis yang paling mungkin?","options":["Anemia aplastik","Leukemia","Anemia hemolitik","Trombositopenia imun","Hemofilia"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"Leukemia Limfoblastik Akut (LLA) adalah keganasan tersering pada anak, dan anak dengan Down syndrome memiliki risiko 10-20x lebih tinggi terkena leukemia (terutama AML/LLA)."},{"id":"ika_22","q":"Anak umur 3 tahun, BB 6,5 kg, TB 80 cm, 6 bulan ini mengalami penurunan nafsu makan. BB/U <-3SD, BB/TB 54%, TB/U 98%. Diagnosis?","options":["Malnutrisi marasmus","Malnutrisi kwasiorkor","Malnutrisi marasmus + kwasiorkor","Gagal berkembang (FTT)","Short stature"],"answer":0,"topic":"Nutrisi","explanation":"Analisis status gizi: BB/U <-3SD = gizi buruk; BB/TB 54% (jauh <70%) = kurus berat (wasted berat); TB/U 98% = tinggi normal (tidak stunting). Ini adalah MARASMUS: defisiensi kalori-protein kronis berat tanpa edema."},{"id":"ika_23","q":"Penyakit berikut yang dapat menimbulkan komplikasi ataksia serebelar adalah?","options":["Campak","Rubella","Pertusis","Cacar air (Varicella)","Herpes simpleks"],"answer":3,"topic":"Neurologi","explanation":"Varicella (cacar air) dapat menyebabkan Cerebellar Ataxia post-varicella, komplikasi neurologis tersering varicella pada anak. Onset 2-3 minggu setelah ruam. Mekanisme: imun-mediated (post-infectious cerebellar ataxia)."},{"id":"ika_24","q":"Penyakit yang bisa menyebabkan gangguan bernapas (gagal napas) pada bayi adalah?","options":["Cacar air","Campak","Pertusis","Gondok","Rubella"],"answer":2,"topic":"Pulmonologi","explanation":"Pertusis (batuk rejan) dapat menyebabkan gagal napas pada bayi, terutama bayi <6 bulan. Mekanisme: batuk paroksismal panjang ke apnea ke hipoksia berat ke gagal napas."},{"id":"ika_25","q":"Pasien laki-laki usia 11 tahun dengan riwayat glomerulonefritis kronik, datang dengan keluhan hematom dan epistaksis. Lab: pansitopenia. Diagnosis yang paling mungkin?","options":["Anemia aplastik","Leukemia","SLE","ITP","Hemofilia"],"answer":2,"topic":"Nefrologi","explanation":"SLE (Systemic Lupus Erythematosus): riwayat glomerulonefritis kronik + pansitopenia + perdarahan kulit (hematom) + epistaksis."},{"id":"ika_26","q":"Anak laki-laki usia 2 tahun, diare berdarah, sakit perut, bengkak di sekitar mata, sedikit kuning. Ureum 12,6, Kreatinin 163 mmol/L. Diagnosis?","options":["Sindroma Hemolitik Uremik","Sindroma Nefrotik","Polikistik ginjal","Pielonefritis","Trombosis vena ginjal"],"answer":0,"topic":"Nefrologi","explanation":"Sindroma Hemolitik Uremik (HUS) - TRIAS: (1) Anemia hemolitik mikroangiopatik, (2) Trombositopenia, (3) Gagal ginjal akut. Penyebab tersering: E."},{"id":"ika_27","q":"Bayi laki-laki usia 9 hari, muntah, diare 2 hari, hematuria, kejang 2x, massa di hipokondrium kiri. Diagnosis?","options":["Sindroma Hemolitik Uremik","Sindroma Nefrotik","Polikistik ginjal","Pielonefritis","Trombosis vena ginjal"],"answer":4,"topic":"Nefrologi","explanation":"Trombosis Vena Renalis (TVR) pada neonatus: paling sering di masa neonatal. Klue: neonatus + massa flank (ginjal membesar karena kongesti vena) + hematuria + gagal ginjal akut."},{"id":"ika_28","q":"Anak perempuan usia 5 tahun, bengkak di sekitar mata. Hasil urinalisis: eritrosit minimal. Diagnosis?","options":["Sindroma Hemolitik Uremik","Sindroma Nefrotik","Polikistik ginjal","Pielonefritis","Trombosis vena ginjal"],"answer":1,"topic":"Nefrologi","explanation":"Sindroma Nefrotik (SN): TRIAS = proteinuria masif + hipoalbuminemia + edema. Edema periorbital (bengkak mata) pagi hari adalah manifestasi awal khas SN pada anak."},{"id":"ika_29","q":"Bayi usia 13 hari dengan hernia umbilikalis, kulit kuning, kering, lemas, tonus otot menurun. Bilirubin indirek meningkat. Diagnosis?","options":["Ikterus fisiologis","Hipotiroidisme kongenital","Inkompatibilitas Rhesus","Galaktosemia","Defisiensi enzim G6PD"],"answer":1,"topic":"Endokrinologi","explanation":"Hipotiroidisme Kongenital: ikterus prolonged (>2 minggu) + hipotonia + kulit kering + lemas/letargi + hernia umbilikalis adalah kombinasi klasik hipotiroid kongenital."},{"id":"ika_30","q":"Bayi perempuan usia 12 hari, hiperbilirubin direk dan indirek. ASI eksklusif, malas menetek, kultur darah E. coli positif, kultur urin negatif, koagulogram abnormal. Diagnosis?","options":["Ikterus fisiologis","Breastmilk jaundice","Neonatal sepsis","Kolestasis neonatal","Hepatitis neonatal"],"answer":2,"topic":"Infeksi","explanation":"Neonatal Sepsis: kultur darah E. coli positif = bukti sepsis. Sepsis neonatorum dapat menyebabkan hiperbilirubin direk dan indirek melalui: (1) Hemolisis (indirek), (2) Hepatitis septik/kolestasis (direk)."},{"id":"ika_31","q":"Penyebab pneumonia yang jika diperiksa memberikan gambaran sel raksasa (giant cell) adalah?","options":["Campak","Rubella","Varicella","Herpes Simpleks","Hepatitis B"],"answer":0,"topic":"Infeksi","explanation":"Campak (Morbili/Measles): virus campak menyebabkan pembentukan sel raksasa berinti banyak (multinucleated giant cells = Warthin-Finkeldey cells) di jaringan yang terinfeksi termasuk paru (pneumonia campak)."},{"id":"ika_32","q":"Penyakit virus RNA yang tidak memiliki status karier (carrier) adalah?","options":["Campak","Rubella","Varicella","Herpes Simpleks","Hepatitis B"],"answer":0,"topic":"Infeksi","explanation":"Campak (RNA virus): tidak ada status karier - virus dibersihkan sempurna setelah infeksi akut, memberikan imunitas seumur hidup. Rubella: juga RNA virus, tidak ada karier."},{"id":"ika_33","q":"Penyakit yang dapat mengakibatkan keratokonjungtivitis adalah?","options":["Campak","Rubella","Varicella","Herpes Simpleks","Hepatitis B"],"answer":3,"topic":"Infeksi","explanation":"Herpes Simpleks Virus (HSV) adalah penyebab keratokonjungtivitis herpetika - infeksi kornea dan konjungtiva yang dapat menyebabkan kebutaan jika tidak ditangani."},{"id":"ika_34","q":"Anak perempuan usia 11 tahun, riwayat glomerulonefritis kronik, datang dengan keluhan memar dan epistaksis. Hasil DL: pansitopenia. Diagnosis?","options":["Ginjal polikistik","Pielonefritis","Batu ginjal","Asidosis tubulus ginjal","SLE"],"answer":4,"topic":"Nefrologi","explanation":"SLE (Systemic Lupus Erythematosus): penyakit autoimun sistemik. Klue: anak perempuan remaja + glomerulonefritis kronik (lupus nephritis) + pansitopenia (anemia hemolitik + trombositopenia + leukopenia = akibat autoantibo..."},{"id":"ika_35","q":"Bayi perempuan usia 1 tahun, riwayat muntah selama 3 bulan, FTT. Analisa gas darah: asidosis. Diagnosis yang paling mungkin?","options":["Asidosis tubulus ginjal","Celiac disease","Stenosis pilorus","Pielonefritis kronik","GERD berat"],"answer":0,"topic":"Nefrologi","explanation":"Asidosis Tubulus Renal (RTA): gagal tumbuh + muntah berulang + asidosis metabolik pada bayi tanpa penjelasan lain. RTA tipe 1 (distal): asidosis hiperkloremik + hipokalemia + hipositraturia ke pembentukan batu ginjal."},{"id":"ika_37","q":"Anak sudah bisa menulis dan menggambar garis lurus, tetapi belum bisa membuat lingkaran. Usia yang sesuai?","options":["18 bulan","2 tahun","3 tahun","4 tahun","5 tahun"],"answer":1,"topic":"Tumbuh Kembang","explanation":"Milestone motorik halus Denver/KPSP: 18 bulan = corat-coret spontan; 2 tahun = garis lurus/vertikal; 3 tahun = lingkaran (O); 4 tahun = tanda plus (+)/salib; 5 tahun = persegi (kotak)."},{"id":"ika_38","q":"Anak dengan ruam makulopapular yang diawali dari kepala ke seluruh tubuh disertai demam. Diagnosis?","options":["Campak","Cacar air","Gondok","Herpes","Rubela"],"answer":0,"topic":"Infeksi","explanation":"Campak (Morbili/Measles): ruam makulopapular KHAS dimulai di belakang telinga/dahi ke muka ke leher ke badan ke ekstremitas (cephalocaudal/dari atas ke bawah)."},{"id":"ika_39","q":"Anak laki-laki umur 12 tahun, muncul papula eritema berkembang menjadi purpura, nyeri sendi, bengkak di kedua lutut, trombosit dalam batas normal, hematuria. Diagnosis?","options":["HSP (Henoch-Schonlein Purpura)","SSSS (Staphylococcal Scalded Skin Syndrome)","SLE","ITP","Kawasaki disease"],"answer":0,"topic":"Alergi-Imunologi","explanation":"HSP (Henoch-Schonlein Purpura / IgA Vaskulitis): vaskulitis pembuluh darah kecil dengan deposisi IgA."},{"id":"ika_40","q":"Bayi usia 4 bulan, diare berulang, riwayat dermatitis atopik berat, sering bolak-balik ke dokter, pertumbuhan terhambat. Hasil DL: neutrofilia. Diagnosis?","options":["Alergi protein susu sapi","Diare pada bayi","IBS","Migrain abdomen","Intoleransi laktosa"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Alergi Protein Susu Sapi (APSS): bayi + dermatitis atopik BERAT (manifestasi kulit APSS) + diare berulang (manifestasi GI) + FTT + neutrofilia (inflamasi)."},{"id":"ika_41","q":"Kontraindikasi vaksin pada pasien HIV adalah?","options":["BCG","Hepatitis B","MMR","DPT","HiB"],"answer":0,"topic":"Imunisasi","explanation":"BCG adalah vaksin hidup yang DIKONTRAINDIKASIKAN pada pasien imunosupresi termasuk HIV/AIDS (terutama jika CD4 rendah/simtomatis). BCG bisa menyebabkan BCG-osis (infeksi diseminata BCG) pada pasien imunosupresi."},{"id":"ika_42","q":"Kontraindikasi vaksin bila ada kelainan neurologis progresif adalah?","options":["BCG","Hepatitis B","MMR","DPT","HiB"],"answer":3,"topic":"Imunisasi","explanation":"DPT (terutama komponen pertussis utuh/whole-cell) dikontraindikasikan pada kelainan neurologis progresif (ensefalopati progresif, epilepsi tidak terkontrol, sindrom West)."},{"id":"ika_43","q":"Anemia makrositik disebabkan oleh?","options":["Defisiensi besi","Leukemia","Defisiensi B12","Keracunan timbal","Anemia sideroblastik"],"answer":2,"topic":"Hematologi-Onkologi","explanation":"Anemia Makrositik: MCV >100 fL (sel darah merah besar). Penyebab: (1) Defisiensi B12 (kobalamin) - anemia megaloblastik, gangguan sintesis DNA; (2) Defisiensi folat - megaloblastik; (3) Alkohol; (4) Hipotiroid;"},{"id":"ika_44","q":"Fungsi utama zat besi dalam tubuh adalah?","options":["Pertumbuhan tulang","Pembentukan hemoglobin","Berikatan dengan enzim","Cadangan feritin","Pembentukan mioglobin"],"answer":1,"topic":"Nutrisi","explanation":"Fungsi utama (terbesar) zat besi adalah pembentukan HEMOGLOBIN (Hb) - protein pembawa O2 dalam eritrosit. Sekitar 65-70% besi tubuh ada dalam Hb."},{"id":"ika_45","q":"Pada anak dengan hemofilia, pernyataan yang benar adalah?","options":["Ibu normal (tidak carrier)","Ayah penderita hemofilia","Ibu akan terkena hemofilia","Ayah normal","Ibu adalah pembawa (carrier)"],"answer":4,"topic":"Hematologi-Onkologi","explanation":"Hemofilia A (defisiensi F VIII) dan B (defisiensi F IX): penyakit resesif X-linked. Pola pewarisan: gen ada di kromosom X. Laki-laki (XY): jika X membawa gen hemofilia ke terkena hemofilia."},{"id":"ika_46","q":"Bayi lahir dengan forsep, beberapa saat kemudian ikterik, Hb 12 g/dl, bengkak di parietal. Kemungkinan diagnosisnya?","options":["ASI ikterik","Cephalohematoma","Galaktosemia","Prematuritas","Sepsis"],"answer":1,"topic":"Neonatologi","explanation":"Cephalohematoma: perdarahan subperiosteal akibat trauma persalinan (forsep/vakum). Karakteristik: bengkak terbatas pada 1 tulang tengkorak (tidak melewati sutura)."},{"id":"ika_47","q":"Bayi 3 bulan, suhu 38 derajat C, malas minum, gumoh. Leukosit 18x10 pangkat 9/L, aspirasi suprapubik banyak neutrofil polimorfonuklear. Diagnosis?","options":["Ikterus ASI","Lahir prematur","Sepsis","ISK (Infeksi Saluran Kemih)","Meningitis"],"answer":3,"topic":"Infeksi","explanation":"ISK (Infeksi Saluran Kemih) pada bayi: gejala non-spesifik (demam, malas minum, gumoh/muntah) + leukositosis + ASPIRASI SUPRAPUBIK banyak neutrofil PMN."},{"id":"ika_49","q":"Perbedaan Hemofilia A dan Hemofilia B terletak pada?","options":["Defisiensi Faktor VIII vs IX","Defisiensi Faktor IX vs X","Defisiensi Faktor VII vs VIII","Defisiensi Faktor X vs XI","Defisiensi Faktor II vs V"],"answer":0,"topic":"Hematologi-Onkologi","explanation":"Hemofilia A = defisiensi Faktor VIII (8) - paling umum (80% kasus hemofilia). Hemofilia B = defisiensi Faktor IX (9) - Christmas disease (20% kasus)."},{"id":"ika_50","q":"Keadaan yang dapat menyebabkan ikterus dalam 24 jam pertama kehidupan adalah?","options":["Kelainan bentuk eritrosit","Infeksi","Polisitemia","Inkompatibilitas Rh","Hipoksia"],"answer":3,"topic":"Neonatologi","explanation":"Ikterus <24 jam pertama SELALU PATOLOGIS dan harus dicari penyebabnya segera. Penyebab ikterus <24 jam: (1) INKOMPATIBILITAS Rh/ABO (hemolisis aloimun - paling sering); (2) Defisiensi G6PD dengan hemolisis akut;"},{"id":"ika_51","q":"Sel imun pertama yang mengenali benda asing adalah?","options":["Sel plasma","Limfosit","Eosinofil","Neutrofil","Basofil"],"answer":3,"topic":"Imunologi","explanation":"Neutrofil adalah sel imun pertama yang merespons infeksi/benda asing dalam imunitas bawaan (innate immunity)."},{"id":"ika_52","q":"Sel yang berperan utama untuk fagositosis adalah?","options":["Limfosit T","Limfosit B","Makrofag","Lisosom","Komplemen"],"answer":2,"topic":"Imunologi","explanation":"Makrofag adalah sel fagosit profesional utama. Berasal dari monosit darah yang bermigrasi ke jaringan. Fungsi makrofag: (1) Fagositosis patogen, debris sel, benda asing;"},{"id":"ika_53","q":"Penyebab keganasan tersering pada anak adalah?","options":["Tumor Wilms","Leukemia","Retinoblastoma","Tumor serebral","Neuroblastoma"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"Leukemia adalah keganasan tersering pada anak sekitar 30% dari semua kanker anak. Tipe tersering: Leukemia Limfoblastik Akut (LLA) - 75-80% dari leukemia anak, puncak usia 2-5 tahun."},{"id":"ika_54","q":"Kuman penyebab ISK tersering pada anak adalah?","options":["E. coli","Pseudomonas","Proteus vulgaris","Streptococcus","Staphylococcus"],"answer":0,"topic":"Infeksi","explanation":"E. coli adalah penyebab ISK tersering pada anak (>80% kasus). E. coli memiliki pili tipe P yang menempel pada uroepitel dan faktor virulensi lain (hemolisin, aerobaktin)."},{"id":"ika_56","q":"Definisi umur kehamilan cukup bulan (aterm) yang paling tepat adalah?","options":["37-42 minggu",">=37 hingga 42 minggu","37 hingga <42 minggu",">37 hingga <42 minggu","38 hingga <42 minggu"],"answer":3,"topic":"Neonatologi","explanation":"Definisi aterm (cukup bulan) menurut WHO/ACOG: usia gestasi >37 minggu hingga <42 minggu. Prematur: <37 minggu. Post-term: >=42 minggu."},{"id":"ika_58","q":"Anak 2 tahun datang dengan batuk menggonggong dan stridor. Penanganan yang tepat?","options":["O2 100% + nebul salbutamol","O2 100%, adrenalin, hidrokortison","Deksametason","IV hidrokortison + antihistamin oral","Suportif saja"],"answer":2,"topic":"Pulmonologi","explanation":"Croup pada usia 2 tahun (usia puncak): batuk menggonggong (barking cough) + stridor inspirasi = edema subglotis."},{"id":"ika_59","q":"Bayi 9 bulan dengan demam, batuk, distres napas ringan, auskultasi crackles di seluruh lapang paru. Penanganan yang tepat?","options":["O2 100% + nebul salbutamol","O2 100%, adrenalin, hidrokortison","Deksametason","IV hidrokortison + antihistamin oral","Antibiotik dan suportif"],"answer":4,"topic":"Pulmonologi","explanation":"Pneumonia: demam + batuk + distres napas + crackles bilateral = konsolidasi paru akibat infeksi. Penanganan: (1) Antibiotik (amoksisilin untuk rawat jalan; ampisilin/penisilin IV rawat inap); (2) O2 jika saturasi <92%;"},{"id":"ika_60","q":"Anak bisa membuat lingkaran, tanda silang (+), naik turun tangga dengan 1 kaki per langkah. Usianya?","options":["18 bulan","1 tahun","3 tahun","4 tahun","5 tahun"],"answer":3,"topic":"Tumbuh Kembang","explanation":"Milestone motorik halus dan kasar Denver: 3 tahun = lingkaran; 4 tahun = tanda plus/salib (+) dan berdiri 1 kaki beberapa detik; naik tangga 1 kaki per anak tangga mulai 3-4 tahun."},{"id":"ika_61","q":"Anak sudah bisa menulis dan menggambar garis lurus, tetapi belum bisa membuat lingkaran. Usianya?","options":["18 bulan","2 tahun","3 tahun","4 tahun","5 tahun"],"answer":1,"topic":"Tumbuh Kembang","explanation":"Urutan milestone menggambar: 12-15 bulan = coret-coret; 18 bulan = garis vertikal spontan; 2 tahun = garis horizontal dan vertikal (garis lurus); 3 tahun = lingkaran (O); 4 tahun = tanda plus (+), persegi;"},{"id":"ika_62a","q":"Anak perempuan bisa membuat lingkaran, bisa naik turun tangga sendiri, berdiri menggunakan 1 kaki selama beberapa detik. Usianya?","options":["2 tahun","1 tahun","3 tahun","4 tahun","5 tahun"],"answer":2,"topic":"Tumbuh Kembang","explanation":"Milestone usia 3 tahun: motorik kasar - naik turun tangga bergantian, berdiri 1 kaki >3 detik; motorik halus - menggambar lingkaran (O); bahasa - kalimat 3 kata, nama lengkap."},{"id":"ika_62b","q":"Perempuan 16 tahun, nyeri kepala, muntah, demam, rash tidak hilang dengan penekanan (non-blanching). Diagnosis yang paling mungkin?","options":["Tumor serebral","Ensefalitis","Meningitis","Migrain","TTH"],"answer":2,"topic":"Neurologi","explanation":"Meningitis bakterial: trias klasik = demam + nyeri kepala + kaku kuduk. KUNCI soal ini: rash NON-BLANCHING (tidak hilang dengan penekanan) = PURPURA/PETEKIE = tanda meningokoksemia (Neisseria meningitidis)."},{"id":"ika_63","q":"Anak laki-laki usia 17 tahun, 4 hari riwayat batuk, demam, kemampuan sensoris menurun, muntah-muntah. Diagnosis?","options":["Meningitis","Ensefalitis","Abses otak","Migrain dengan aura","Tumor serebral"],"answer":1,"topic":"Neurologi","explanation":"Ensefalitis: inflamasi parenkim otak. Klue: batuk/demam (infeksi virus mendahului) + penurunan kesadaran/kemampuan sensoris + muntah."},{"id":"ika_64","q":"Anak perempuan 10 tahun, riwayat sakit perut 6 bulan, nyeri kepala berat, oftalmoplegi (beberapa hari terakhir). Keadaan yang paling sesuai?","options":["Tumor serebral","Ensefalitis","Meningitis","Migrain dengan aura","TTH"],"answer":0,"topic":"Neurologi","explanation":"Tumor Serebral: perjalanan kronik (sakit perut kronik = kemungkinan mual kronik akibat peningkatan tekanan intrakranial/TTIK), nyeri kepala progresif BERAT (tanda TTIK), dan OFTALMOPLEGI (kelumpuhan otot mata = penekanan..."},{"id":"ika_65","q":"Bayi 9 bulan, tiba-tiba diare seperti jelly bercampur darah. Diagnosis?","options":["Disentri ameba","Kolitis ulseratif","Intususepsi","Hirschsprung disease","Volvulus"],"answer":2,"topic":"Gastroenterologi","explanation":"Intususepsi: invaginasi usus (biasanya ileum ke sekum). TRIAS KLASIK: (1) Nyeri perut kolik paroksismal (bayi menangis hebat episodik), (2) Massa abdomen teraba (sosis di kuadran kanan atas), (3) Tinja currant jelly (dar..."},{"id":"ika_66","q":"Bayi 4 hari, distensi perut hebat, muntah seperti feses. Diagnosis?","options":["Hirschsprung disease","Intususepsi","Intoleransi laktosa","Short bowel syndrome","Penyakit Wilson"],"answer":0,"topic":"Gastroenterologi","explanation":"Hirschsprung Disease pada neonatus: tidak ada sel ganglion di kolon distal ke tidak bisa relaksasi ke obstruksi fungsional kolon."},{"id":"ika_67","q":"Fase pertumbuhan tercepat pada manusia terjadi pada periode?","options":["Intrauterin","Bayi (0-1 tahun)","Anak balita (1-5 tahun)","Prepubertas","Pascapubertas"],"answer":0,"topic":"Tumbuh Kembang","explanation":"Pertumbuhan TERCEPAT terjadi pada periode INTRAUTERIN (kehidupan janin). Dari zigot (1 sel, 0,1 mm) menjadi neonatus (~50 cm, 3 kg) dalam 9 bulan = pertumbuhan luar biasa."},{"id":"ika_68","q":"Yang dimaksud dengan AKB (Angka Kematian Bayi) adalah?","options":["Angka kematian <1 tahun per seribu kelahiran hidup","Angka kematian <1 bulan per seribu kelahiran hidup","Angka kematian <1 tahun per seribu kelahiran penduduk","Angka kematian <1 bulan per seribu kelahiran penduduk","Angka kematian <1 tahun per seratus ribu kelahiran hidup"],"answer":0,"topic":"Epidemiologi","explanation":"AKB (Infant Mortality Rate/IMR): jumlah kematian bayi usia <1 tahun per 1.000 kelahiran hidup dalam 1 tahun. Berbeda dari: Angka Kematian Neonatal (AKN) = kematian <28 hari per 1.000 kelahiran hidup;"},{"id":"ika_69","q":"Imunisasi yang dapat mengurangi insiden meningitis purulenta adalah?","options":["BCG","Polio","DPT","Hib","TT"],"answer":3,"topic":"Imunisasi","explanation":"Hib (Haemophilus influenzae tipe b): vaksin Hib secara dramatis mengurangi insidens meningitis bakterial pada anak. H."},{"id":"ika_70","q":"Bayi bisa merangkak, menahan badan berdiri (dengan pegangan), dan merambat. Kemungkinan usianya?","options":["6 bulan","10 bulan","1 tahun","2 tahun","3 tahun"],"answer":1,"topic":"Tumbuh Kembang","explanation":"Milestone motorik kasar: 6 bulan = duduk dengan bantuan, berguling; 9 bulan = duduk mandiri, merangkak; 10 bulan = berdiri berpegangan, merambat (cruising); 12 bulan = berdiri mandiri, berjalan dengan pegangan."},{"id":"ika_73","q":"ASI eksklusif diberikan selama?","options":["4 bulan","6 bulan","9 bulan","1 tahun","2 tahun"],"answer":1,"topic":"Nutrisi","explanation":"ASI EKSKLUSIF: pemberian ASI saja tanpa makanan/minuman lain (kecuali obat dan vitamin) selama 6 BULAN pertama kehidupan, sesuai rekomendasi WHO, UNICEF, IDAI, dan Kemenkes RI."},{"id":"ika_74","q":"Pemantauan nilai gizi pada gangguan gizi lama (kronik) menggunakan indikator?","options":["BB terhadap umur","TB terhadap umur","BB terhadap TB","LiLA","LLBK"],"answer":1,"topic":"Nutrisi","explanation":"TB/U (Tinggi Badan per Umur) = indikator STUNTING = mencerminkan status gizi KRONIK/JANGKA PANJANG. Interpretasi: <-2SD = pendek (stunting); <-3SD = sangat pendek. BB/U = status gizi umum (underweight)."},{"id":"ika_76","q":"Anak 3 tahun, TB 80 cm, BB 6,5 kg. 6 bulan mengalami penurunan nafsu makan. BB/U <-3SD, BB/TB 95%, TB/U 95%. Diagnosis?","options":["Malnutrisi marasmus","Malnutrisi kwashiorkor","Marasmus + kwashiorkor","Gagal berkembang (FTT)","Short stature"],"answer":3,"topic":"Nutrisi","explanation":"Analisis status gizi: BB/U <-3SD = berat badan sangat kurang (gizi buruk berdasarkan BB/U); BB/TB 95% = NORMAL (tidak wasting/kurus); TB/U 95% = NORMAL (tidak stunting/pendek)."},{"id":"ika_78","q":"Laki-laki 3 tahun dengan Down syndrome, gusi berdarah 1 minggu, kurang bersemangat, suhu 37,8 derajat C, pucat, splenomegali, perdarahan gusi, memar ekstremitas. Diagnosis?","options":["ITP","Anemia aplastik","Leukemia (umum)","ALL (Leukemia Limfoblastik Akut)","Anemia megaloblastik"],"answer":3,"topic":"Hematologi-Onkologi","explanation":"ALL (Acute Lymphoblastic Leukemia): anak Down syndrome + gejala infiltrasi sumsum tulang (anemia ke pucat+lemas, trombositopenia ke perdarahan gusi+memar, leukositosis/imunosupresi ke demam) + splenomegali (infiltrasi or..."},{"id":"ika_79","q":"ASAH dalam konteks tumbuh kembang anak mengacu pada?","options":["Pemberian ASI","Perawatan kesehatan","Sandang","Stimulasi mental","Perhatian orang tua"],"answer":3,"topic":"Tumbuh Kembang","explanation":"ASAH adalah komponen kebutuhan dasar tumbuh kembang anak untuk perkembangan psikososial optimal: ASAH = kebutuhan stimulasi (stimulasi mental, sosial, emosional)."},{"id":"ika_80","q":"Gejala klinis yang perlu dicurigai pada anak yang menderita hidrosefalus adalah?","options":["Kejang","Kepala membesar","Sesak napas","Penurunan kesadaran","Refleks Moro positif"],"answer":1,"topic":"Neurologi","explanation":"Hidrosefalus: akumulasi CSF berlebihan dalam ventrikel otak ke peningkatan tekanan intrakranial."},{"id":"ika2_1","q":"Kelainan jantung pada kongenital rubella yang paling sering ditemukan adalah?","options":["TOF","PDA","VSD","ASD","MS"],"answer":1,"topic":"Kardiologi","explanation":"PDA (Patent Ductus Arteriosus) adalah kelainan jantung kongenital tersering akibat infeksi rubella kongenital (Congenital Rubella Syndrome/CRS)."},{"id":"ika2_2","q":"Kelainan jantung yang paling sering ditemukan pada demam rematik akut adalah?","options":["Insufisiensi mitral","Stenosis mitral","Insufisiensi aorta","Stenosis aorta","Insufisiensi trikuspidalis"],"answer":0,"topic":"Kardiologi","explanation":"Insufisiensi Mitral (regurgitasi mitral) adalah manifestasi karditis rematik tersering dan paling awal pada Demam Rematik Akut (DRA)."},{"id":"ika2_3","q":"Faktor risiko terbanyak pada endokarditis bakteri adalah?","options":["Penyakit jantung kongenital","Demam rematik akut","Infeksi streptococcus","Prosedur gigi","Penggunaan kateter IV"],"answer":0,"topic":"Kardiologi","explanation":"Penyakit Jantung Kongenital (PJK) adalah faktor risiko terbesar endokarditis infektif pada anak. PJK menyebabkan aliran darah turbulen ke kerusakan endotel ke deposisi fibrin-platelet ke nidus untuk bakteremia."},{"id":"ika2_5","q":"Cairan IV pada anak yang mengalami diare dengan dehidrasi berat adalah?","options":["RD (Ringer Dekstrosa)","NaCl 0,45%","D5%","RL (Ringer Laktat)","D 1/4 NS"],"answer":3,"topic":"Gastroenterologi","explanation":"Pada dehidrasi berat akibat diare, cairan pilihan untuk resusitasi IV adalah Ringer Laktat (RL) atau NaCl 0,9%."},{"id":"ika2_7","q":"Anak 1 bulan kuning sejak lahir, urin gelap, tinja pucat, ikterus seluruh tubuh, hepatomegali 3x3x3 cm. Diagnosis?","options":["Hepatitis akut","Ikterus neonatorum","Kolestasis","Sirosis","Batu empedu"],"answer":2,"topic":"Hepatologi","explanation":"Kolestasis Neonatal: ikterus sejak lahir + urin gelap (bilirubinuria = bilirubin direk meningkat) + tinja pucat/acholic (tidak ada bilirubin di usus = obstruksi aliran empedu) + hepatomegali."},{"id":"ika2_8","q":"Anak 10 tahun, kuning mulai mata ke badan. Teman-teman mengalami keluhan serupa. Pemeriksaan fisik: ikterus, hepar 3x2x2 cm, demam 3 hari, mual, muntah. Diagnosis?","options":["Hepatitis akut","Hepatitis kronik","Leptospirosis","Kolestasis","Demam tifoid"],"answer":0,"topic":"Hepatologi","explanation":"Hepatitis A Akut: KHAS = wabah (teman-teman juga sakit = kluster komunitas/sekolah) + ikterus akut + hepatomegali + demam + mual/muntah."},{"id":"ika2_9","q":"Bayi usia 8 bulan, diare berulang pasca diare akut. Tinja banyak, cair, asam, frekuensi sering. Diagnosis?","options":["Celiac disease","Kolitis ulseratif","Intoleransi susu sapi","Cystic fibrosis","Intoleransi laktosa"],"answer":4,"topic":"Gastroenterologi","explanation":"Intoleransi Laktosa Post-infektif: pasca diare akut (rotavirus/bakteri) ke kerusakan vili usus ke defisiensi laktase sementara ke laktosa tidak dicerna ke fermentasi bakteri kolon ke diare osmotik."},{"id":"ika2_10","q":"Demam tifoid menular melalui cara?","options":["Droplet","Fecal-oral","Kontak langsung","Fetomaternal","Airborne"],"answer":1,"topic":"Infeksi","explanation":"Demam Tifoid (Salmonella typhi/paratyphi): penularan FECAL-ORAL - melalui makanan/minuman yang terkontaminasi feses/urin penderita atau karier."},{"id":"ika2_11","q":"Perbedaan mendasar antara DBD dan demam dengue adalah?","options":["Adanya perdarahan","Adanya perembesan plasma","Trombositopenia lebih parah","Dengue IgM positif","Limfosit plasma biru lebih banyak"],"answer":1,"topic":"Infeksi","explanation":"PEREMBESAN PLASMA adalah perbedaan fundamental dan kriteria utama membedakan DBD dari demam dengue."},{"id":"ika2_12","q":"Manifestasi klinis pada mukosa dan kulit yang spesifik untuk penyakit campak adalah?","options":["Koplik spot","Eritema multiforme","Eritema nodusum","Dermatitis herpetiformis","Vitiligo"],"answer":0,"topic":"Infeksi","explanation":"Koplik Spots adalah PATOGNOMONIK (khas hanya untuk) campak. Ditemukan pada mukosa bukal (pipi bagian dalam) berupa bintik-bintik putih keabu-abuan dengan dasar merah."},{"id":"ika2_15","q":"Pada Stevens-Johnson Syndrome, manifestasi kulit yang spesifik adalah?","options":["Eritema nodusum","Eritema multiforme","Vitiligo","Dermatitis herpetiformis","Psoriasis"],"answer":1,"topic":"Dermatologi","explanation":"Eritema multiforme adalah lesi kulit khas Stevens-Johnson Syndrome (SJS). Karakteristik: lesi target/iris (target lesion) - lingkaran konsentris dengan pusat gelap/nekrotik, zona tengah lebih terang, halo merah di luar."},{"id":"ika2_18","q":"Di antara gejala berikut, yang paling mengarah ke asma adalah?","options":["Batuk saja","Mengi (wheezing)","Demam","Napas cepat","Nyeri tenggorokan"],"answer":1,"topic":"Pulmonologi","explanation":"MENGI (Wheezing) adalah gejala yang paling spesifik untuk asma. Mengi terjadi akibat obstruksi bronkus difus (bronkospasme, edema mukosa, hipersekresi mukus) ke penyempitan lumen bronkus ke udara keluar mengalami turbule..."},{"id":"ika2_19","q":"Penyakit yang disebabkan oleh kuman dengan penularan melalui fecal-oral adalah?","options":["CMV","E. coli","Hepatitis A","Rotavirus","Salmonella"],"answer":2,"topic":"Infeksi","explanation":"Hepatitis A: penularan klasik fecal-oral melalui air/makanan yang terkontaminasi. Menyebabkan wabah (outbreak) karena mudah menyebar melalui sanitasi buruk."},{"id":"ika2_22","q":"Pada glomerulonefritis pasca streptococcus (GNAPS), penanda laboratorium yang mendukung adalah?","options":["Peningkatan ureum dan kreatinin","Sering diikuti gagal jantung","Penurunan kadar C3","Proteinuria masif","Selalu diikuti hematuria makroskopis"],"answer":2,"topic":"Nefrologi","explanation":"GNAPS: penurunan kadar KOMPLEMEN C3 adalah penanda laboratorium khas yang mendukung diagnosis."},{"id":"ika2_23","q":"Penyebab anemia pada gagal ginjal kronik adalah?","options":["Defisiensi besi dan folat","Anemia megaloblastik","Anemia hemolitik karena sepsis","Gangguan pembentukan eritropoietin","Perdarahan kronis melalui glomerulus"],"answer":3,"topic":"Nefrologi","explanation":"Anemia pada Gagal Ginjal Kronik (GGK): penyebab UTAMA = gangguan produksi ERITROPOIETIN (EPO)."},{"id":"ika2_31","q":"Penyebab bronkiolitis terbanyak adalah?","options":["Adenovirus","RSV","Influenza","Parainfluenza","Rhinovirus"],"answer":1,"topic":"Pulmonologi","explanation":"RSV (Respiratory Syncytial Virus) adalah penyebab bronkiolitis tersering (50-80% kasus), terutama pada bayi <2 tahun."},{"id":"ika2_32","q":"Keadaan yang menyebabkan napas Kussmaul adalah?","options":["Asidosis metabolik","Asidosis respiratorik","Alkalosis metabolik","Alkalosis respiratorik","Hipoksemia"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Napas Kussmaul: napas dalam dan cepat (hiperpnea) sebagai kompensasi asidosis metabolik. Otak merespons penurunan pH darah dengan meningkatkan ventilasi ke membuang CO2 ke meningkatkan pH (kompensasi respiratorik)."},{"id":"ika2_33","q":"Bayi 6 bulan, demam, sesak, batuk, sulit napas, perkusi pekak di basal paru kanan posterior, suara napas bronkial. Diagnosis?","options":["Bronkiolitis","Croup","Epiglotitis","Pneumonia","Batuk rejan"],"answer":3,"topic":"Pulmonologi","explanation":"Pneumonia: demam + sesak + batuk + PERKUSI PEKAK (konsolidasi) + suara napas BRONKIAL (hantaran suara melalui jaringan yang terkonsolidasi) di basal paru kanan. Ini adalah tanda fisik klasik pneumonia lobaris/segmental."},{"id":"ika2_34","q":"Bayi laki-laki 1 tahun, batuk, mengi, sianosis, kesulitan bernapas, retraksi intercostal. Kondisi yang paling mungkin?","options":["Bronkiolitis","Croup","Epiglotitis","Pneumonia","Batuk rejan"],"answer":0,"topic":"Pulmonologi","explanation":"Bronkiolitis: usia 1 tahun + batuk + MENGI (wheeze) + retraksi + sesak. Bronkiolitis menyebabkan obstruksi bronkiolus kecil akibat inflamasi dan mukus ke air trapping ke hiperinflasi ke retraksi suprasternal/intercostal...."},{"id":"ika2_35","q":"Bayi perempuan 9 bulan, lelah, suara berat, batuk menggonggong, stridor, demam ringan. Diagnosis?","options":["Croup","Bronkiolitis","Epiglotitis","Pneumonia","Batuk rejan"],"answer":0,"topic":"Pulmonologi","explanation":"Croup (Laryngotracheobronchitis): usia 6 bulan - 3 tahun (puncak 1-2 tahun) + batuk menggonggong (barking cough) + stridor inspirasi + suara serak/berat (hoarseness) + demam ringan-sedang."},{"id":"ika2_36","q":"Anak 2 tahun menderita cacar air dengan defisiensi imun, terapi yang tepat?","options":["Asiklovir saja","Asiklovir + sefotaksim","Kotrimoksazol","Simtomatis saja","Asiklovir + IVIG"],"answer":0,"topic":"Infeksi","explanation":"Varicella (cacar air) pada anak imunokompromais: ASIKLOVIR IV dosis tinggi (10 mg/kgBB/dosis tiap 8 jam) adalah terapi utama untuk mencegah komplikasi berat (varicella diseminata, pneumonia varicella, ensefalitis)."},{"id":"ika2_38","q":"Anak dengan ruam makulopapular diawali dari kepala ke seluruh tubuh disertai demam. Diagnosis?","options":["Campak","Cacar air","Gondok","Herpes","Rubela"],"answer":0,"topic":"Infeksi","explanation":"Campak (Morbili) - ruam cephalocaudal (mulai kepala ke leher ke badan ke ekstremitas) adalah ciri khas campak. Didahului prodromal 3-4 hari (demam, 3C = Cough, Coryza, Conjunctivitis) + Koplik spots."},{"id":"cbt_1","q":"A 8 months old baby had high temperature for 10 hours followed by a 2 minutes tonic clonic generalized seizure. Right ear secretion discovered, no more seizures occurred. Diagnosis?","options":["Simple febrile seizure","Partial epilepsy","Complex febrile seizure","Myoclonic epilepsy","Unprovoked epilepsy"],"answer":0,"topic":"Neurologi","explanation":"Kejang Demam SEDERHANA: (1) usia 6 bulan-5 tahun, (2) kejang tonik-klonik umum, (3) durasi <15 menit (2 menit = singkat), (4) hanya 1x dalam 24 jam, (5) tidak ada defisit neurologis pasca kejang, (6) ada demam (otitis me..."},{"id":"cbt_2","q":"A neonate born at 37 weeks with birth weight 2700 gr. Parents brought the neonate for routine visit at 1 month of age. What is the minimum current body weight expected?","options":["3000-3100 gr","3350-3400 gr","3250-3300 gr","3500-3600 gr","3150-3200 gr"],"answer":3,"topic":"Neonatologi","explanation":"Pertumbuhan berat badan bayi bulan pertama: bayi kembali ke BB lahir pada usia 10-14 hari, lalu tumbuh rata-rata 25-30 gram/hari atau sekitar 200 gram/minggu."},{"id":"cbt_3","q":"You manage a neonate with PDA and expect the closure with non invasive procedure. What do you choose to accelerate the closure?","options":["Ibuprofen","Dexamethasone","Epinephrine","Diphenhydramine","Morphine"],"answer":0,"topic":"Kardiologi","explanation":"IBUPROFEN (atau Indometasin) adalah terapi farmakologis lini pertama untuk menutup PDA pada bayi prematur. Mekanisme: duktus arteriosus dipertahankan oleh prostaglandin E2 (PGE2)."},{"id":"cbt_4","q":"You suspect PDA when assessing a newborn infant. You associated your conclusion with the gestational age of the infant at?","options":["35-37 weeks","<32 weeks",">40 weeks","32-34 weeks","38-40 weeks"],"answer":1,"topic":"Kardiologi","explanation":"PDA paling sering dan paling signifikan secara klinis pada bayi PREMATUR SANGAT AWAL yaitu usia gestasi <32 minggu."},{"id":"cbt_5","q":"A posyandu provider reports a boy aged 4 years with WFA <-2 SD, HFA <-3 SD, WFH >+2 SD. Conclusion regarding nutritional status?","options":["Underweight, severely stunted, wasted","Normoweight, severely stunted, overweight","Underweight, severely stunted, obese","Normoweight, severely stunted, obese","Underweight, moderately stunted, overweight"],"answer":3,"topic":"Nutrisi","explanation":"Interpretasi indikator gizi WHO: (1) HFA (TB/U) <-3 SD = SEVERELY STUNTED. (2) WFH (BB/TB) >+2 SD = OBESE."},{"id":"cbt_6","q":"Which birthweight carries the highest potential risk for iron deficiency anemia before age 2 years?","options":["Birthweight 3000-3500g","Birthweight 2500-3000g","Birthweight 3500-4000g","Birthweight <2500g","Birthweight >4000g"],"answer":3,"topic":"Hematologi-Onkologi","explanation":"BBLR (<2500 gram) memiliki risiko tertinggi anemia defisiensi besi sebelum usia 2 tahun karena: (1) Cadangan besi janin terakumulasi di trimester ketiga, sehingga bayi prematur/BBLR memiliki cadangan besi lebih sedikit."},{"id":"cbt_7","q":"You meet a 3 years old boy with body weight below -2 SD. This malnutrition is associated with imbalance of nutritional?","options":["Processing and digestion","Needs and processing","Needs and intake","Digestion and consumption","Intake and processing"],"answer":2,"topic":"Nutrisi","explanation":"Malnutrisi didefinisikan sebagai ketidakseimbangan antara KEBUTUHAN (needs) dan ASUPAN (intake) nutrisi. Ketika asupan lebih rendah dari kebutuhan tubuh dalam waktu lama, terjadi deplesi cadangan dan malnutrisi."},{"id":"cbt_8","q":"A 12 years-old female came to ER with soporo-comatous consciousness, tachypnea and deep breathing. Random blood glucose 600 mg/dL. Most likely diagnosis?","options":["Metabolic syndrome","Diabetic ketoacidosis","Diabetes Mellitus","Pneumonia","Hyperglycemic stress"],"answer":1,"topic":"Endokrinologi","explanation":"KAD (Ketoasidosis Diabetikum): Triad diagnostik = (1) Hiperglikemia berat GDS 600 mg/dL (>250 mg/dL batas DKA), (2) Asidosis metabolik dengan napas Kussmaul yaitu deep breathing dan tachypnea sebagai kompensasi asidosis,..."},{"id":"cbt_9","q":"A mother asks about weaning preparation as her baby almost reaches 6 months exclusive breastfeeding. What is the most important concept in weaning to tell?","options":["Energy density should exceed that of breastmilk","Begin exactly at age 6 months, no more or less","Breastmilk can be stopped once weaning starts","Introduce various food at a time to enrich nutrition","Encourage bottle rather than cup to increase satiety"],"answer":0,"topic":"Nutrisi","explanation":"Konsep TERPENTING dalam MPASI: ENERGY DENSITY (kepadatan energi) MPASI harus LEBIH TINGGI dari ASI. ASI memiliki energi sekitar 67 kkal/100 mL."},{"id":"cbt_13","q":"A 8 months old baby presented 2x with tonic clonic generalized seizures following high temperature. Right ear secretion found. What is your first management?","options":["Fluid resuscitation","High flow oxygen","Diazepam","Antibiotics","Antipyretic"],"answer":4,"topic":"Neurologi","explanation":"PENANGANAN AWAL kejang demam yang sudah berhenti (bayi tidak sedang kejang saat datang): ANTIPIRETIK (paracetamol atau ibuprofen), karena pemicunya adalah DEMAM."},{"id":"cbt_14","q":"A neonate born from HIV positive mother. Born vigorously and drinks formula. Mother has been on ART for 1 year. Will you give BCG vaccination?","options":["Yes, as the mother has been on ART","No, it can lead to BCG disseminated infection","No, it can lead to tuberculosis disseminated infection","Yes, it is safe as the baby is born vigorously","No, it is contraindicated"],"answer":1,"topic":"Imunisasi","explanation":"BCG DIKONTRAINDIKASIKAN pada neonatus lahir dari ibu HIV positif karena status HIV bayi belum terkonfirmasi. BCG adalah vaksin HIDUP yang dapat menyebabkan BCG-osis diseminata pada bayi imunosupresi."},{"id":"cbt_15","q":"A 7-year old boy experienced generalized seizure for 2 days, thrice daily, lasting 2-4 minutes, fully conscious after attacks. Remarkable good condition. Possible diagnosis?","options":["Status epilepticus","Meningitis","Encephalitis","Epilepsy","Complex febrile seizures"],"answer":3,"topic":"Neurologi","explanation":"EPILEPSI: kejang berulang (>=2 kali) tanpa provokasi demam atau infeksi. Kasus ini: kejang umum 3x/hari selama 2 hari, tidak disebutkan demam, anak dalam kondisi BAIK, dan SADAR PENUH setelah serangan (tidak ada posiktal..."},{"id":"cbt_16","q":"New Ballard assessment of the baby at 29 weeks old gestational age classified the baby as?","options":["Extremely preterm baby","Near term baby","Moderate preterm","Very preterm baby","Postterm baby"],"answer":3,"topic":"Neonatologi","explanation":"Klasifikasi prematuritas berdasarkan usia gestasi (WHO): Extremely preterm <28 minggu; Very preterm 28 hingga <32 minggu; Moderate preterm 32 hingga <34 minggu; Late preterm/near term 34 hingga <37 minggu;"},{"id":"cbt_17","q":"At one minute of age, baby experienced central cyanosis, gasping respiration, heart rate 70, floppy tone and facial grimacing but no crying. APGAR score is?","options":["4","3","7","6","8"],"answer":0,"topic":"Neonatologi","explanation":"Skor APGAR: 5 komponen masing-masing 0-1-2: (1) Appearance/warna kulit: Central cyanosis = 1. (2) Pulse/HR: HR 70 = 1 (HR <100 = skor 1). (3) Grimace/refleks: Facial grimacing = 1 (meringis tanpa menangis)."},{"id":"cbt_21","q":"A 2 years old boy had high grade fever for 4 days, red rashes on face spreading to neck and chest. His neighbor was hospitalized due to dyspnea with the same complaint. Most likely diagnosis?","options":["Scarlet fever","Rubella","Exanthem subitum","Measles","Varicella"],"answer":3,"topic":"Infeksi","explanation":"CAMPAK (Measles): (1) WABAH (tetangga juga sakit = cluster/KLB, campak sangat menular R0=12-18), (2) Demam tinggi 4 hari sebelum ruam (prodromal panjang dengan 3C: Cough, Coryza, Conjunctivitis), (3) Ruam dimulai MUKA ke..."},{"id":"cbt_22","q":"A pediatric patient came with red urine. Urine test positive but no erythrocytes detected in high power field. Possible cause?","options":["Iron sorbitol","Melanin","Myoglobin","Porphyrin","Methemoglobin"],"answer":2,"topic":"Nefrologi","explanation":"Urin merah TANPA eritrosit di sedimen urin = bukan hematuria sejati. Penyebab utama: MIOGLOBIN (mioglobinuria) dari rhabdomiolisis atau trauma otot masif."},{"id":"cbt_23","q":"A midwife refers a patient with red urine and swelling both legs. Physical examination shows hypertension. First differential diagnosis?","options":["Urinary tract infection","Ureter kinking","Glomerulonephritis","Nephrotic syndrome","Bladder stone"],"answer":2,"topic":"Nefrologi","explanation":"GLOMERULONEFRITIS (GN)/Sindrom Nefritik: TRIAS KLASIK = (1) Hematuria (urin merah/cola-colored), (2) Edema (bengkak kedua kaki = retensi Na dan air), (3) HIPERTENSI (tanda khas GN, membedakan dari sindrom nefrotik yang b..."},{"id":"cbt_24","q":"A 12 years old girl confirmed having rheumatic heart disease. Which heart valve is most affected?","options":["Semilunar","Mitral","Aortic","Pulmonary","Tricuspid"],"answer":1,"topic":"Kardiologi","explanation":"KATUP MITRAL adalah katup yang paling sering terkena pada Penyakit Jantung Rematik. Urutan frekuensi: Mitral (65-70%) > Aorta (25%) > Trikuspid (10%) > Pulmonal (<5%)."},{"id":"cbt_25","q":"An 8-years-old girl with palpitation. Wide and fixed split S2, ejection systolic murmur at 2nd ICS left parasternal. ECG: RVH. CXR: CTR 0.8 and upward apex. Most likely diagnosis?","options":["Aortic stenosis","Pulmonary stenosis","Tetralogy of Fallot","Atrial Septal Defect","Persistent foramen ovale"],"answer":3,"topic":"Kardiologi","explanation":"ASD (Atrial Septal Defect): TANDA KHAS = S2 WIDE AND FIXED SPLIT (tidak berubah dengan pernapasan = PATHOGNOMONIC ASD)."},{"id":"cbt_26","q":"A girl, 8 years old, polyuria, polyphagia and polydipsia. No family history of diabetes. Blood glucose 450 mg/dL, HbA1C 15%, C-Peptide 0.1 (low). Diagnosis?","options":["Monogenic Diabetes Mellitus","Steroid-induced Diabetes Mellitus","Type 2 Diabetes Mellitus","Type 1 Diabetes Mellitus","Neonatal Diabetes Mellitus"],"answer":3,"topic":"Endokrinologi","explanation":"DM TIPE 1: C-peptide RENDAH (0.1) adalah KUNCI DIAGNOSIS. C-peptide adalah fragmen pro-insulin yang dihasilkan bersama insulin oleh sel beta pankreas."},{"id":"cbt_27","q":"A 8 year old girl experienced urticaria hence you prescribed antihistamine. What is the correct statement about antihistamine mechanism?","options":["AH inhibits binding of specific IgE","AH competitively binds H receptor","AH stops histamine released by mast cell","AH stops histamine released by dendritic cell","AH inhibits histamine binding to allergen"],"answer":1,"topic":"Alergi-Imunologi","explanation":"ANTIHISTAMIN: mekanisme kerja = ANTAGONIS KOMPETITIF RESEPTOR HISTAMIN. AH berikatan secara kompetitif dan reversibel dengan reseptor H1 (di kulit, saluran napas) atau H2 (di lambung), mencegah histamin berikatan dan mem..."},{"id":"cbt_28","q":"A 6 years old boy was brought to ER due to repetitive cough. Father reported the boy choked on a pin 2 days before. X-ray: pin in the left bronchus. What is your next plan?","options":["Perform abdominal thrusts","Perform Heimlich manoeuvre","Perform back blow","Perform bronchoscopy","Perform jaw thrust"],"answer":3,"topic":"Kegawatdaruratan","explanation":"BENDA ASING di bronkus dikonfirmasi X-ray = BRONKOSKOPI RIGID adalah prosedur diagnostik sekaligus terapeutik PILIHAN UTAMA."},{"id":"cbt_29","q":"Parents brought their yellowish neonate. Kramer 4 jaundice found. What is your pre-assumption for the indirect bilirubin level?","options":["2-4 mg/dL","14-16 mg/dL","5-7 mg/dL","8-10 mg/dL","11-13 mg/dL"],"answer":1,"topic":"Neonatologi","explanation":"Klasifikasi IKTERUS KRAMER: Kramer 1 kepala dan leher = bilirubin ~5-7 mg/dL; Kramer 2 kepala + badan atas = ~7-10 mg/dL; Kramer 3 kepala + badan hingga paha = ~10-13 mg/dL;"},{"id":"cbt_31","q":"You heard a medium pitched high grade continuous murmur best at the pulmonic position, with a harsh machine-like quality that often radiates to the left clavicle. Which congenital heart anomaly?","options":["Coarctation of the aorta","Patent ductus arteriosus","Transposition of great arteries","Atrial septal defect","Ventricular septal defect"],"answer":1,"topic":"Kardiologi","explanation":"BISING PDA: BISING KONTINU (continuous/machinery murmur) yang terus-menerus sepanjang sistol dan diastol."},{"id":"cbt_32","q":"A boy, 1 year old, WFA z-score +1 SD and BMI for age >+2 SD. According to WHO growth chart 2006, what is your advice?","options":["Give all food as low glycemic index","Continue diet and monitor every 3 months","Increase the amount of food intake","Increase the physical activity","Reduce the amount of food intake"],"answer":3,"topic":"Nutrisi","explanation":"Interpretasi: WFA +1 SD = berat badan NORMAL. BMI/U >+2 SD = OVERWEIGHT/risiko obesitas. Pada anak usia 1 tahun dengan BMI tinggi: TIDAK dianjurkan restriksi kalori ketat karena fase pertumbuhan otak sangat pesat."},{"id":"cbt_33","q":"A mother brought her 3 months old baby with specific IgE positive for milk allergy. Which allergy manifestation will be most possible?","options":["Eczema","Generalized urticaria","Anaphylaxis","Allergic rhinitis","Asthma"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Pada BAYI USIA 3 BULAN dengan alergi susu sapi IgE-mediated, manifestasi TERSERING dan PALING MUNGKIN adalah EKSEMA/DERMATITIS ATOPIK. Pada bayi, kulit adalah organ target utama alergi."},{"id":"cbt_34","q":"Which is the most common cross-placenta transfer of maternal infection for her baby?","options":["Syphilis","Covid","HIV","Tuberculosis","Toxoplasmosis"],"answer":0,"topic":"Infeksi","explanation":"SIFILIS (Treponema pallidum) adalah infeksi yang PALING EFISIEN melintas plasenta dengan transmisi vertikal hampir 100% pada sifilis primer dan sekunder yang tidak diobati."},{"id":"cbt_35","q":"A boy born March 18, 2020 was brought on November 23, 2021 for vaccination, having received complete vaccination including MR first dose at 9 months. What is the live booster vaccine indicated?","options":["PCV","Influenza","DPT","MR","Rotavirus"],"answer":3,"topic":"Imunisasi","explanation":"Usia anak: lahir 18 Maret 2020, datang 23 November 2021 = usia 20 bulan. Vaksin MR (Measles-Rubella): dosis pertama usia 9 bulan (sudah diberikan), dosis KEDUA/BOOSTER usia 18 BULAN."},{"id":"cbt_36","q":"What is the most important and effective action in neonatal resuscitation?","options":["Oxygenation of systemic organs","Ventilate the brain","Maintain pulmonary arteriole constriction","Ventilate the lungs","Oxygenation of venous systemic blood"],"answer":3,"topic":"Neonatologi","explanation":"VENTILASI PARU adalah tindakan PALING PENTING dan EFEKTIF dalam resusitasi neonatus. Penyebab kardiopulmonary arrest pada neonatus hampir selalu karena GAGAL NAPAS bukan henti jantung primer."},{"id":"cbt_37","q":"A 3 years old girl with productive cough for 3 weeks. Father diagnosed with TB smear (++). Girl 12 kg, all systems normal. Tuberculin test 13 mm induration. Management?","options":["FDC 2HRZ/8HR","FDC 2HRZ/4HR","FDC 2HRZE/12HR","FDC 2HRZE/8HR","FDC 2HRZE/10HR"],"answer":1,"topic":"Infeksi","explanation":"TERAPI TB ANAK tanpa komplikasi. Skor TB: kontak BTA ++ (3 poin) + uji tuberkulin positif (3 poin) + batuk >2 minggu (1 poin) = total >=6 poin maka TERAPI TB."},{"id":"cbt_38","q":"Breastmilk is rich in non-specific and specific immunological properties. Which is the SPECIFIC immune found in breastmilk?","options":["Immunoglobulin G","Immunoglobulin F","Immunoglobulin A","Immunoglobulin M","Immunoglobulin D"],"answer":2,"topic":"Nutrisi","explanation":"IgA SEKRETORI (Secretory IgA/sIgA) adalah imunoglobulin SPESIFIK utama dalam ASI. sIgA adalah komponen IMUNITAS SPESIFIK (adaptive/acquired) karena dibentuk sebagai respons spesifik terhadap antigen yang terpapar pada ib..."},{"id":"cbt_39","q":"A 9 year old asthmatic patient needs salbutamol daily especially when exercising, and coughing fits awaken her from sleep twice a week. Most appropriate management?","options":["Short-acting inhaled beta agonist as needed","Daily leukotriene modifier with short acting beta-agonist","Medium-dose inhaled corticosteroid with short acting beta-agonist","High dose inhaled corticosteroid with theophylline and short acting beta-agonist","Inhaled nedocromil with short acting beta-agonist"],"answer":2,"topic":"Pulmonologi","explanation":"Klasifikasi GINA: salbutamol HARIAN + batuk malam 2x/minggu = ASMA PERSISTEN SEDANG (Moderate Persistent Asthma). Kriteria: gejala harian, gejala malam >1x/minggu, SABA digunakan hampir setiap hari."},{"id":"cbt_41","q":"Visual analog scale is a subjective score to measure severity of a problem. In which problem is VAS normally applied?","options":["Fear","Pain","Depression","Fever","Anxiety"],"answer":1,"topic":"Kegawatdaruratan","explanation":"Visual Analog Scale (VAS) untuk NYERI (Pain) adalah penggunaan standar dan tersering. VAS nyeri: garis 10 cm dari 0 (tidak nyeri) sampai 10 (nyeri terberat). Pada anak: untuk anak >6 tahun."},{"id":"cbt_42","q":"Your vaccination team asks for storage temperature for oral polio vaccine. What was your answer in degrees Celsius?","options":["3-4","7-8","1-2","5-6","2-8"],"answer":4,"topic":"Imunisasi","explanation":"SUHU PENYIMPANAN VAKSIN (Cold Chain): OPV (Oral Polio Vaccine) dapat disimpan -15 sampai -25 derajat Celsius untuk jangka panjang ATAU 2-8 derajat Celsius untuk jangka pendek."},{"id":"cbt_43","q":"A 10 days old baby ca
