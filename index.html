<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tryout PPDS Pediatri PRO</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
}
.container { max-width: 1000px; margin: auto; }
h1 { text-align: center; color: #60a5fa; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
.menu-section { text-align: center; padding: 40px 20px; }
.btn {
  padding: 14px 30px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 10px;
  font-size: 16px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
}
.btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-small { padding: 10px 20px; font-size: 14px; margin: 5px; }
.btn-info { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); padding: 10px 20px; font-size: 13px; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #1e293b; border-radius: 10px; }
.progress { font-size: 18px; font-weight: bold; color: #60a5fa; }
.soal-no { font-size: 14px; color: #94a3b8; }
.timer { font-weight: bold; font-size: 20px; color: #facc15; display: flex; align-items: center; gap: 8px; }
.timer.danger { color: #ff6b6b; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.qbox { background: #1e293b; padding: 25px; border-radius: 12px; border-left: 4px solid #7c3aed; margin-bottom: 20px; }
.question-text { font-size: 18px; line-height: 1.7; margin-bottom: 20px; color: #e2e8f0; }
.options-container { display: flex; flex-direction: column; gap: 10px; }
.opt {
  display: block;
  padding: 15px;
  background: #334155;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 2px solid transparent;
  user-select: none;
  text-align: left;
}
.opt:hover { background: #475569; border-color: #7c3aed; }
.opt.selected { background: #7c3aed; border-color: #a855f7; box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
.btn-show-analysis { padding: 12px 24px; margin-top: 20px; font-size: 14px; }
.analysis-box {
  background: #064e3b;
  border: 2px solid #059669;
  color: #a7f3d0;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  line-height: 1.8;
  display: none;
}
.analysis-box.show { display: block; }
.analysis-title { color: #d1fae5; font-weight: bold; font-size: 16px; margin-bottom: 12px; }
.analysis-content { color: #a7f3d0; font-size: 14px; }
.nav { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
.results-section { text-align: center; padding: 40px; background: #1e293b; border-radius: 12px; }
.score-display { font-size: 48px; color: #10b981; margin: 20px 0; font-weight: bold; }
.percentage { font-size: 24px; color: #60a5fa; margin-bottom: 30px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
.stat-box { background: #334155; padding: 20px; border-radius: 10px; text-align: center; }
.stat-number { font-size: 32px; color: #60a5fa; font-weight: bold; }
.stat-label { color: #94a3b8; font-size: 14px; margin-top: 5px; }
.review-section { margin-top: 30px; }
.review-item { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #7c3aed; text-align: left; }
.review-item.correct { border-left-color: #10b981; }
.review-item.incorrect { border-left-color: #ef4444; }
.review-question { font-weight: bold; color: #60a5fa; margin-bottom: 10px; font-size: 15px; }
.review-answer { margin: 8px 0; padding: 8px; background: #0f172a; border-radius: 6px; }
.answer-label { color: #94a3b8; font-size: 13px; }
.answer-value { color: #e2e8f0; font-weight: 500; }
.answer-correct { color: #10b981; }
.answer-incorrect { color: #ef4444; }
.analysis { margin-top: 15px; padding: 15px; background: #334155; border-radius: 8px; font-size: 13px; border-left: 4px solid #facc15; line-height: 1.7; }
.info-banner { background: #064e3b; border: 1px solid #059669; color: #a7f3d0; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 13px; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #94a3b8; }
.spinner { border: 4px solid #334155; border-top: 4px solid #06b6d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
<h1>🏥 Tryout PPDS Pediatri PRO</h1>
<p class="subtitle">Dengan Analisis Detail Lengkap</p>

<div id="menu" class="menu-section">
  <div class="info-banner">
    ✅ <strong>Soal Lengkap</strong> - Setiap soal dilengkapi dengan analisis mendalam
  </div>
  
  <button class="btn" onclick="startQuiz(10)">📚 Mulai 10 Soal</button>
  <button class="btn" onclick="startQuiz(20)">📚 Mulai 20 Soal</button>
  <button class="btn" onclick="startQuiz(50)">🏆 Mulai 50 Soal</button>
  <button class="btn" onclick="startQuiz(100)">🎯 Mulai 100 Soal</button>
</div>

<div id="quiz"></div>
</div>

<script src="soal_format_lengkap.js"></script>

<script>
// ============= SHUFFLE =============
function shuffleArray(array) {
  const arr = [...array]
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]]
  }
  return arr
}

// ============= VARIABLES =============
let soal = []
let current = 0
let score = 0
let answers = []
let timer = 0
let interval

// ============= START QUIZ =============
function startQuiz(jumlah) {
  if (typeof allSoal === 'undefined' || !Array.isArray(allSoal)) {
    alert('❌ Error: File soal_format_lengkap.js tidak ter-load.')
    return
  }
  
  if (allSoal.length === 0) {
    alert('❌ Error: Tidak ada soal di file.')
    return
  }
  
  document.getElementById("menu").style.display = "none"
  document.getElementById("quiz").innerHTML = '<div class="loading"><div class="spinner"></div>⏳ Memuat soal...</div>'
  
  setTimeout(() => {
    try {
      soal = shuffleArray(allSoal).slice(0, Math.min(jumlah, allSoal.length))
      
      current = 0
      score = 0
      answers = new Array(soal.length)
      
      console.log(`✅ Quiz siap: ${soal.length} soal`)
      
      startTimer(jumlah)
      render()
      
    } catch(e) {
      console.error(e)
      document.getElementById("quiz").innerHTML = `
        <div style="background: #7f1d1d; color: #fecaca; padding: 15px; border-radius: 8px;">
          ❌ Error: ${e.message}
        </div>
        <button class="btn" onclick="location.reload()">Coba Lagi</button>
      `
    }
  }, 500)
}

// ============= TIMER =============
function startTimer(jumlah) {
  timer = jumlah * 60
  interval = setInterval(() => {
    timer--
    let m = Math.floor(timer / 60)
    let s = timer % 60
    let el = document.getElementById("timer")
    if (el) {
      el.innerText = `${m}:${s.toString().padStart(2,'0')}`
      if (timer < 300) el.parentElement.classList.add("danger")
    }
    if (timer <= 0) {
      clearInterval(interval)
      finish()
    }
  }, 1000)
}

// ============= RENDER =============
function render() {
  if (current >= soal.length) {
    finish()
    return
  }
  
  const q = soal[current]
  
  let html = `
  <div class="quiz-header">
    <div>
      <div class="progress">Soal ${current + 1}/${soal.length}</div>
      <div class="soal-no">No. ${q.soalNo || current + 1}</div>
    </div>
    <div class="timer">⏱ <span id="timer">--:--</span></div>
  </div>
  
  <div class="qbox">
    <div class="question-text">${q.question}</div>
    <div class="options-container">
  `
  
  q.options.forEach(opt => {
    const optionLetter = opt.charAt(0)
    const selected = answers[current] === optionLetter ? "selected" : ""
    html += `<div class="opt ${selected}" onclick="selectAnswer('${optionLetter}')">${opt}</div>`
  })
  
  html += `
    </div>
    
    <button class="btn btn-info btn-show-analysis" onclick="toggleAnalysis()">📖 Lihat Analisis</button>
    
    <div id="analysisBox" class="analysis-box">
      <div class="analysis-title">✓ Jawaban: ${q.jawaban}</div>
      <div class="analysis-content">${q.analysis}</div>
    </div>
  </div>
  
  <div class="nav">
    <button class="btn btn-small" onclick="prev()" ${current === 0 ? "disabled" : ""}>← Sebelumnya</button>
    <button class="btn btn-small" onclick="next()">${current === soal.length - 1 ? "✓ Selesai" : "Selanjutnya →"}</button>
  </div>
  `
  
  document.getElementById("quiz").innerHTML = html
}

// ============= TOGGLE ANALYSIS =============
function toggleAnalysis() {
  const box = document.getElementById("analysisBox")
  box.classList.toggle("show")
}

// ============= SELECT ANSWER =============
function selectAnswer(val) {
  answers[current] = val
  render()
}

// ============= NAVIGATION =============
function next() {
  if (current < soal.length - 1) {
    current++
    render()
  } else {
    finish()
  }
}

function prev() {
  if (current > 0) {
    current--
    render()
  }
}

// ============= FINISH =============
function finish() {
  clearInterval(interval)
  
  score = 0
  soal.forEach((q, i) => {
    if (answers[i] === q.answer) score++
  })
  
  let pct = Math.round((score / soal.length) * 100)
  
  let html = `
  <div class="results-section">
    <h2>✅ Kuis Selesai!</h2>
    <div class="score-display">${score} / ${soal.length}</div>
    <div class="percentage">${pct}%</div>
    
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-number">${score}</div><div class="stat-label">Benar</div></div>
      <div class="stat-box"><div class="stat-number">${soal.length - score}</div><div class="stat-label">Salah</div></div>
    </div>
    
    <button class="btn" onclick="review()">📖 Review</button>
    <button class="btn" onclick="location.reload()">🔄 Ulang</button>
  </div>
  `
  
  document.getElementById("quiz").innerHTML = html
}

// ============= REVIEW =============
function review() {
  let html = "<h2>📋 Review Jawaban</h2>"
  
  soal.forEach((q, i) => {
    let ua = answers[i] || "-"
    let ok = ua === q.answer
    
    html += `
    <div class="review-item ${ok ? 'correct' : 'incorrect'}">
      <div class="review-question">Soal ${i+1} (No. ${q.soalNo || i + 1}): ${q.question}</div>
      <div class="review-answer">
        <div class="answer-label">Jawaban Anda:</div>
        <div class="answer-value ${ok ? 'answer-correct' : 'answer-incorrect'}">${ua || '-'} ${ok ? '✓' : '✗'}</div>
      </div>
      ${!ok ? `<div class="review-answer"><div class="answer-label">Jawaban Benar:</div><div class="answer-value answer-correct">${q.jawaban}</div></div>` : ''}
      <div class="analysis">
        <strong>Analisis:</strong><br>
        ${q.analysis}
      </div>
    </div>
    `
  })
  
  html += '<div style="text-align:center; margin-top:30px;"><button class="btn" onclick="location.reload()">🔄 Mulai Lagi</button></div>'
  
  document.getElementById("quiz").innerHTML = html
}

// ============= ON LOAD =============
window.addEventListener('load', () => {
  console.log(`📚 Total soal tersedia: ${allSoal.length}`)
})
</script>

</body>
</html>
