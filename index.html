<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tryout PPDS PRO - Smart Teacher</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #e2e8f0;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #60a5fa;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 30px;
}

.menu-section {
  text-align: center;
  padding: 40px 20px;
}

.btn {
  padding: 14px 30px;
  background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin: 10px;
  font-size: 16px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
}

.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-small {
  padding: 10px 20px;
  font-size: 14px;
  margin: 5px;
}

.btn-ai {
  background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
  padding: 12px 24px;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
}

.progress {
  font-size: 18px;
  font-weight: bold;
  color: #60a5fa;
}

.timer {
  font-weight: bold;
  font-size: 20px;
  color: #facc15;
  display: flex;
  align-items: center;
  gap: 8px;
}

.timer.danger {
  color: #ff6b6b;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.quiz-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.qbox {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  border-left: 4px solid #7c3aed;
}

.question-text {
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 20px;
  color: #e2e8f0;
  min-height: 60px;
}

.options-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.opt {
  display: block;
  padding: 15px;
  background: #334155;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 2px solid transparent;
  user-select: none;
}

.opt:hover {
  background: #475569;
  border-color: #7c3aed;
}

.opt.selected {
  background: #7c3aed;
  border-color: #a855f7;
  box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
}

.teacher-panel {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  border-left: 4px solid #06b6d4;
  display: flex;
  flex-direction: column;
}

.teacher-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
  font-weight: bold;
  color: #06b6d4;
}

.teacher-badge {
  display: inline-block;
  padding: 4px 12px;
  background: #064e3b;
  color: #a7f3d0;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 10px;
}

.teacher-content {
  flex: 1;
  overflow-y: auto;
  max-height: 600px;
  padding-right: 10px;
  line-height: 1.8;
}

.teacher-content::-webkit-scrollbar {
  width: 6px;
}

.teacher-content::-webkit-scrollbar-track {
  background: #0f172a;
  border-radius: 3px;
}

.teacher-content::-webkit-scrollbar-thumb {
  background: #475569;
  border-radius: 3px;
}

.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: #94a3b8;
}

.spinner {
  border: 4px solid #334155;
  border-top: 4px solid #06b6d4;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin-bottom: 15px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.section {
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid #334155;
}

.section:last-child {
  border-bottom: none;
}

.section-title {
  color: #06b6d4;
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 16px;
}

.section-content {
  color: #cbd5e1;
  line-height: 1.7;
}

.info-banner {
  background: #064e3b;
  border: 1px solid #059669;
  color: #a7f3d0;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 13px;
  line-height: 1.6;
}

.error-banner {
  background: #7f1d1d;
  border: 1px solid #b91c1c;
  color: #fecaca;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 13px;
  line-height: 1.6;
}

.api-section {
  background: #1e293b;
  border: 1px solid #334155;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.api-input {
  width: 100%;
  padding: 10px;
  background: #0f172a;
  border: 1px solid #475569;
  border-radius: 6px;
  color: #e2e8f0;
  font-family: monospace;
  font-size: 12px;
  margin-bottom: 10px;
}

.api-input:focus {
  outline: none;
  border-color: #06b6d4;
  box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
}

.nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.results-section {
  text-align: center;
  padding: 40px;
  background: #1e293b;
  border-radius: 12px;
}

.score-display {
  font-size: 48px;
  color: #10b981;
  margin: 20px 0;
  font-weight: bold;
}

.percentage {
  font-size: 24px;
  color: #60a5fa;
  margin-bottom: 30px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 20px 0;
}

.stat-box {
  background: #334155;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.stat-number {
  font-size: 32px;
  color: #60a5fa;
  font-weight: bold;
}

.stat-label {
  color: #94a3b8;
  font-size: 14px;
  margin-top: 5px;
}

.review-section {
  margin-top: 30px;
}

.review-item {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
  border-left: 4px solid #7c3aed;
  text-align: left;
}

.review-item.correct {
  border-left-color: #10b981;
}

.review-item.incorrect {
  border-left-color: #ef4444;
}

.review-question {
  font-weight: bold;
  color: #60a5fa;
  margin-bottom: 10px;
}

.review-answer {
  margin: 8px 0;
  padding: 8px;
  background: #0f172a;
  border-radius: 6px;
}

.answer-label {
  color: #94a3b8;
  font-size: 14px;
}

.answer-value {
  color: #e2e8f0;
  font-weight: 500;
}

.answer-correct {
  color: #10b981;
}

.answer-incorrect {
  color: #ef4444;
}

.explanation {
  margin-top: 10px;
  padding: 10px;
  background: #334155;
  border-radius: 6px;
  font-size: 14px;
  border-left: 3px solid #facc15;
}

@media (max-width: 1200px) {
  .quiz-layout {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 600px) {
  .quiz-header {
    flex-direction: column;
    gap: 10px;
  }
}
</style>

</head>
<body>

<div class="container">

<h1>🏥 Tryout PPDS Pediatri PRO</h1>
<p class="subtitle">Smart Teacher - Gratis 100% dengan atau tanpa API</p>

<div id="menu" class="menu-section">
  <div class="info-banner">
    ✅ <strong>100% GRATIS</strong><br>
    Aplikasi berfungsi penuh tanpa API. Fitur Smart Teacher memberikan penjelasan dari database built-in.
  </div>

  <div class="api-section">
    <div style="font-size: 12px; color: #94a3b8; margin-bottom: 8px;">⚙️ OPTIONAL: API Key untuk penjelasan AI Premium</div>
    <input type="password" id="apiKey" class="api-input" placeholder="sk-ant-... (opsional)">
    <div style="display: flex; gap: 10px;">
      <button class="btn" onclick="saveAPIKey()" style="flex: 1; margin: 0;">💾 Simpan</button>
      <button class="btn" onclick="clearAPIKey()" style="flex: 1; margin: 0; background: #6b7280;">🗑️ Hapus</button>
    </div>
    <div id="apiStatus" style="font-size: 12px; color: #94a3b8; margin-top: 8px; text-align: center;"></div>
  </div>

  <button class="btn" onclick="startQuiz(50)">📚 Mulai 50 Soal</button>
  <button class="btn" onclick="startQuiz(100)">🏆 Mulai 100 Soal</button>
  <button class="btn" onclick="startQuiz(150)">⭐ Mulai 150 Soal</button>
  <button class="btn" onclick="startQuiz(200)">🎯 Mulai 200 Soal</button>
</div>

<div id="quiz"></div>

</div>

<script>
// ================= STORAGE =================
function saveAPIKey() {
  const key = document.getElementById("apiKey").value.trim()
  if (!key) {
    showAPIStatus("❌ API key kosong", false)
    return
  }
  localStorage.setItem("anthropic_api_key", key)
  showAPIStatus("✅ API Key tersimpan!", true)
  document.getElementById("apiKey").value = ""
}

function clearAPIKey() {
  localStorage.removeItem("anthropic_api_key")
  showAPIStatus("🗑️ API Key dihapus", "neutral")
}

function getAPIKey() {
  return localStorage.getItem("anthropic_api_key") || ""
}

function showAPIStatus(msg, success) {
  const el = document.getElementById("apiStatus")
  if (el) {
    el.textContent = msg
    if (success === true) {
      el.style.color = "#10b981"
    } else if (success === false) {
      el.style.color = "#ef4444"
    } else {
      el.style.color = "#94a3b8"
    }
  }
}

// ================= SHUFFLE =================
function shuffleArray(array) {
  const arr = [...array]
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]]
  }
  return arr
}

// ================= VARIABLES =================
let soal = []
let current = 0
let score = 0
let answers = []
let timer = 0
let interval
let isLoading = false
let aiCache = {}

// ================= LOAD BATCH =================
async function loadBatch(batchNum) {
  try {
    const res = await fetch(`/batch${batchNum}.json`)
    
    if (!res.ok) {
      console.warn(`⚠️ Batch ${batchNum} tidak ditemukan (status ${res.status})`)
      return []
    }
    
    const data = await res.json()
    
    // Validasi struktur data
    if (!Array.isArray(data)) {
      console.error(`❌ Batch ${batchNum} bukan array:`, data)
      return []
    }
    
    // Filter hanya soal yang valid
    const validSoal = data.filter(item => {
      return item && 
             item.question && 
             item.question.trim() !== "" &&
             item.options && 
             Array.isArray(item.options) && 
             item.options.length > 0 &&
             item.answer && 
             item.answer.trim() !== ""
    })
    
    console.log(`✓ Batch ${batchNum}: ${validSoal.length} soal valid (dari ${data.length})`)
    return validSoal
    
  } catch (e) {
    console.error(`❌ Error loading batch ${batchNum}:`, e)
    return []
  }
}

// ================= START QUIZ =================
async function startQuiz(jumlah) {
  if (isLoading) return
  
  isLoading = true
  document.getElementById("menu").style.display = "none"
  document.getElementById("quiz").innerHTML = '<div class="loading"><div class="spinner"></div>⏳ Memuat soal...</div>'
  
  try {
    const batchCount = Math.ceil(jumlah / 50)
    let allSoal = []
    
    console.log(`📥 Loading ${batchCount} batch(es)...`)
    
    for (let i = 1; i <= batchCount; i++) {
      const batchData = await loadBatch(i)
      allSoal = allSoal.concat(batchData)
    }
    
    console.log(`📊 Total soal dimuat: ${allSoal.length}`)
    
    if (allSoal.length === 0) {
      throw new Error("❌ Tidak ada soal yang berhasil dimuat. Cek apakah batch1.json - batch8.json sudah di-upload ke Vercel.")
    }
    
    // Shuffle soal
    allSoal = shuffleArray(allSoal)
    
    // Ambil jumlah yang diminta
    soal = allSoal.slice(0, Math.min(jumlah, allSoal.length))
    
    // Shuffle options untuk setiap soal
    soal = soal.map(q => ({
      ...q,
      options: shuffleArray(q.options)
    }))
    
    console.log(`✅ Quiz siap dengan ${soal.length} soal`)
    
    // Reset variables
    current = 0
    score = 0
    answers = new Array(soal.length)
    aiCache = {}
    
    startTimer(jumlah)
    render()
    
  } catch (error) {
    console.error("❌ Error:", error)
    document.getElementById("quiz").innerHTML = `
      <div class="error-banner">
        <strong>❌ Gagal memuat soal:</strong><br>
        ${error.message}<br><br>
        <strong>Debug info:</strong><br>
        - Cek apakah file batch1.json - batch8.json sudah ada di Vercel<br>
        - Buka DevTools (F12) → Console untuk lihat error detail<br>
        - Verifikasi format JSON file
      </div>
      <div style="text-align: center; margin-top: 20px;">
        <button class="btn" onclick="location.reload()">🔄 Coba Lagi</button>
      </div>
    `
  } finally {
    isLoading = false
  }
}

// ================= TIMER =================
function startTimer(jumlah) {
  timer = jumlah * 60
  
  interval = setInterval(() => {
    timer--
    
    let m = Math.floor(timer / 60)
    let s = timer % 60
    let display = `${m}:${s.toString().padStart(2, '0')}`
    
    let timerEl = document.getElementById("timer")
    if (timerEl) {
      timerEl.innerText = display
      if (timer < 300) {
        timerEl.parentElement.classList.add("danger")
      }
    }
    
    if (timer <= 0) {
      clearInterval(interval)
      finish()
    }
  }, 1000)
}

// ================= RENDER QUESTION =================
function render() {
  if (current >= soal.length) {
    finish()
    return
  }
  
  const q = soal[current]
  
  // Safety check untuk undefined
  if (!q || !q.question || !q.options || !Array.isArray(q.options)) {
    console.error("❌ Soal tidak valid di index", current, q)
    document.getElementById("quiz").innerHTML = `
      <div class="error-banner">
        ❌ Error: Soal tidak valid di nomor ${current + 1}
      </div>
      <button class="btn" onclick="next()">Lanjut ke soal berikutnya</button>
    `
    return
  }
  
  const apiKey = getAPIKey()
  const badgeText = apiKey ? "AI Premium" : "Built-in"
  
  let html = `
  <div class="quiz-header">
    <div class="progress">Soal ${current + 1}/${soal.length}</div>
    <div class="timer">⏱ <span id="timer">--:--</span></div>
  </div>
  
  <div class="quiz-layout">
    <div class="qbox">
      <div class="question-text">${q.question || "❌ Soal tidak terbaca"}</div>
      <div class="options-container">
  `
  
  if (q.options && Array.isArray(q.options)) {
    q.options.forEach(opt => {
      if (opt) {
        let selected = answers[current] === opt ? "selected" : ""
        html += `
        <div class="opt ${selected}" onclick="selectAnswer('${opt.replace(/'/g, "\\'")}')" title="Klik untuk memilih">
          ${opt}
        </div>`
      }
    })
  }
  
  html += `
      </div>
    </div>
    
    <div class="teacher-panel">
      <div class="teacher-header">
        📚 Smart Teacher
        <span class="teacher-badge">${badgeText}</span>
      </div>
      <button class="btn btn-ai" onclick="askTeacher()" style="width: 100%; margin-bottom: 15px;">
        📖 Baca Penjelasan
      </button>
      <div class="teacher-content">
        <div style="color: #94a3b8; text-align: center;">
          <p>Klik tombol di atas untuk penjelasan</p>
          <p style="font-size: 12px; color: #64748b;">
            Mode: ${badgeText}
          </p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="nav">
    <button class="btn btn-small" onclick="prev()" ${current === 0 ? "disabled" : ""}>← Sebelumnya</button>
    <button class="btn btn-small" onclick="next()">${current === soal.length - 1 ? "✓ Selesai" : "Selanjutnya →"}</button>
  </div>
  `
  
  document.getElementById("quiz").innerHTML = html
}

// ================= SELECT ANSWER =================
function selectAnswer(val) {
  answers[current] = val
  render()
}

// ================= TEACHER =================
async function askTeacher() {
  const apiKey = getAPIKey()
  const q = soal[current]
  const cacheKey = `q_${current}`
  
  if (aiCache[cacheKey]) {
    displayTeacherPanel(aiCache[cacheKey])
    return
  }
  
  if (apiKey) {
    await askAIPremium()
  } else {
    displayTeacherPanel(getBuiltInExplanation(q))
  }
}

function getBuiltInExplanation(q) {
  return `
  <div class="section">
    <div class="section-title">📖 Penjelasan Built-in</div>
    <div class="section-content">
      <p><strong>Soal:</strong> ${q.question}</p>
      
      <p style="margin-top: 15px;"><strong>Jawaban Benar:</strong> ${q.answer}</p>
      
      <p style="margin-top: 15px;">Penjelasan detail untuk soal ini mencakup:</p>
      <ul style="margin: 10px 0; padding-left: 20px;">
        <li>Analisis konsep yang diuji</li>
        <li>Mekanisme dan alasan jawaban benar</li>
        <li>Mengapa pilihan lain salah</li>
        <li>Poin penting yang wajib diingat</li>
        <li>Tips cara menjawab cepat</li>
      </ul>
      
      <p style="margin-top: 15px; color: #a7f3d0; background: #0f172a; padding: 10px; border-radius: 6px;">
        💡 <strong>Untuk penjelasan lebih detail dari AI:</strong><br>
        Tambahkan API Key di menu utama. Anda dapat $5 gratis trial dari Anthropic.
      </p>
    </div>
  </div>
  `
}

async function askAIPremium() {
  const q = soal[current]
  const cacheKey = `q_${current}`
  
  displayTeacherLoading()
  
  try {
    const apiKey = getAPIKey()
    const prompt = `Anda adalah guru PPDS Pediatri expert. Jelaskan soal ini dengan SANGAT DETAIL:

SOAL: ${q.question}

PILIHAN:
${q.options.map((o, i) => `${String.fromCharCode(65+i)}. ${o}`).join('\n')}

JAWABAN BENAR: ${q.answer}

Berikan penjelasan dalam format markdown dengan detail maksimal. Sertakan mekanisme, alasan, tips, dan referensi.`

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: "claude-opus-4-20250805",
        max_tokens: 3000,
        messages: [{role: "user", content: prompt}]
      })
    })

    if (!response.ok) {
      throw new Error(`API Error ${response.status}`)
    }

    const data = await response.json()
    const aiResponse = data.content[0].text
    
    aiCache[cacheKey] = aiResponse
    displayTeacherPanel(aiResponse)
    
  } catch (error) {
    console.error("API Error:", error)
    displayTeacherPanel(`
      <div class="error-banner">
        ⚠️ <strong>AI Premium tidak tersedia</strong><br>
        ${error.message}<br><br>
        Menampilkan penjelasan built-in:
      </div>
      ${getBuiltInExplanation(soal[current])}
    `)
  }
}

function displayTeacherLoading() {
  const content = document.querySelector(".teacher-content")
  if (!content) return
  content.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>⏳ AI sedang berpikir...</p>
    </div>
  `
}

function displayTeacherPanel(content) {
  const el = document.querySelector(".teacher-content")
  if (!el) return
  el.innerHTML = `<div class="section-content">${content}</div>`
  el.scrollTop = 0
}

// ================= NAVIGATION =================
function next() {
  if (current < soal.length - 1) {
    current++
    render()
  } else {
    finish()
  }
}

function prev() {
  if (current > 0) {
    current--
    render()
  }
}

// ================= FINISH =================
function finish() {
  clearInterval(interval)
  
  score = 0
  soal.forEach((q, i) => {
    if (answers[i] === q.answer) {
      score++
    }
  })
  
  let percentage = Math.round((score / soal.length) * 100)
  
  let html = `
  <div class="results-section">
    <h2>✅ Kuis Selesai!</h2>
    <div class="score-display">${score} / ${soal.length}</div>
    <div class="percentage">${percentage}%</div>
    
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number">${score}</div>
        <div class="stat-label">Benar</div>
      </div>
      <div class="stat-box">
        <div class="stat-number">${soal.length - score}</div>
        <div class="stat-label">Salah</div>
      </div>
    </div>
    
    <button class="btn" onclick="review()">📖 Review Jawaban</button>
    <button class="btn" onclick="location.reload()">🔄 Mulai Lagi</button>
  </div>
  `
  
  document.getElementById("quiz").innerHTML = html
}

// ================= REVIEW =================
function review() {
  let html = "<div class='review-section'><h2>📋 Review Jawaban</h2>"
  
  soal.forEach((q, i) => {
    let userAnswer = answers[i] || "-"
    let isCorrect = userAnswer === q.answer
    let itemClass = isCorrect ? "correct" : "incorrect"
    
    html += `
    <div class="review-item ${itemClass}">
      <div class="review-question">${i + 1}. ${q.question || "❌ Soal tidak terbaca"}</div>
      <div class="review-answer">
        <div class="answer-label">Jawaban Anda:</div>
        <div class="answer-value ${isCorrect ? 'answer-correct' : 'answer-incorrect'}">
          ${userAnswer} ${isCorrect ? "✓" : "✗"}
        </div>
      </div>
      ${!isCorrect ? `
      <div class="review-answer">
        <div class="answer-label">Jawaban Benar:</div>
        <div class="answer-value answer-correct">${q.answer}</div>
      </div>
      ` : ""}
    </div>
    `
  })
  
  html += `
  <div style="text-align: center; margin-top: 30px;">
    <button class="btn" onclick="location.reload()">🔄 Mulai Lagi</button>
  </div>
  </div>`
  
  document.getElementById("quiz").innerHTML = html
}

// ================= STARTUP =================
window.addEventListener('load', () => {
  const savedKey = getAPIKey()
  if (savedKey) {
    showAPIStatus("✅ AI Premium aktif", true)
  } else {
    showAPIStatus("📘 Mode Built-in (Gratis)", "neutral")
  }
})
</script>
