ng tidak berubah dengan respirasi/posisi, dan terdengar di regio sternal kiri atas (area pulmonal)."},{"id":"m4_1","q":"Bayi laki-laki 6 bulan, bentol kemerahan setelah 1 hari lalu disapih dan diberi susu formula sapi. Rewel, menggaruk, tidak mencret/muntah/demam. Diagnosis paling mungkin:","options":["Campak","Dermatitis atopi","Urtikaria karena alergi susu sapi","Rash makulopapular karena infeksi virus","Folikulitis"],"answer":2,"topic":"Alergi-Imunologi","explanation":"Urtikaria akut yang muncul segera setelah paparan susu formula sapi pertama kali merupakan reaksi alergi IgE-mediated terhadap protein susu sapi. Reaksi cepat (immediate type) berupa urtikaria."},{"id":"m4_2","q":"Anak usia 1 tahun 6 bulan, selalu sembelit, belum bisa berjalan dan bicara. Wajah agak sembab, kulit kering kasar, lidah besar, anak tampak pendek. Pemeriksaan penunjang awal:","options":["Darah rutin","Kromosom","Kolonoskopi","TSH dan T4","Bone age / usia tulang"],"answer":3,"topic":"Endokrinologi","explanation":"Gejala hipotiroid kongenital: konstipasi, keterlambatan perkembangan, wajah sembab, kulit kering kasar, makroglosia, perawakan pendek. Pemeriksaan TSH dan FT4 diperlukan untuk diagnosis."},{"id":"m4_3","q":"Bayi 7 bulan, muntah frekuen, gelisah, menjerit berulang. Suhu 39°C, teraba massa di kuadran kanan atas abdomen. Mata cekung, bibir kering. Diagnosis paling mungkin:","options":["Invaginasi","Gastritis","Disentri Basiler","Abdominal Pain","Ulkus peptikum"],"answer":0,"topic":"Gastroenterologi","explanation":"Invaginasi (intususepsi): trias klasik berupa nyeri kolik paroksismal (menjerit), massa abdomen (sausage-shaped), dan BAB darah lendir (red currant jelly stool). Sering pada bayi 6-12 bulan."},{"id":"m4_4","q":"Anak laki-laki 1,5 tahun, panas 3 hari, menangis saat kencing, OUE hiperemis. Diagnosis paling mungkin:","options":["Diare akut dengan infeksi bakterial","Infeksi saluran kemih","Batu saluran kemih","Radang ginjal","Sindrom nefrotik"],"answer":1,"topic":"Nefrologi","explanation":"Demam, disuria (menangis saat kencing), dan hiperemi OUE pada balita mengarah ke infeksi saluran kemih (ISK). Pemeriksaan urinalisis dan kultur urin diperlukan."},{"id":"m4_5","q":"Pada usia 10 bulan, energi total dan perbandingan ASI:MPASI yang benar:","options":["500 kkal, ASI 70%, MPASI 30%","700 kkal, ASI 70%, MPASI 30%","700 kkal, ASI 55%, MPASI 45%","900 kkal, ASI 45%, MPASI 55%","900 kkal, ASI 30%, MPASI 70%"],"answer":2,"topic":"Nutrisi","explanation":"Pada usia 9-11 bulan, kebutuhan energi total sekitar 700 kkal/hari dengan proporsi ASI 55% dan MPASI 45%."},{"id":"m4_6","q":"Mekanisme kompensasi tubuh pada compensated shock:","options":["Takikardia, SVR meningkat, tekanan diastolik meningkat, tekanan nadi menyempit","Takikardia, SVR menurun, tekanan diastolik menurun, tekanan nadi menyempit","Takikardia, SVR meningkat, tekanan diastolik menurun, tekanan nadi melebar","Takikardia, SVR meningkat, tekanan diastolik meningkat, tekanan nadi melebar","Takikardia, SVR menurun, tekanan diastolik meningkat, tekanan nadi menyempit"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Pada compensated shock: takikardia (kompensasi pertama), SVR meningkat (vasokonstriksi), tekanan diastolik meningkat (akibat vasokonstriksi), dan tekanan nadi menyempit (sistolik relatif turun, diastolik naik)."},{"id":"m4_7","q":"Anak laki-laki 11 bulan, BB 7 kg, paska perawatan meningitis tuberkulosa. Sedang pengobatan bulan pertama. Pemantauan yang harus dilakukan:","options":["Pengobatan 6 bulan, pantau tumbuh kembang dan gizi","Pengobatan 9 bulan, pantau tumbuh kembang dan gizi","Pengobatan 1 tahun, pantau tumbuh kembang dan gizi","Pengobatan 15 bulan, pantau tumbuh kembang dan gizi","Pengobatan 24 bulan, pantau tumbuh kembang dan gizi"],"answer":2,"topic":"Infeksi","explanation":"Meningitis tuberkulosa (TB ekstra paru berat) memerlukan pengobatan selama 12 bulan (1 tahun): 2 bulan fase intensif + 10 bulan fase lanjutan. Disertai pemantauan tumbuh kembang dan nutrisi."},{"id":"m4_8","q":"Bayi 2 bulan, sesak napas, batuk pilek 2 hari, demam tidak tinggi. Retraksi dinding dada, wheezing basal, darah rutin normal, foto thoraks air trapping dan hiperinflasi. Tatalaksana:","options":["Nebulisasi bronkodilator, IV Line, antibiotik","Nebulisasi steroid + bronkodilator, antipiretik, antibiotik","Oksigenasi, kortikosteroid, nebulisasi bronkodilator","Oksigenasi, IV line, antibiotik","Oksigenasi, IV line, antipiretik jika perlu"],"answer":4,"topic":"Respirologi","explanation":"Bronkiolitis pada bayi: tatalaksana utama bersifat suportif - oksigenasi, hidrasi (IV line), antipiretik jika demam. Antibiotik dan bronkodilator tidak rutin diberikan pada bronkiolitis."},{"id":"m4_9","q":"Bayi laki-laki 11 bulan, BB 9 kg, diare dehidrasi berat tanpa renjatan. Defisit cairan kurang lebih:","options":["1900-2000 ml","1400-1500 ml","900-1000 ml","400-500 ml"],"answer":2,"topic":"Gastroenterologi","explanation":"Dehidrasi berat = defisit cairan sekitar 10% BB. BB 9 kg x 10% = 900 ml. Jadi defisit cairan kurang lebih 900-1000 ml."},{"id":"m4_10","q":"Anak laki-laki 6,3 tahun, demam tinggi 3 hari, menggigil, berkeringat, mual. Mata kuning, lien Schuffner II. Hb 8,3 gr%, Ht 24%. Usulan pemeriksaan untuk memastikan diagnosis:","options":["Hapusan darah tipis","Tes Widal","Serologi IgG/IgM anti dengue","Urine rutin"],"answer":0,"topic":"Infeksi","explanation":"Gejala demam tinggi menggigil berkeringat (trias malaria), ikterik, splenomegali, anemia mengarah ke malaria. Hapusan darah tipis/tebal merupakan gold standard diagnosis malaria."},{"id":"m4_11","q":"Ikterus dengan Kramer 4, warna kulit kuning sampai pada:","options":["Kepala","Dada","Pusat","Telapak tangan dan kaki","Pergelangan tangan dan pergelangan kaki"],"answer":4,"topic":"Neonatologi","explanation":"Skala Kramer: 1=kepala leher, 2=sampai pusar, 3=sampai paha, 4=sampai pergelangan tangan/kaki, 5=sampai telapak tangan/kaki."},{"id":"m4_12","q":"Bayi A, ibu golongan darah O, ayah golongan darah B, bayi golongan darah B. Ikterus Kramer 4 hari ke-3. Kemungkinan penyebab ikterus:","options":["Infeksi pada waktu janin","Ketidaksesuaian golongan darah","Tidak diketahui"],"answer":1,"topic":"Neonatologi","explanation":"Inkompatibilitas ABO (ibu O, bayi B): antibodi anti-B dari ibu (IgG) melewati plasenta dan menghemolisis eritrosit bayi, menyebabkan ikterus patologis."},{"id":"m4_13","q":"Anak 13 tahun, pipi kanan bengkak dan sakit saat membuka mulut selama 3 hari. Didiagnosis mumps. Komplikasi yang bisa terjadi:","options":["Orchitis","Hepatitis","Arthritis","Faringitis","Sinusitis"],"answer":0,"topic":"Infeksi","explanation":"Orchitis merupakan komplikasi mumps/parotitis tersering pada laki-laki pascapubertas (13 tahun sudah memasuki pubertas). Dapat menyebabkan infertilitas jika bilateral."},{"id":"m4_14","q":"Bayi 12 jam, bilirubin total 16 mg/dL, G6PD normal, ibu golongan darah O, anak B. Kemungkinan penyebab kuning:","options":["Ikterus fisiologis","Inkompatibilitas Rh","Inkompatibilitas ABO","Breastfeeding jaundice","Defisiensi G6PD"],"answer":2,"topic":"Neonatologi","explanation":"Ikterus pada usia <24 jam adalah patologis. Ibu O dan anak B menunjukkan inkompatibilitas ABO. Rhesus keduanya positif sehingga bukan inkompatibilitas Rh. G6PD normal."},{"id":"m4_15","q":"Bayi laki-laki 7 bulan, sesak nafas 2 hari, didahului demam dan batuk pilek. Takipnu, ekspirasi memanjang, wheezing. Etiologi paling sering:","options":["Rhino virus","Mycoplasma","Pneumococcus","Haemophilus influenza","Respiratory Syncitial Virus"],"answer":4,"topic":"Respirologi","explanation":"Bronkiolitis pada bayi <1 tahun paling sering disebabkan RSV. Tanda khas: wheezing, ekspirasi memanjang, didahului ISPA pada bayi."},{"id":"m4_16","q":"Bayi 39-40 minggu, BBL 2800 gram, sehat. TSH cord blood 95 mU/L, hari ke-5: fT4 0,6, T4 3, TSH 150. Interpretasi:","options":["TSH reseptor blockade","Normal thyroid","Severe primary hypothyroidism","Athyreosis","Hyperthyroidism"],"answer":2,"topic":"Endokrinologi","explanation":"TSH sangat tinggi (150) dengan fT4 dan T4 sangat rendah menunjukkan severe primary hypothyroidism. Kelenjar tiroid tidak berfungsi adekuat sehingga hipofisis meningkatkan produksi TSH."},{"id":"m4_17","q":"Anak perempuan 10 tahun, hidung berair, tersumbat, gatal, bersin berulang hampir setiap hari sejak 2 tahun. Ayah asma. Allergic salute, nasal crease. Sangat mungkin ditemukan:","options":["Allergic salute, nasal crease","Sekret hidung kuning hijau","Mukosa hidung hiperemis","Choana atresia","Demam"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Rinitis alergika: bersin berulang, hidung berair/tersumbat, gatal, perennial. Pemeriksaan: allergic salute (mengusap hidung ke atas), nasal crease (garis horizontal dorsum nasi), allergic shiner."},{"id":"m4_18","q":"Penyebab paling sering sindrom nefrotik pada anak:","options":["Idiopatik","Glomerulonefritis","Kongenital","Lupus eritematosus sistemik","Purpura henoch-schonlein"],"answer":0,"topic":"Nefrologi","explanation":"Sindrom nefrotik pada anak 80% bersifat idiopatik (primer), dengan tipe kelainan minimal (minimal change disease) sebagai penyebab tersering."},{"id":"m4_19","q":"Bayi 1 hari, kuning sejak 3 jam. Golongan darah ibu O, anak B. Coomb test (+). Diagnosis paling mungkin:","options":["ABO inkompatibilitas","Hiperbilirubinemia fisiologis","Breast milk jaundice","Breastfeeding jaundice"],"answer":0,"topic":"Neonatologi","explanation":"Ikterus <24 jam, ibu O anak B, Coomb test (+) → inkompatibilitas ABO. Ikterus fisiologis muncul hari ke-2-3, breast milk jaundice muncul hari ke-4-7."},{"id":"m4_20","q":"Ikterus neonatorum yang terjadi antara hari ke 2-7 adalah:","options":["Selalu normal","Biasa merupakan tanda penyakit hemolitik","Selalu diterapi dengan fototerapi","Biasa pada bayi yang normal dan sehat"],"answer":3,"topic":"Neonatologi","explanation":"Ikterus fisiologis terjadi pada hari ke 2-7, terjadi pada 60% bayi cukup bulan dan 80% bayi prematur. Merupakan kondisi normal akibat imaturitas konjugasi hati."},{"id":"m4_21","q":"Pada penderita malnutrisi berat dengan dehidrasi, cairan yang dapat diberikan:","options":["Ringer laktat","Oralit","Ringer-Dextrose","Dextrose 5%","Resomal"],"answer":4,"topic":"Nutrisi","explanation":"Pada gizi buruk dengan dehidrasi, digunakan ReSoMal (Rehydration Solution for Malnutrition) yang memiliki kadar natrium lebih rendah dan kalium lebih tinggi dibandingkan oralit standar."},{"id":"m4_22","q":"Bayi 6 bulan, sesak napas 1 hari, didahului panas, batuk, pilek 3 hari. Napas 60x/mnt, suhu 39,1°C, crackles dan mengi. Leukosit 7000. Diagnosis paling mungkin:","options":["Bronkiolitis","Bronkopneumonia","Efusi pleura","Pneumotoraks","Asma bronkial"],"answer":0,"topic":"Respirologi","explanation":"Bronkiolitis: bayi <1 tahun, didahului ISPA, wheezing + crackles, takipnea, hiperinflasi paru. Leukosit normal (virus). Asma jarang pada usia <1 tahun."},{"id":"m4_23","q":"Bayi 9 bulan, pucat 1 minggu, hanya mau minum susu formula. Hb 8,3 g/dL, anemia hipokromik mikrositik. Tidak ada fasilitas penunjang. Pengobatan awal:","options":["Transfusi darah","Asam folat","Multi vitamin","Zat besi","Kortikosteroid"],"answer":3,"topic":"Hematologi","explanation":"Anemia hipokromik mikrositik pada bayi yang hanya minum susu formula (diet rendah zat besi) → anemia defisiensi besi. Terapi awal: suplementasi zat besi oral."},{"id":"m5_1","q":"Anak perempuan 6 tahun, pembesaran kelenjar payudara, tidak ada rambut ketiak/kemaluan. Pertambahan tinggi 6 cm/tahun. Pernyataan yang benar:","options":["Pubertas prekoks karena tanda seks sekunder","Kemungkinan prematur telarke karena kecepatan pertumbuhan normal","Harus segera MRI","Tidak perlu monitoring","Harus segera diterapi"],"answer":1,"topic":"Endokrinologi","explanation":"Premature thelarche: perkembangan payudara terisolasi tanpa tanda pubertas lain (rambut pubis, akselerasi pertumbuhan). Kecepatan pertumbuhan 6 cm/tahun masih normal. Perlu monitoring berkala."},{"id":"m5_2","q":"Anak laki-laki 2 tahun, pasca Kasai prosedur karena atresia bilier. Pruritus, ikterus, hematemesis. Asites, hepatosplenomegali, venektasi. Feses hitam seperti ter. Penyebab hematemesis:","options":["Varices esophagus","Ulkus peptikum","Posterior nasal bleeding","Gastropati","Thrombositopenia"],"answer":0,"topic":"Gastroenterologi","explanation":"Pasca Kasai prosedur atresia bilier, sirosis hepatis sering terjadi menyebabkan hipertensi portal → varises esofagus → hematemesis. Tanda lain: asites, splenomegali, venektasi."},{"id":"m5_3","q":"Tanda karditis pada demam rematik akut meliputi semua berikut. Yang paling tepat:","options":["Bising bermakna yang tidak ada sebelumnya","Kardiomegali","Pericardial friction rub","Gagal jantung kongestif"],"answer":2,"topic":"Kardiologi","explanation":"Semua pilihan merupakan tanda karditis pada demam rematik, namun pericardial friction rub merupakan tanda spesifik perikarditis. Tanda karditis meliputi: murmur baru, kardiomegali, perikarditis, dan gagal jantung."},{"id":"m5_4","q":"Tanda klinis gizi buruk tipe kwashiorkor:","options":["Iga gambang","Crazy pavement dermatosis","Baggy pants","Keratomalacia","Muscle wasting"],"answer":1,"topic":"Nutrisi","explanation":"Crazy pavement dermatosis adalah tanda khas kwashiorkor: kulit hiperpigmentasi, deskuamasi seperti cat terkelupas. Iga gambang dan baggy pants khas marasmus."},{"id":"m5_5","q":"Anak 2 tahun, BB tidak naik 3 bulan, demam subfebris 1 bulan. Pembesaran kelenjar limfe leher multipel. Bapak TB. Foto thoraks: pembesaran kelenjar hilus. Tuberkulin 12 mm. Tatalaksana:","options":["2 HRZ / 4 RH","2 HRZE / 4 RH","2 HRZ / 4 R3H3","2 HRZE / 4 R3H3","2 HRE / 4 RH"],"answer":0,"topic":"Infeksi","explanation":"TB paru anak: 2 bulan fase intensif (INH+Rifampisin+Pirazinamid) dilanjutkan 4 bulan fase lanjutan (Rifampisin+INH). Etambutol ditambahkan pada TB berat/BTA positif."},{"id":"m5_6","q":"Anak 6,3 tahun, demam tinggi menggigil berkeringat 3 hari, mata kuning, lien Schuffner II. Hb 8,3%, leukosit 5400, trombosit 243.000. Terapi yang tepat:","options":["Klorampenikol","ACT (artemisin kombinasi) + primaquin","Fluconazole","Kina"],"answer":1,"topic":"Infeksi","explanation":"Malaria tanpa komplikasi diterapi dengan ACT (Artemisinin-based Combination Therapy) sebagai lini pertama, ditambah primaquin untuk eradikasi gametosit/hipnozoit."},{"id":"m5_7","q":"Bayi 1 tahun, penurunan kesadaran, riwayat mencret 1 minggu, tidak BAK 1 hari. Napas 50x/mnt, nadi 180x/mnt, akral dingin. Yang dipikirkan:","options":["Syok kardiogenik","Syok sepsis","Syok hipovolemik","Anafilaksis","Gagal ginjal"],"answer":2,"topic":"Kegawatdaruratan","explanation":"Diare 1 minggu → dehidrasi berat → syok hipovolemik. Tanda: penurunan kesadaran, takikardia, akral dingin, oliguria/anuria."},{"id":"m5_8","q":"Anak laki-laki 3 tahun, kejang 4 kali dalam 2 hari, setelah kejang tidak sadar. Demam naik turun 3 minggu. Kaku kuduk, Brudzinski, Kernig positif. Kemungkinan diagnosis klinis:","options":["Kejang demam kompleks","Kejang demam sederhana","Tumor otak","Meningitis","Ensefalitis"],"answer":3,"topic":"Neurologi","explanation":"Demam berkepanjangan (3 minggu), kejang berulang, penurunan kesadaran, tanda rangsang meningeal positif (kaku kuduk, Brudzinski, Kernig) → meningitis."},{"id":"m5_9","q":"Anak 13 tahun, sakit perut hebat, mual muntah, penurunan kesadaran. GDS 456, pH 7,01, bikarbonat 10 mmol/L, ketonuria (+). Interpretasi:","options":["Akut abdomen","Gastroenteritis","Gangguan SSP","Ketoasidosis Diabetikum","Sindrom Uremik"],"answer":3,"topic":"Endokrinologi","explanation":"KAD (Ketoasidosis Diabetikum): hiperglikemia berat (GDS 456), asidosis metabolik (pH 7,01, bikarbonat rendah), ketonuria. Nyeri perut dan penurunan kesadaran merupakan gejala KAD berat."},{"id":"m5_10","q":"Anak laki-laki 7 tahun, pucat 3 bulan, anoreksia, sulit konsentrasi, pembesaran hati 2 cm BAC. Langkah diagnostik untuk kemungkinan penyakit:","options":["Leukemia akut","Anemia Defisiensi Besi","Talasemia trait","Anemia Megaloblastik","Anemia akibat penyakit infeksi kronis"],"answer":1,"topic":"Hematologi","explanation":"Pucat kronik, anoreksia, gangguan konsentrasi/belajar, hepatomegali ringan pada anak usia sekolah → anemia defisiensi besi. Gangguan kognitif/konsentrasi adalah gejala khas ADB pada anak."},{"id":"m5_11","q":"Anak wanita 11 tahun, BB menurun tapi nafsu makan baik, berdebar-debar, sulit konsentrasi. Nadi 140x/mnt, mata menonjol, pembesaran tiroid. Hasil laboratorium yang mendukung diagnosis:","options":["T3 rendah, T4 tinggi, TSH rendah","T3 rendah, T4 rendah, TSH tinggi","T3 tinggi, T4 tinggi, TSH tinggi","T3 tinggi, T4 tinggi, TSH rendah","T3 tinggi, T4 tinggi, TSH tinggi"],"answer":3,"topic":"Endokrinologi","explanation":"Hipertiroid (Graves disease): T3 dan T4 tinggi (hiperfungsi tiroid), TSH rendah (supresi akibat feedback negatif). Gejala: BB turun, takikardia, eksoftalmus, struma."},{"id":"m5_12","q":"Anak 5 tahun kejang >30 menit tanpa pulih kesadaran. Sudah dapat Diazepam rektal 10 mg 2x. Obat selanjutnya jika kejang belum berhenti:","options":["Midazolam 0,1-0,2 mg/kgBB IV","Diazepam intravena 0,3 mg/kgBB","Fenitoin loading dose 20 mg/kgBB IV","Fenobarbital loading dose 15-20 mg/kgBB IV"],"answer":2,"topic":"Neurologi","explanation":"Setelah diazepam rektal 2 kali gagal, langkah selanjutnya dalam algoritma status epileptikus adalah fenitoin loading dose 20 mg/kgBB IV dengan kecepatan 1 mg/kgBB/menit."},{"id":"m5_13","q":"Bayi laki-laki 2 bulan, kuning seluruh tubuh sejak 5 hari lahir, BAB dempul, BAK seperti air teh. Hepatomegali, splenomegali. Diagnosis:","options":["Inspisiated bile duct","Atresia Biliaris","Hepatitis Neonatal","Kista duktus choledokus","Hipotiroid kongenital"],"answer":1,"topic":"Hepatologi","explanation":"Kolestasis neonatal dengan BAB dempul (akolik), BAK gelap, hepatosplenomegali → atresia bilier. Kasai portoenterostomi harus dilakukan sebelum usia 8 minggu."},{"id":"m5_14","q":"Anak laki-laki 13 tahun, panas 5 hari, nyeri otot dan ulu hati. TD 90/60, petechiae di lengan. Suara pernapasan menurun di lapang bawah. Ht naik dari 34% ke 42%, trombosit turun dari 152.000 ke 91.000. Diagnosis:","options":["Dengue haemorrhagic fever","Dengue fever","Demam tifoid","Measles","Demam skarlatina"],"answer":0,"topic":"Infeksi","explanation":"DBD: demam tinggi, petechiae, efusi pleura (suara napas menurun), hemokonsentrasi (Ht naik ≥20%), trombositopenia (<100.000)."},{"id":"m5_15","q":"Pernyataan yang TIDAK benar mengenai mumps:","options":["Masa inkubasi 14-24 hari","Tipikal dihubungkan dengan parotitis","Parotitis awalnya unilateral kemudian bilateral","Parotitis selalu terjadi bilateral","Kelenjar parotitis teraba lunak"],"answer":3,"topic":"Infeksi","explanation":"Parotitis mumps TIDAK selalu bilateral. Sekitar 75% kasus bilateral, dan 25% unilateral. Pernyataan 'selalu bilateral' adalah tidak benar."},{"id":"m5_16","q":"Anak 10 tahun, demam 7 hari makin tinggi, nyeri perut. Didiagnosis demam tifoid. Pilihan antibiotik pertama:","options":["Sefiksim","Seftriakson","Kloramfenikol oral","Siprofloksasin","Tiamfenikol"],"answer":2,"topic":"Infeksi","explanation":"Kloramfenikol oral merupakan pilihan pertama untuk demam tifoid tanpa komplikasi pada anak di Indonesia (masih sensitif). Alternatif: amoksisilin, TMP-SMX, seftriakson."},{"id":"m5_17","q":"Definisi status epileptikus adalah:","options":["Kejang 5 menit dan kejang fokal","Kejang terus menerus lebih dari 30 menit","Kejang umum disertai aura","Kejang tidak bisa diatasi dengan diazepam","Kejang intraktabel"],"answer":1,"topic":"Neurologi","explanation":"Status epileptikus: kejang yang berlangsung terus menerus >30 menit atau kejang berulang tanpa pemulihan kesadaran di antara episode kejang selama >30 menit."},{"id":"m5_18","q":"Anak laki-laki 18 bulan, batuk lama disertai suara whoop, panas tidak tinggi 2 minggu, belum imunisasi. Diagnosis paling mungkin:","options":["Laringitis","Laringotrakheobronkitis","Trakeitis","Pertusis","Difteri"],"answer":3,"topic":"Infeksi","explanation":"Pertusis: batuk paroksismal dengan inspiratory whoop, berlangsung >2 minggu, demam tidak tinggi, pada anak yang belum diimunisasi DPT."},{"id":"m5_19","q":"Anak laki-laki 18 bulan, batuk lama disertai suara whoop, belum imunisasi. Tata laksana:","options":["Amoksisilin 50-80 mg/kgBB/hari 7-14 hari","Eritromisin 40-50 mg/kgBB/hari 14 hari","Kloramfenikol 50-100 mg/kgBB/hari 14 hari","Tetrasiklin 30-50 mg/kgBB/hari 10-14 hari","Sefiksim 5 mg/kgBB/hari 7-10 hari"],"answer":1,"topic":"Infeksi","explanation":"Eritromisin (golongan makrolid) merupakan antibiotik pilihan untuk pertusis. Diberikan selama 14 hari. Alternatif: azitromisin, klaritromisin."},{"id":"m5_20","q":"Anak laki-laki 10 tahun, berdebar-debar 8 bulan, nyeri dada saat olahraga. Riwayat radang tenggorokan, nyeri bengkak sendi lutut. Pansistolik murmur 4/6 apeks ke aksila. Obat profilaksis sekunder:","options":["Injeksi Penisilin prokain","Injeksi Benzatin benzyl penisilin","Kortikosteroid","Sulfadiazin","Tetrasiklin"],"answer":1,"topic":"Kardiologi","explanation":"Profilaksis sekunder demam rematik: Benzatin penisilin G IM setiap 3-4 minggu. Merupakan terapi standar untuk pencegahan rekurensi demam rematik."},{"id":"m6_1","q":"Anak laki-laki 4 tahun, digigit serangga, sesak, napas berbunyi, wajah sembab, akral dingin, nadi cepat tegangan kurang. Diagnosis paling mungkin:","options":["Status asmatikus","Observasi edema","Syok kardiogenik","Syok anafilaktik","Syncope"],"answer":3,"topic":"Kegawatdaruratan","explanation":"Syok anafilaktik: onset cepat setelah paparan alergen (gigitan serangga), gejala sistemik (sesak, edema wajah, hipotensi/syok). Akral dingin dan nadi lemah menunjukkan syok."},{"id":"m6_2","q":"Kekurangan intake zat besi pada anak disebabkan karena:","options":["Banyaknya sel darah lisis","BB ibu rendah selama hamil","Zat besi dikonsumsi bersamaan buah-buahan","Periode pertumbuhan cepat pada anak","Riwayat bayi kuning"],"answer":3,"topic":"Hematologi","explanation":"Periode pertumbuhan cepat (growth spurt) meningkatkan kebutuhan zat besi. Jika asupan tidak seimbang dengan kebutuhan yang meningkat, terjadi defisiensi besi."},{"id":"m6_3","q":"Anak 5 tahun, edema sejak 1 bulan, mula-mula kelopak mata kemudian kaki dan perut. Tidak sesak, tidak demam. TD 100/70. Proteinuria (+++). Pemeriksaan penunjang untuk diagnosis:","options":["Urine rutin dan kultur urine","Kadar protein total, albumin, dan kolesterol darah","Darah rutin dan ASTO","Biopsi ginjal","USG abdomen"],"answer":1,"topic":"Nefrologi","explanation":"Sindrom nefrotik: edema, proteinuria masif. Untuk diagnosis lengkap diperlukan kadar albumin serum (hipoalbuminemia) dan kolesterol (hiperkolesterolemia) sebagai kriteria diagnostik."},{"id":"m6_4","q":"Kecukupan ASI pada bayi usia 1 bulan dinilai dari:","options":["Kencing <6 kali/hari","BAB >6 kali/hari","BB turun 12% dari BBL","Bayi minta minum setiap 4 jam","BB kembali ke BBL dalam 10-14 hari"],"answer":4,"topic":"Nutrisi","explanation":"Tanda kecukupan ASI: BB bayi kembali ke BBL dalam waktu 10-14 hari setelah penurunan fisiologis. Tanda lain: BAK ≥6x/hari, BAB teratur, bayi puas setelah menyusu."},{"id":"m6_5","q":"Anak perempuan 2 tahun, sesak napas. Demam 4 hari, batuk pilek. HR 160x/mnt, RR 65x/mnt, suhu 39°C. Retraksi dinding dada, ronkhi basah halus kedua lapang paru. Berdasarkan PAT (Pediatric Assessment Triangle):","options":["Probable respiratory failure","Potensial respiratory failure","Asfiksia sedang","Syok kardiogenik","Cardiorespiratory failure"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Pediatric Assessment Triangle menilai: appearance (gelisah), work of breathing (retraksi, takipnea berat), circulation (takikardia). Dengan distres napas berat dan takikardia → probable respiratory failure."},{"id":"m6_6","q":"Anak perempuan 4 tahun, demam berulang 1 bulan, BB turun. Foto thoraks: snow storm appearance. Diagnosis paling mungkin:","options":["Empiema","Bronkitis","TBC milier","Pneumonia","Bronkiektasis"],"answer":2,"topic":"Infeksi","explanation":"Snow storm appearance (infiltrat milier difus bilateral) pada foto toraks adalah gambaran khas TB milier. Gejala: demam berkepanjangan, penurunan BB."},{"id":"m6_7","q":"Anak perempuan 2,5 tahun, bengkak 3 minggu, BB 10 kg, TB 85 cm. Edema, pembesaran hati, lesi hiperpigmentasi deskuamasi dan ulserasi. Disebabkan kekurangan:","options":["Asam Folat","Fe","Zn","Vitamin C","Vitamin A"],"answer":2,"topic":"Nutrisi","explanation":"Lesi kulit pada kwashiorkor (hiperpigmentasi, deskuamasi, ulserasi) berkaitan dengan defisiensi zinc. Zinc penting untuk integritas kulit dan penyembuhan luka."},{"id":"m6_8","q":"Anak laki-laki 5 tahun, bersin di pagi hari, 10 kali, mereda pukul 10 pagi. Menggaruk mata dan hidung. Mendengkur saat tidur. Allergic shiner, allergic face, mukosa edema pucat kebiruan. Diagnosis:","options":["Rinosinusitis","Influenza","Rinitis alergika","Asma bronkial","Polip nasal"],"answer":2,"topic":"Alergi-Imunologi","explanation":"Rinitis alergika: bersin berulang pagi hari, pruritus nasal/okuler, allergic shiner, allergic face, mukosa konka pucat kebiruan dan edema."},{"id":"m6_9","q":"Anak laki-laki 8 tahun, mudah lelah tanpa sianosis. Tidak ada bising jantung. Perbedaan tekanan nadi ekstremitas atas lebih kuat dari bawah. Kardiomegali. Diagnosis paling mungkin:","options":["Pulmonary stenosis","Coarctation of the aorta","Ventricular septal defect","Atrial septal defect","Patent ductus arteriosus"],"answer":1,"topic":"Kardiologi","explanation":"Koarktasio aorta: perbedaan tekanan nadi antara ekstremitas atas (lebih kuat) dan bawah (lebih lemah). Dapat tanpa bising jantung yang jelas. Menyebabkan kardiomegali akibat overload tekanan."},{"id":"m6_10","q":"Anak laki-laki 12 tahun, ruam seluruh tubuh dan sesak napas setelah suntikan antibiotik. TD 69/45, nadi 120x/mnt. Edema kelopak mata, bibir, lidah. Stridor dan wheezing. Tata laksana pertama:","options":["Salbutamol","Antihistamin","Epinefrin","Kortikosteroid","Pseudoefedrin"],"answer":2,"topic":"Kegawatdaruratan","explanation":"Anafilaksis berat dengan hipotensi dan obstruksi jalan napas → epinefrin IM segera sebagai terapi lini pertama. Dosis: 0,01 mg/kgBB (1:1000) IM di paha anterolateral."},{"id":"m6_11","q":"Anak perempuan 10 tahun, kuning seluruh tubuh, mual muntah, demam tidak tinggi 7 hari. Riwayat perdarahan saluran cerna 1 bulan lalu. Tidak ada infeksi virus. Penyebab kuning paling mungkin:","options":["Hepatitis akut","Hepatitis kronis","Hepatitis autoimun","Tumor hati","Penyakit hemolitik"],"answer":2,"topic":"Hepatologi","explanation":"Hepatitis autoimun: ikterus, gejala sistemik, tanpa bukti infeksi virus, dengan riwayat manifestasi ekstrahepatik. Perdarahan saluran cerna bisa terkait koagulopati hepatik."},{"id":"m6_12","q":"Anak perempuan 10 tahun, kuning seluruh tubuh. Pemeriksaan penunjang paling tepat:","options":["HBsAg","Anti-HBs","Anti-HAV IgM","Anti-HAV total","Anti-smooth muscle antibody"],"answer":4,"topic":"Hepatologi","explanation":"Jika hepatitis virus sudah disingkirkan, pemeriksaan anti-smooth muscle antibody (ASMA) diperlukan untuk mendiagnosis hepatitis autoimun tipe 1."},{"id":"m6_13","q":"Anak perempuan 6 tahun, demam 3 hari, nyeri kepala, batuk pilek mata merah. 2 hari lalu timbul ruam menyebar ke seluruh tubuh. Kemungkinan besar menderita:","options":["Varisela","Roseola","Measles","Scabies","Parvovirus"],"answer":2,"topic":"Infeksi","explanation":"Measles (campak): demam, batuk, pilek, konjungtivitis (3C: cough, coryza, conjunctivitis), diikuti ruam makulopapular yang dimulai dari wajah dan menyebar ke seluruh tubuh."},{"id":"m6_14","q":"Anak laki-laki 10 bulan, kejang disertai demam. Kejang 1 kali, mata mendelik ke atas, tangan kaki kaku 1 menit. Setelah kejang sadar. Riwayat kejang demam di keluarga. Diagnosis:","options":["Ensefalitis","Meningitis","Ensefalopati","Kejang demam sederhana","Kejang demam kompleks"],"answer":3,"topic":"Neurologi","explanation":"Kejang demam sederhana: kejang umum (seluruh tubuh), durasi <15 menit, tidak berulang dalam 24 jam, setelah kejang sadar baik. Riwayat keluarga mendukung."},{"id":"m6_15","q":"Anak perempuan 7 tahun, penurunan kesadaran 1 minggu. Panas hilang timbul 2 minggu. Ibu sedang minum obat paru 1 bulan. Pungsi lumbal: peningkatan sel mononuklear dan protein. Diagnosis:","options":["Meningitis serosa","Meningitis bakterialis","Ensefalitis","Kejang demam","Ensefalopati"],"answer":0,"topic":"Neurologi","explanation":"Meningitis serosa (TB): penurunan kesadaran gradual, demam berkepanjangan, kontak TB (ibu), LCS: pleositosis mononuklear dan protein tinggi."},{"id":"m6_16","q":"Anak 3 tahun, BB sulit naik, sering panas batuk pilek. Pengasuh sakit paru dapat 4 macam obat. Uji tuberkulin positif apabila diameter terlebar indurasi:","options":["≥5 mm","≥10 mm","≥15 mm","Longitudinal ≥15 mm","Longitudinal ≥10 mm"],"answer":1,"topic":"Infeksi","explanation":"Uji tuberkulin (Mantoux test) positif pada anak: indurasi transversal ≥10 mm. Pada immunocompromised: ≥5 mm dianggap positif."},{"id":"m6_17","q":"Anak 1 tahun, BB 10 kg, demam 3 hari, akral dingin, nadi 150x/mnt lemah, TD 80/60. Leukosit 1300, Hb 16,4, PCV 48,8, trombosit 74.000. Diagnosis:","options":["Demam berdarah dengue","Demam tifoid","Demam dengue","ISK","Campak"],"answer":0,"topic":"Infeksi","explanation":"DBD dengan syok: demam tinggi, hemokonsentrasi (PCV 48,8%), trombositopenia (74.000), leukopenia (1300), dan tanda syok (akral dingin, nadi lemah, hipotensi)."},{"id":"m6_18","q":"Berdasarkan temuan klinis anak 1 tahun dengan DBD dan syok, jenis syok:","options":["Syok Kardiogenik","Syok Septik","Syok Hipovolemik","Syok Neurogenic","Syok Obstruktif"],"answer":2,"topic":"Kegawatdaruratan","explanation":"Syok pada DBD merupakan syok hipovolemik akibat kebocoran plasma (plasma leakage). Hemokonsentrasi menunjukkan perpindahan plasma ke ruang ekstravaskuler."},{"id":"m6_19","q":"Anak laki-laki 5 tahun dengan ALL, pucat 3 hari, perdarahan di lengan dan dada. Hb 7, trombosit 17.000, Ht 21%. Transfusi yang diberikan:","options":["Packed Red Cell","Konsentrat trombosit","Whole blood","PRC dan Konsentrat trombosit","Konsentrat trombosit dan Plasma segar"],"answer":3,"topic":"Hematologi","explanation":"Anemia (Hb 7) memerlukan PRC, dan trombositopenia berat (17.000) dengan perdarahan aktif memerlukan konsentrat trombosit. Keduanya harus diberikan."},{"id":"m7_1","q":"Bayi perempuan 5 bulan, batuk, demam, sesak 2 hari. Gelisah, pucat, retraksi, sianosis. Napas 70-80x/mnt. pO2 50 mmHg, pCO2 65 mmHg. Tindakan yang dilakukan:","options":["Oksigen nasal kanul 2 L/mnt","Oksigen sungkup sederhana 5 L/mnt","Oksigen sungkup rebreathing 5 L/mnt","Intubasi"],"answer":3,"topic":"Kegawatdaruratan","explanation":"pO2 50 (hipoksemia berat) dan pCO2 65 (hiperkapnia/gagal napas tipe 2) pada bayi dengan distres napas berat memerlukan intubasi dan ventilasi mekanik."},{"id":"m7_2","q":"Morfologi darah tepi pada anemia defisiensi besi adalah:","options":["Anemia normositik normokromik","Anemia mikrositik hipokromik","Anemia makrositik","Ditemukan toksik granula","Ditemukan sel target"],"answer":1,"topic":"Hematologi","explanation":"Anemia defisiensi besi menunjukkan gambaran mikrositik hipokromik: MCV rendah (mikrositik), MCH rendah (hipokromik). Juga dapat ditemukan sel pensil dan anulosit."},{"id":"m7_3","q":"Ibu primipara melahirkan bayi cukup bulan BBL 3150 gram. Usia 36 jam bilirubin total 16,8 mg/dL, bayi golongan darah A, Ht 55%. Pemeriksaan yang perlu dilakukan:","options":["Hitung retikulosit","Uji Coombs direct","Morfologi darah tepi","Hemoglobin","Bleeding/Clotting time"],"answer":1,"topic":"Neonatologi","explanation":"Hiperbilirubinemia pada usia <48 jam dengan kemungkinan inkompatibilitas golongan darah memerlukan uji Coombs direct untuk mendeteksi antibodi yang menyelimuti eritrosit bayi."},{"id":"m7_4","q":"Anak laki-laki 4 tahun 3 bulan, pucat, sering makan pasir, keluar cacing bersama tinja. Diagnosis yang dipikirkan:","options":["Talasemia mayor","Anemia aplastik","Anemia Defisiensi Besi","Anemia perdarahan","Ankylostomiasis"],"answer":2,"topic":"Hematologi","explanation":"Pica (makan tanah/pasir) merupakan gejala khas anemia defisiensi besi. Ditambah adanya infeksi cacing yang menyebabkan perdarahan kronis dan kehilangan zat besi."},{"id":"m7_5","q":"Anak perempuan 5 tahun, mudah lelah 1 tahun, sesak saat berlari. Bising continuous grade III/6 pada ICR II-III linea midklavikularis sinistra. Diagnosis PJB paling mungkin:","options":["VSD","ASD","Patent ductus arteriosus","Coarctation of the aorta","Mitral Stenosis"],"answer":2,"topic":"Kardiologi","explanation":"Bising continuous (machinery murmur) di ICR II-III parasternal kiri merupakan tanda khas PDA (Patent Ductus Arteriosus). PDA menyebabkan mudah lelah dan infeksi paru berulang."},{"id":"m7_6","q":"Anak laki-laki 7 tahun, bengkak rahang kiri 1 hari, daun telinga terangkat. Sakit kepala, nyeri saat mengunyah/menelan. 2 teman sekelas sakit serupa 2 minggu lalu. Tatalaksana paling tepat:","options":["Antibiotika","NSAID","NSAID dan antibiotika","Konsultasi dokter gigi","Rujuk RS bagian bedah"],"answer":1,"topic":"Infeksi","explanation":"Parotitis epidemika (mumps): infeksi virus, tatalaksana simtomatik dengan NSAID untuk mengatasi nyeri dan demam. Antibiotik tidak diperlukan karena etiologi virus."},{"id":"m7_7","q":"Anak perempuan lahir 13 Februari 2014, datang 25 Juni 2014. BBL 2700 gram, PBL 50 cm. BB sekarang 5,5 kg, PB 60 cm, LK 40 cm. Status perkembangan motorik kasar yang paling benar:","options":["Tengkurap sendiri, mengangkat kepala 90°, mempertahankan kepala tegak stabil","Miring kiri-kanan, mengangkat kepala 45°","Menggenggam pensil, tengkurap sendiri, mengangkat kepala 45°","Merangkak meraih benda, mengangkat kepala 45°","Tertawa keras, menggenggam pensil, tengkurap sendiri"],"answer":0,"topic":"Tumbuh Kembang","explanation":"Usia anak sekitar 4 bulan. Milestone motorik kasar 4 bulan: tengkurap sendiri, mengangkat kepala 90° saat tengkurap, mempertahankan kepala tegak stabil saat didudukkan."},{"id":"m7_8","q":"Anak 9 bulan dengan distres nafas memberat 2 hari. AGD: pH 7,25, PCO2 7,5 kPa, PO2 8,5 kPa, base excess -4. Interpretasi:","options":["Bronchopulmonary dysplasia","Gagal nafas tipe 1","Perlu intubasi segera","Asma berat awitan lambat","Bikarbonat dibutuhkan untuk koreksi asidosis"],"answer":2,"topic":"Kegawatdaruratan","explanation":"pH rendah (asidosis), PCO2 tinggi (gagal napas tipe 2/hiperkapnia) dengan base excess -4. Distres napas memberat dengan gagal napas tipe 2 → perlu intubasi segera untuk ventilasi mekanik."},{"id":"m7_9","q":"Mekanisme pertahanan tubuh sebagai bagian dari innate immunity:","options":["Kulit yang intak","Saluran nafas","Saluran cerna","Traktus urinarius","Transplasental"],"answer":0,"topic":"Imunologi","explanation":"Kulit yang intak merupakan barrier fisik pertama (innate immunity/imunitas bawaan) yang mencegah masuknya mikroba ke dalam tubuh. Saluran napas dan cerna merupakan port d'entree."},{"id":"m7_10","q":"Fraksi oksigen awal yang dibutuhkan untuk resusitasi bayi cukup bulan adalah:","options":["40%","21%","60%","80%","100%"],"answer":1,"topic":"Neonatologi","explanation":"Menurut panduan resusitasi neonatus terbaru, resusitasi bayi cukup bulan dimulai dengan udara ruangan (FiO2 21%). Oksigen ditingkatkan jika SpO2 tidak membaik sesuai target."},{"id":"m8_1","q":"Bayi perempuan lahir gestasi 38 minggu, ASI eksklusif. Usia 24 jam bilirubin total 12,1 mg/dL. Penatalaksanaan lanjutan:","options":["Bayi dipulangkan","Dicari penyebab ikterus dan pemeriksaan ulang bilirubin 4-6 jam","Pemberian ASI dihentikan","Dilakukan fototerapi","Dilakukan transfusi tukar"],"answer":1,"topic":"Neonatologi","explanation":"Bilirubin 12,1 mg/dL pada usia 24 jam berada di zona risiko menengah-tinggi pada nomogram Bhutani. Perlu dicari penyebab ikterus dan monitoring ketat dengan pemeriksaan ulang bilirubin 4-6 jam."},{"id":"m8_2","q":"Anak 5 tahun, demam 4 hari tinggi terus, sakit kepala, mual muntah. Mimisan 1x sebanyak 1 sendok teh. Hb 15, Ht 45%, leukosit 3300, trombosit 90.000. Diagnosis kerja:","options":["Febris dengan epistaksis","Tersangka Infeksi Dengue","Demam Dengue","DBD derajat II","Diathesa hemorhagika dengan febris"],"answer":3,"topic":"Infeksi","explanation":"DBD derajat II: demam tinggi ≥2 hari, trombositopenia <100.000, hemokonsentrasi, DAN perdarahan spontan (epistaksis). Derajat II = ada perdarahan spontan."},{"id":"m8_3","q":"Pada PDA dapat terjadi komplikasi, KECUALI:","options":["Endokarditis bakterialis","Hipertensi pulmonal","Aneurism arteri pulmonalis","Pirau balik"],"answer":3,"topic":"Kardiologi","explanation":"Komplikasi PDA: endokarditis bakterialis, hipertensi pulmonal, aneurisma arteri pulmonalis. Pirau balik (Eisenmenger) merupakan akibat dari hipertensi pulmonal yang berat, bukan komplikasi langsung."},{"id":"m8_4","q":"Bayi lahir dari ibu G2P1A0, 30 minggu, SCTP, tidak menangis. Setelah langkah awal, tindakan selanjutnya:","options":["Ventilasi Tekanan Positif","VTP terkoordinasi dengan Kompresi dada","Pemberian surfaktan rescue","Pemberian kortikosteroid","Pemasangan kateter umbilikal"],"answer":0,"topic":"Neonatologi","explanation":"Bayi prematur tidak menangis setelah langkah awal resusitasi → berikan Ventilasi Tekanan Positif (VTP) sebagai langkah selanjutnya. VTP dimulai jika bayi apnea atau gasping atau HR <100."},{"id":"m8_5","q":"Faktor yang berpengaruh pada kandungan oksigen dalam darah (oxygen content):","options":["Kadar Hb dan tekanan darah","Aliran darah dan kadar Hb","Tekanan darah dan saturasi oksigen","Kontraktilitas jantung dan saturasi oksigen","Kadar Hb, ikatan O2 dengan Hb, kemampuan melepaskan O2 ke plasma"],"answer":4,"topic":"Fisiologi","explanation":"Oxygen content ditentukan oleh: kadar hemoglobin, saturasi oksigen (ikatan O2 dengan Hb), dan dissolved oxygen (kemampuan melepaskan O2 ke plasma). Rumus: CaO2 = (1,34 × Hb × SaO2) + (0,003 × PaO2)."},{"id":"m8_6","q":"Budi 1 tahun, BB 10 kg, kejang tonik seluruh tubuh 6 jam setelah panas, batuk pilek. Kejang 5 menit, sebelum dan sesudah kejang sadar. Lingkar kepala normal, saraf otak normal, tidak kaku kuduk. Kemungkinan:","options":["Meningitis","Ensefalitis","Kejang Demam sederhana","Kejang Demam komplek","Epilepsi"],"answer":2,"topic":"Neurologi","explanation":"Kejang demam sederhana: kejang umum (tonik/klonik seluruh tubuh), durasi <15 menit, tidak berulang dalam 24 jam, setelah kejang sadar, tanpa tanda rangsang meningeal."},{"id":"m8_7","q":"Anak laki-laki 10 tahun, kencing merah dan bengkak kedua kaki. 1 minggu lalu batuk pilek tidak diobati. Edema tungkai, eritrosit (+), sedimen eritrosit 4-5/lp, bakteri (+). Organisme penyebab:","options":["Streptococcus hemolyticus group A","Streptococcus viridans","Staphylococcus saprofit","Pseudomonas aerugenosa","Haemophilus influenza"],"answer":0,"topic":"Nefrologi","explanation":"GNAPS (Glomerulonefritis Akut Pasca Streptokokus): hematuria, edema, pasca infeksi saluran napas 1-2 minggu sebelumnya. Penyebab: Streptococcus beta hemolyticus group A."},{"id":"m8_8","q":"Anak usia 2 tahun dicurigai anemia defisiensi besi. Hasil pemeriksaan yang mendukung:","options":["Hitung retikulosit meningkat","Besi serum meningkat","Kapasitas ikat besi total meningkat","Saturasi transferin meningkat","Ferritin serum meningkat"],"answer":2,"topic":"Hematologi","explanation":"Pada anemia defisiensi besi: TIBC (Total Iron Binding Capacity) meningkat sebagai kompensasi terhadap rendahnya kadar besi serum. Serum iron rendah, ferritin rendah, saturasi transferin rendah."},{"id":"m8_9","q":"Bayi laki-laki 11 bulan, BB 9 kg, diare dehidrasi berat tanpa renjatan. Tatalaksana:","options":["IVFD 30 cc/kgBB 1 jam, kemudian 70 cc/kgBB 5 jam","IVFD 30 cc/kgBB 1/2 jam, kemudian 70 cc/kgBB 2,5 jam","New oralit 75 cc/kgBB 3 jam","New oralit ad libitum"],"answer":0,"topic":"Gastroenterologi","explanation":"Dehidrasi berat pada bayi >12 bulan (atau <12 bulan menurut WHO plan C): 30 ml/kgBB dalam 1 jam pertama, kemudian 70 ml/kgBB dalam 5 jam berikutnya. Untuk bayi <12 bulan: 30ml/kgBB 1 jam + 70ml/kgBB 5 jam."},{"id":"m8_10","q":"Anak usia 8 tahun, nyeri ulu hati 5 jam. Somnolen, gelisah. BB 26 kg, TD 120/80, nadi 120x/mnt, napas 42x/mnt dalam, demam. Poliuria, polidipsia, BB turun. Penatalaksanaan segera di UGD:","options":["Bolus dekstrose 10% IV","Langsung pasang drip insulin 0,1 IU/kgBB/jam","Berikan IVFD NaCl 0,9% atau RL","Lakukan CT-scan kepala","Berikan manitol 1 g/kgBB"],"answer":2,"topic":"Endokrinologi","explanation":"Pada KAD, langkah pertama di UGD adalah resusitasi cairan dengan NaCl 0,9% atau RL untuk mengatasi dehidrasi dan memperbaiki perfusi. Insulin diberikan setelah resusitasi cairan awal."},{"id":"m8_11","q":"Anak laki-laki 6 tahun, kemerahan dan gatal setelah makan ikan laut. Bentol-bentol, sulit bernapas. Nadi 140, TD 75/45, SpO2 99% NRM. Wheezing luas, retraksi. Tatalaksana selanjutnya:","options":["Epinefrin 0,3 mg IM di paha anterolateral","Persiapan intubasi","Memberikan 20 cc/kgBB NS bolus","Memberikan albuterol 2,5 mg nebulizer"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Anafilaksis (urtikaria generalisata + bronkospasme + hipotensi): epinefrin IM adalah terapi lini pertama. Diberikan di paha anterolateral. Dapat diulang setiap 5-15 menit jika diperlukan."},{"id":"m8_12","q":"Bayi lahir dari ibu HBsAg (+), HBeAg (-). Tindakan sebelum 12 jam pertama:","options":["Pemeriksaan anti-HBc","Pemeriksaan HBsAg","Pemberian suntikan HB imunoglobulin","Pemberian vaksinasi hepatitis B","Pemberian suntikan antivirus"],"answer":2,"topic":"Imunisasi","explanation":"Bayi dari ibu HBsAg (+): berikan HBIG (Hepatitis B Immunoglobulin) DAN vaksin Hepatitis B dalam 12 jam pertama setelah lahir untuk mencegah transmisi vertikal."},{"id":"m8_13","q":"Anak 14 tahun dengan mitral regurgitasi sedang dan aorta regurgitasi ringan akibat PJR. Upaya preventif yang TIDAK tepat:","options":["Penisilin V 2×250 mg sampai umur 25 tahun","Amoksisilin sebelum pencabutan gigi","Eritromisin untuk adik dengan faringitis Streptokokus","Pemberian imunisasi","Edukasi compliance"],"answer":3,"topic":"Kardiologi","explanation":"Pemberian imunisasi bukan merupakan upaya preventif spesifik untuk Penyakit Jantung Reumatik. Yang tepat: profilaksis sekunder (penisilin), profilaksis endokarditis (amoksisilin), terapi faringitis kontak, dan edukasi."},{"id":"sk14_1","q":"Yang termasuk faktor risiko penyakit membran hialin adalah:","options":["Kelahiran aterm","Kelahiran post date","Neonatus sepsis","Neonatus dari ibu dengan diabetes melitus","Neonatus dari ibu dengan PEB"],"answer":3,"topic":"Neonatologi","explanation":"Diabetes melitus pada ibu merupakan faktor risiko RDS/PMH karena hiperinsulinemia janin menghambat pematangan surfaktan paru. Faktor risiko lain: prematuritas, SCTP, asfiksia."},{"id":"sk14_2","q":"PJB terbanyak pada neonatus (tidak termasuk PDA) adalah:","options":["ASD","VSD","TOF","PDA","Dekstrokardia"],"answer":1,"topic":"Kardiologi","explanation":"VSD (Ventricular Septal Defect) merupakan PJB terbanyak secara keseluruhan, mencakup sekitar 30% dari seluruh PJB."},{"id":"sk14_3","q":"Puberitas prekoks pada wanita bila muncul tanda kelamin sekunder pada usia kurang dari:","options":["6 tahun","8 tahun","9 tahun","10 tahun","12 tahun"],"answer":1,"topic":"Endokrinologi","explanation":"Pubertas prekoks pada perempuan didefinisikan sebagai munculnya tanda-tanda kelamin sekunder sebelum usia 8 tahun (laki-laki: sebelum 9 tahun)."},{"id":"sk14_4","q":"Kegagalan sirkulasi pada syok septik terjadi karena:","options":["Hipovolemik","Distributif","Dilusi","Cardiogenik","Neurogenik"],"answer":1,"topic":"Kegawatdaruratan","explanation":"Syok septik merupakan syok distributif: terjadi vasodilatasi masif akibat mediator inflamasi, menyebabkan maldistribusi aliran darah dan penurunan SVR."},{"id":"sk14_5","q":"Balita 3 tahun, kurang diperhatikan, ekonomi lemah. Hb 5,0 gr%, feritin rendah, tidak ada pembesaran organ. Penyebab anemia:","options":["Thalassemia","Leukemia","Anemia Defisiensi Fe","Blood loose","Child abuse"],"answer":2,"topic":"Hematologi","explanation":"Feritin rendah merupakan penanda pasti defisiensi besi. Tidak ada organomegali menyingkirkan talasemia dan leukemia. Latar belakang sosial ekonomi rendah dan kurang perhatian mendukung ADB."},{"id":"sk14_6","q":"Jenis anemia paling banyak dijumpai pada balita usia 2 tahun:","options":["Defisiensi B12","Defisiensi asam folat","Defisiensi Fe","Blood loose","Defisiensi eritropoitin"],"answer":2,"topic":"Hematologi","explanation":"Anemia defisiensi besi merupakan penyebab anemia tersering pada balita di Indonesia dan di dunia, terutama karena kebutuhan besi yang tinggi dan asupan yang kurang."},{"id":"sk14_7","q":"Penyebab anemia pada GGK:","options":["Kekurangan Fe","Kekurangan asam folat","Gangguan produksi eritropoitin","Blood loose","Kekurangan vitamin B12"],"answer":2,"topic":"Nefrologi","explanation":"Anemia pada GGK (Gagal Ginjal Kronik) terutama disebabkan oleh gangguan produksi eritropoietin oleh ginjal. Eritropoietin merupakan hormon utama yang merangsang eritropoiesis."},{"id":"sk14_8","q":"Mengapa imunisasi campak dilakukan pada usia 9 bulan?","options":["Anak <9 bulan jarang terkena campak","Antibodi ibu bertahan sampai 9 bulan"],"answer":1,"topic":"Imunisasi","explanation":"Antibodi maternal (IgG anti-campak) yang ditransfer melalui plasenta bertahan sampai sekitar 6-9 bulan. Imunisasi pada usia 9 bulan dilakukan setelah antibodi ibu menurun agar vaksin efektif."},{"id":"sk14_9","q":"Anak 8 tahun, panas 4 hari, bengkak kedua kaki, asites. Nadi 112 kuat. Hb 12, trombosit 145.000. Diagnosis:","options":["Sindroma nefrotik","Sepsis","Dengue Hemoragic Fever","Gagal Jantung","GNAPS"],"answer":2,"topic":"Infeksi","explanation":"Demam 4 hari dengan kebocoran plasma (edema, asites), trombosit borderline (145.000), hemokonsentrasi → DHF (Dengue Hemorrhagic Fever). Penting dibedakan dari sindrom nefrotik yang tidak disertai demam akut."},{"id":"sk14_10","q":"Kuman penyebab tersering pada bronkiolitis:","options":["Staphylococcus aureus","Streptococcus spp","Rota virus","RSV"],"answer":3,"topic":"Respirologi","explanation":"RSV (Respiratory Syncytial Virus) merupakan penyebab tersering bronkiolitis pada bayi dan anak kecil, bertanggung jawab atas 50-80% kasus."},{"id":"sk14_11","q":"Hemofilia A disebabkan karena kekurangan:","options":["Faktor VII","Faktor VIII","Faktor IX","Faktor X","Faktor XI"],"answer":1,"topic":"Hematologi","explanation":"Hemofilia A disebabkan defisiensi faktor VIII (antihemophilic factor). Hemofilia B disebabkan defisiensi faktor IX (Christmas factor)."},{"id":"sk14_12","q":"Penyebab GGA tersering pada anak:","options":["GNAPS","Sindroma nefrotik","Diabetes melitus tipe I"],"answer":0,"topic":"Nefrologi","explanation":"GNAPS (Glomerulonefritis Akut Pasca Streptokokus) merupakan penyebab tersering GGA (Gagal Ginjal Akut) pada anak di negara berkembang."}];

let state={
  screen:'home',
  questions:[],
  current:0,
  answers:{},
  revealed:{},
  startTime:null,
  elapsed:0,
  timerInterval:null,
  mode:'random',
  topicFilter:'all'
};

const topics=['all',...new Set(BANK_SOAL.map(q=>q.topic))].sort();

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(mode,topic){
  let pool=BANK_SOAL;
  if(topic&&topic!=='all') pool=pool.filter(q=>q.topic===topic);
  let qs=mode==='all'?[...pool]:shuffle(pool).slice(0,Math.min(50,pool.length));
  clearInterval(state.timerInterval);
  const interval=setInterval(()=>{
    state.elapsed=Math.floor((Date.now()-state.startTime)/1000);
    const el=document.getElementById('timer');
    if(el){const m=Math.floor(state.elapsed/60),s=state.elapsed%60;el.textContent=m+':'+(s<10?'0':'')+s;}
  },1000);
  state={...state,screen:'quiz',questions:qs,current:0,answers:{},revealed:{},startTime:Date.now(),elapsed:0,timerInterval:interval,mode,topicFilter:topic||'all'};
  render();
}

function answer(idx){
  const q=state.questions[state.current];
  if(state.answers[q.id]!==undefined) return;
  state.answers[q.id]=idx;
  state.revealed[q.id]=true;
  render();
}

function next(){
  if(state.current<state.questions.length-1){state.current++;render();}
  else finish();
}
function prev(){if(state.current>0){state.current--;render();}}
function finish(){clearInterval(state.timerInterval);state.screen='result';render();}

function home(){clearInterval(state.timerInterval);state.screen='home';render();}

function scoreColor(pct){
  if(pct>=80)return{bg:'#14532d',border:'#16a34a',color:'#86efac'};
  if(pct>=60)return{bg:'#1c1917',border:'#ca8a04',color:'#fde68a'};
  return{bg:'#450a0a',border:'#dc2626',color:'#fca5a5'};
}

function renderHome(){
  const total=BANK_SOAL.length;
  const tpcs=[...new Set(BANK_SOAL.map(q=>q.topic))].length;
  return `<div class="home">
    <h1>PPDS IKA UNS</h1>
    <p>Bank Soal Tryout Ilmu Kesehatan Anak</p>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${total}</div><div class="lbl">Total Soal</div></div>
      <div class="stat-box"><div class="num">${tpcs}</div><div class="lbl">Topik</div></div>
      <div class="stat-box"><div class="num">406</div><div class="lbl">Modul</div></div>
    </div>
    <div class="mode-grid">
      <div class="mode-card" onclick="startQuiz('random',document.getElementById('topicSel').value)">
        <div style="font-size:1.5em;margin-bottom:8px">🎯</div>
        <h3>Random 50 Soal</h3>
        <p>Latihan cepat acak</p>
      </div>
      <div class="mode-card" onclick="startQuiz('all',document.getElementById('topicSel').value)">
        <div style="font-size:1.5em;margin-bottom:8px">📚</div>
        <h3>Semua Soal</h3>
        <p>Latihan lengkap per topik</p>
      </div>
    </div>
    <select class="topic-select" id="topicSel">
      ${topics.map(t=>`<option value="${t}">${t==='all'?'Semua Topik':t}</option>`).join('')}
    </select>
    <button class="btn-start" onclick="startQuiz('random',document.getElementById('topicSel').value)">Mulai Tryout</button>
  </div>`;
}

function renderQuiz(){
  const q=state.questions[state.current];
  const answered=state.answers[q.id]!==undefined;
  const pct=((state.current+1)/state.questions.length*100).toFixed(0);
  
  const opts=q.options.map((opt,i)=>{
    let cls='opt-btn';
    if(answered){
      if(i===q.answer) cls+=' correct';
      else if(i===state.answers[q.id]) cls+=' wrong';
      else if(q.answer===i) cls+=' reveal';
    }
    return `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
  }).join('');
  
  const expHtml=answered?`<div class="explanation">💡 ${q.explanation}</div>`:'';
  const isLast=state.current===state.questions.length-1;
  
  return `<div>
    <div class="quiz-header">
      <button class="back-btn" onclick="home()">← Keluar</button>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="timer" id="timer">0:00</div>
    </div>
    <div class="q-num">${state.current+1} / ${state.questions.length}</div>
    <div class="q-topic">${q.topic}</div>
    <div class="q-text">${q.q}</div>
    ${opts}
    ${expHtml}
    <div class="nav-row">
      ${state.current>0?'<button class="nav-btn btn-prev" onclick="prev()">← Prev</button>':''}
      ${answered?`<button class="nav-btn btn-next" onclick="${isLast?'finish()':'next()}">${isLast?'Lihat Hasil':'Selanjutnya →'}</button>`:''}
    </div>
  </div>`;
}

function renderResult(){
  const qs=state.questions;
  const correct=qs.filter(q=>state.answers[q.id]===q.answer).length;
  const answered=Object.keys(state.answers).length;
  const pct=Math.round(correct/qs.length*100);
  const sc=scoreColor(pct);
  const m=Math.floor(state.elapsed/60),s=state.elapsed%60;
  
  const reviews=qs.map(q=>{
    const ua=state.answers[q.id];
    const isCorrect=ua===q.answer;
    return `<div class="review-item ${isCorrect?'':'wrong'}">
      <div class="review-q">${q.q.substring(0,120)}${q.q.length>120?'...':''}</div>
      ${ua!==undefined&&!isCorrect?`<span class="review-ans ans-wrong">✗ ${q.options[ua]}</span>`:''}
      <span class="review-ans ans-correct">✓ ${q.options[q.answer]}</span>
      ${!isCorrect&&q.explanation?`<div class="review-exp">${q.explanation}</div>`:''}
    </div>`;
  }).join('');
  
  return `<div class="result">
    <div class="score-box">
      <div class="score-circle" style="background:${sc.bg};border-color:${sc.border};color:${sc.color}">${pct}%</div>
      <div class="score-lbl">Benar: ${correct}/${qs.length} soal</div>
      <div class="score-lbl">Waktu: ${m}m ${s}s</div>
      <div style="font-size:1.2em;font-weight:700;margin-top:8px;color:${sc.color}">${pct>=80?'Luar Biasa! 🎉':pct>=60?'Bagus! Terus semangat 💪':'Tetap semangat belajar 📚'}</div>
    </div>
    <h3 style="margin-bottom:12px;color:#94a3b8">Review Jawaban</h3>
    ${reviews}
    <div class="result-btns" style="margin-top:16px">
      <button class="btn-home" onclick="home()">🏠 Home</button>
      <button class="btn-retry" onclick="startQuiz(state.mode,state.topicFilter)">🔄 Ulangi</button>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='home') app.innerHTML=renderHome();
  else if(state.screen==='quiz') app.innerHTML=renderQuiz();
  else if(state.screen==='result') app.innerHTML=renderResult();
}

render();
</script>
</body>
</html>
