me with icteric. Normal delivery BBL 3100 gram. Given breastmilk right after birth and weight significantly increased. Most possible diagnosis?","options":["Breast milk jaundice","Neonatal hepatitis","Maple syrup urine disease","ABO incompatibility","G6PD deficiency"],"answer":0,"topic":"Neonatologi","explanation":"BREASTMILK JAUNDICE (Ikterus ASI): ikterus yang muncul/menetap setelah hari ke 5-7 pada bayi ASI eksklusif."},{"id":"cbt_44","q":"A mother just gave birth to a baby with congenital heart defect. Which test do you suggest the mother to take?","options":["Diphtheria","Rubella","Syphilis","Tuberculosis","HIV"],"answer":1,"topic":"Kardiologi","explanation":"RUBELLA: infeksi maternal rubella pada trimester pertama menyebabkan Congenital Rubella Syndrome (CRS) yang ditandai KATARAK, TULI, dan KELAINAN JANTUNG KONGENITAL (terutama PDA, PS)."},{"id":"cbt_45","q":"Cardiac syncope may lead to high mortality of approximately 10%. What is the red flag of syncope in children?","options":["Ejection fraction <40%","Heart rate 60-80x/minutes","Q wave","QT syndrome","Bradycardia"],"answer":3,"topic":"Kardiologi","explanation":"QT SYNDROME (Long QT Syndrome/LQTS): RED FLAG sinkop kardiak yang mengancam jiwa. LQTS menyebabkan interval QT memanjang di EKG sehingga berisiko aritmia fatal (Torsades de Pointes lalu VF lalu kematian mendadak)."},{"id":"cbt_46","q":"A pregnant mother tested HIV positive. She asked if she can breastfeed the baby. You advised nutritional selection to prevent HIV vertical transmission. It should be?","options":["Affordable","Safe","Sustainable","AFASS","Acceptable"],"answer":3,"topic":"Nutrisi","explanation":"AFASS adalah kriteria WHO untuk pemilihan nutrisi bayi dari ibu HIV positif: A = Affordable (terjangkau), F = Feasible (dapat dilakukan), A = Acceptable (dapat diterima budaya), S = Safe (aman), S = Sustainable (berkelan..."},{"id":"cbt_47","q":"A 5 years old girl was brought due to pale, Hb 7.0 gr/dL, SI 20 mg/dL, TIBC 456 mg/dL. What is the recommended dose of iron?","options":["2-3 mg/kg/day","0.5-1 mg/kg/day","7-8 mg/kg/day","1-2 mg/kg/day","4-6 mg/kg/day"],"answer":4,"topic":"Hematologi-Onkologi","explanation":"TERAPI ANEMIA DEFISIENSI BESI (ADB): DOSIS TERAPEUTIK = 4-6 mg/kgBB/hari elemental iron, dibagi 3 dosis, diminum 30 menit sebelum makan untuk absorpsi optimal."},{"id":"cbt_48","q":"Why do infants need iron supplementation?","options":["In breastfed baby, milk contains low iron","Baby growth increases rapidly and iron reserve depletes rapidly","In the first 4 months, iron supplementation is needed most","In breastfed baby, iron content reduces over time","In breastfed baby, milk production gets lower"],"answer":1,"topic":"Nutrisi","explanation":"Alasan UTAMA bayi memerlukan suplementasi besi: PERTUMBUHAN PESAT + DEPLESI CADANGAN CEPAT."},{"id":"cbt_49","q":"Denver II interpretation for NORMAL is?","options":["No delay in any domain","Delay occurs only in more than one domain","No caution in any domain","No delay in any domain and only one caution","Delay occurs in no more than two cautions"],"answer":3,"topic":"Tumbuh Kembang","explanation":"Interpretasi Denver II: NORMAL = tidak ada delay DAN paling banyak 1 caution. DELAY (keterlambatan) = gagal melakukan item yang dilewati oleh >=75% anak pada usia yang sama."},{"id":"cbt_50","q":"Why does the clinic provide you with the Denver II tool to work on children development?","options":["To identify risk","To identify response to treatment","To identify diagnose","To identify possible disorder","To identify prognosis"],"answer":0,"topic":"Tumbuh Kembang","explanation":"Denver II adalah alat SKRINING perkembangan anak, BUKAN alat diagnosis. Tujuan UTAMA: IDENTIFIKASI RISIKO (to identify risk) keterlambatan perkembangan pada anak yang tampak sehat."},{"id":"cbt_61","q":"Hyponatremia with sodium level 125 mEq/L. Which system is most vulnerable?","options":["Gastrointestinal system","Central Nervous system","Cardiovascular system","Hepatobiliary system","Respiratory system"],"answer":1,"topic":"Kegawatdaruratan","explanation":"SISTEM SARAF PUSAT (CNS) paling rentan terhadap HIPONATREMIA. Mekanisme: Na+ serum rendah menyebabkan osmolalitas darah rendah, air masuk ke sel-sel otak melalui osmosis, menyebabkan EDEMA SEREBRAL."},{"id":"cbt_63","q":"A patient presents at ER with general seizure, normal breathing, and normal circulation. Classification according to Paediatric Assessment Triangle (PAT)?","options":["Respiratory failure","Compensated shock","Cardiopulmonary failure","Metabolic/CNS disturbance","Respiratory distress"],"answer":3,"topic":"Kegawatdaruratan","explanation":"Paediatric Assessment Triangle (PAT): 3 komponen: (1) APPEARANCE (tampilan/kesadaran): ABNORMAL karena ada kejang = gangguan kesadaran;"},{"id":"cbt_64","q":"A 8 months old boy was brought due to pale. CBC: Hb 8, MCV 72, MCH 24, MCHC 29, PLT 295.000, Reticulocyte 0.31%, peripheral smear: microcytosis, hypochromia, cigar cell, poikilocytosis. Diagnosis?","options":["Hemolytic anemia","Iron deficiency anemia","Anemia of chronic disease","Thalassemia","Anemia of sickle cell disease"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"ANEMIA DEFISIENSI BESI (ADB): (1) MCV 72 fL = MIKROSITIK (<80 fL); (2) MCH 24 pg = HIPOKROMIK (<27 pg); (3) MCHC 29 g/dL = HIPOKROMIK (<32 g/dL);"},{"id":"cbt_65","q":"A 5 years old girl brought to ER, sweating, restless and thin for 10 days. Raised pulse, exophthalmos, and dry skin on physical examination. Diagnosis?","options":["Hypothyroid","Hyperthyroid","Subclinical hypothyroid","Congenital hypothyroid","Supraventricular tachycardia"],"answer":1,"topic":"Endokrinologi","explanation":"HIPERTIROID (Graves Disease): (1) Berkeringat (diaphoresis = aktivasi simpatis), (2) Gelisah/restless, (3) Kurus (metabolisme tinggi), (4) NADI CEPAT (takikardi), (5) EKSOFTALMUS/PROPTOSIS = tanda KHAS Graves ophthalmopa..."},{"id":"cbt_66","q":"A 16 years old girl has never got her period. What is your conclusion?","options":["Primary amenorrhea","Precocious puberty","Pseudo amenorrhea","Tertiary amenorrhea","Secondary amenorrhea"],"answer":0,"topic":"Endokrinologi","explanation":"AMENORE PRIMER: tidak pernah mendapat menstruasi sama sekali hingga usia 16 tahun (atau 14 tahun jika tidak ada tanda pubertas sekunder). Penyebab: (1) Himen imperforata (pseudo amenorrhea = ada darah tapi tersumbat);"},{"id":"cbt_67","q":"A 5 years old girl has developed large breast, but not followed by other signs of puberty. Diagnosis?","options":["Premature thelarche","Fibroadenoma mammae","Normal puberty","Gynecomastia","Precocious puberty"],"answer":0,"topic":"Endokrinologi","explanation":"PREMATURE THELARCHE: perkembangan payudara prematur TERISOLASI tanpa tanda pubertas lainnya (tidak ada pertumbuhan rambut pubis/aksila, tidak ada akselerasi pertumbuhan, tidak ada menstruasi) pada anak <8 tahun."},{"id":"cbt_68","q":"A 5 years old girl presented with redness almost all over the body and breathing difficulty after consuming lobster, no allergic history. Type of hypersensitivity?","options":["Type 1 Hypersensitivity","Type 2 Hypersensitivity","Type 3 Hypersensitivity","Type 4 Hypersensitivity","Mixed type Hypersensitivity"],"answer":0,"topic":"Alergi-Imunologi","explanation":"HIPERSENSITIVITAS TIPE 1 (IgE-mediated/Immediate Hypersensitivity): reaksi ANAFILAKSIS setelah makan lobster (seafood = alergen umum)."},{"id":"cbt_73","q":"A 6 years old girl was brought to ER with abdominal pain. Palpable red rash on both legs and buttocks. She is otherwise well. Diagnosis?","options":["ITP","HSP","Dengue fever","SLE","DIC"],"answer":1,"topic":"Alergi-Imunologi","explanation":"HSP (Henoch-Schonlein Purpura/IgA Vasculitis): TRIAS KLASIK = (1) PURPURA PALPABEL (teraba) di ekstremitas bawah dan bokong, khas dan simetris bilateral; (2) NYERI PERUT kolik; (3) ARTRITIS/artalgia."},{"id":"cbt_74","q":"A 4 years old girl had dyspnea for 5 hours, low grade fever with barking cough for two days. Respiratory distress, inspiratory stridor, steeple sign on X-ray. Diagnosis?","options":["Influenza","Diphtheria","Pneumonia","Croup","Pertussis"],"answer":3,"topic":"Pulmonologi","explanation":"CROUP (Laryngotracheobronchitis Akut): (1) Batuk MENGGONGGONG (barking/seal cough); (2) STRIDOR INSPIRASI (edema subglotis); (3) Demam ringan-sedang;"},{"id":"cbt_76","q":"What are the contraindications for breastfeeding?","options":["Mother with varicella zoster","Mother with TB on OAT for 1 week","Cytomegalovirus infection","Alcohol consumption","Hepatitis C infection"],"answer":3,"topic":"Nutrisi","explanation":"KONTRAINDIKASI MENYUSUI (WHO): (1) Ibu HIV positif (jika AFASS terpenuhi); (2) Ibu dengan HTLV tipe I/II; (3) Bayi dengan GALAKTOSEMIA; (4) Penggunaan obat tertentu (antineoplastik, radioisotop);"},{"id":"cbt_78","q":"A 4 year old boy, 20 kg, comes to ER unconscious with fast breathing but no retractions, soft pulse 180 bpm, cold extremities, CRT 4 seconds, BP 50/30 mmHg, high fever 5 days. Emergency assessment?","options":["Respiratory distress","CNS disorders","Cardiopulmonary failure","Breathing failure","Circulation failure"],"answer":4,"topic":"Kegawatdaruratan","explanation":"CIRCULATION FAILURE (Syok): asesmen PAT: Work of Breathing = NORMAL (napas cepat tapi tidak ada retraksi = napas cepat adalah kompensasi asidosis/syok)."},{"id":"cbt_80","q":"A 10-year old boy with altered consciousness. 2 weeks earlier jaundice, fever, and abdominal pain. After a few days treatment, boy became more toxic. Liver is small, hepatic enzyme decreased with elevated bilirubin direct and indirect. Diagnosis?","options":["Fulminant hepatic failure","Autoimmune hepatitis","Hepatitis A","Hepatitis B","Hepatitis C"],"answer":0,"topic":"Hepatologi","explanation":"FULMINANT HEPATIC FAILURE (Gagal Hati Fulminan): klue = (1) Riwayat hepatitis akut (demam + ikterus + nyeri perut); (2) PERBURUKAN CEPAT setelah beberapa hari (ensefalopati hepatik);"},{"id":"cbt_81","q":"A full term neonate noticed to have heart murmur at 1 day of age (systolic 2/6 grade). On day 3, murmur transformed into a continuous murmur first heard on upper left sternal border. Newborn well, SpO2 100%. Likely cause?","options":["Peripheral pulmonary stenosis","Ventricular septal defect","Patent ductus arteriosus","Atrial septal defect","Mitral stenosis"],"answer":2,"topic":"Kardiologi","explanation":"PDA PADA BAYI CUKUP BULAN: Hari 1 = bising sistolik (pirau L ke R hanya saat sistol karena resistensi pulmonal masih tinggi)."},{"id":"cbt_82","q":"A 4-year old was brought with fever and vomiting for 3 days, no cough/runny nose, only positive Rumple Leed test. Lab: Hb 13, Hct 43%, WBC 5500, PLT 132.000. Diagnosis?","options":["Dengue without warning sign","Dengue with warning sign","Expanded dengue syndrome","Severe Dengue","Probable Dengue"],"answer":4,"topic":"Infeksi","explanation":"DENGUE PROBABLE (Probable Dengue): belum ada konfirmasi serologis/virologis (NS1, IgM, IgG dengue negatif atau belum diperiksa) + gambaran klinis sesuai dengue."},{"id":"cbt_83","q":"10-year old boy has fever, malaise. Drinking lemon causes pain in the gland in his neck. He failed to get vaccinated for?","options":["MMR","MR","DPT","Varicella","Polio"],"answer":0,"topic":"Imunisasi","explanation":"PAROTITIS EPIDEMIKA (MUMPS): nyeri di kelenjar parotis diprovokasi oleh makanan asam/lemon (stimulasi produksi saliva melalui ductus parotis yang edematous menyebabkan NYERI) = tanda PATOGNOMONIK mumps."},{"id":"cbt_84","q":"A 5 years old child was bitten by a dog suspected of rabies, open wound 1 cm on the big toe. What is the first action?","options":["Rinse with flowing water and detergent for 10-15 minutes","Brought to the nearest clinic","Wash with povidone iodine","Immediately give ATS","Wash with 70% alcohol"],"answer":0,"topic":"Infeksi","explanation":"PENANGANAN GIGITAN HEWAN TERSANGKA RABIES - LANGKAH PERTAMA: CUCI LUKA dengan air mengalir + sabun/deterjen selama MINIMUM 10-15 menit. Tindakan PALING PENTING dan PALING EFEKTIF (dapat mengurangi risiko rabies >80%)."},{"id":"cbt_85","q":"A 12 months old baby presented with diffuse pink maculopapular rash all over his body. He is otherwise well, but had fever for 3 days which resolved the day before the rash appeared. Most likely diagnosis?","options":["Rubeola","Erythema infectiosum","Rubella","Erythema multiforme","Exanthem subitum"],"answer":4,"topic":"Infeksi","explanation":"EXANTHEM SUBITUM (Roseola Infantum/Sixth Disease): CIRI KHAS = demam tinggi 3-5 hari (anak relatif baik) lalu DEMAM TURUN TIBA-TIBA lalu BARU MUNCUL RUAM makulopapular pink/merah di seluruh tubuh = RASH AFTER FEVER."},{"id":"cbt_86","q":"A 10 year old girl suddenly cannot walk and cannot control urination/defecation. One week before: paralysis, high fever for 3 days with cough and colds that resolved without treatment. Diagnosis?","options":["Guillain Barre Syndrome","Multiple Sclerosis","Transverse Myelitis","Meningitis","Poliomyelitis"],"answer":4,"topic":"Neurologi","explanation":"POLIOMIELITIS: paralisis flasid akut + riwayat infeksi virus sebelumnya (demam + batuk + pilek = fase prodromal poliovirus). Karakteristik kelumpuhan polio: (1) FLASID (lemas, tonus berkurang, refleks turun/hilang);"},{"id":"cbt_87","q":"A 11-month old premature baby brought with pale, Hb 8, MCH 24, MCHC 29, PLT 295.000, reticulocyte 0.31%, peripheral smear: microcytosis, hypochromia, cigar cell, poikilocytosis. What do you plan to give?","options":["Iron chelation","Blood transfusion","Folic acid","Corticosteroid","Iron therapy"],"answer":4,"topic":"Hematologi-Onkologi","explanation":"TERAPI BESI (Iron therapy): diagnosis = ADB. Pada bayi 11 bulan dengan ADB: terapi BESI ORAL adalah pilihan utama, dosis 4-6 mg/kgBB/hari elemental iron, 3x sehari, sebelum makan."},{"id":"cbt_88","q":"When blood vessel injury occurs, normal hemostasis may activate?","options":["Vasoconstriction, platelet activation, coagulation cascade activation","Vasodilation, platelet activation, coagulation cascade activation","Vasoconstriction, platelet deactivation, coagulation cascade activation","Vasodilation, platelet deactivation, coagulation cascade deactivation","Vasoconstriction, platelet activation, coagulation cascade deactivation"],"answer":0,"topic":"Hematologi-Onkologi","explanation":"HEMOSTASIS NORMAL: 3 komponen berurutan setelah cedera pembuluh darah: (1) VASOKONSTRIKSI (reflex vasoconstriction): respons segera, mengurangi aliran darah ke area cedera."},{"id":"cbt_89","q":"A 6 years old girl with blank stare since 6 months. When stunned, she does not respond to calls. After the attack she returns to normal activities. EEG: generalized slow spike wave 2-3 Hz. Diagnosis?","options":["Temporal lobe epilepsy","Juvenile absence epilepsy","Idiopathic generalized epilepsy","Childhood absence epilepsy","Day dreaming"],"answer":3,"topic":"Neurologi","explanation":"CHILDHOOD ABSENCE EPILEPSY (CAE): (1) Usia puncak 4-8 tahun; (2) Blank stare sesaat (tatapan kosong, bisa berkali-kali/hari); (3) TIDAK ADA RESPONS saat serangan (berbeda dari daydreaming = bisa diinterupsi);"},{"id":"cbt_91","q":"An 8-year-old girl injured her knee. Thirty minutes after 200 mg Ibuprofen, she develops diffuse hives and swelling of lips and eyelids, and difficulty breathing. Diagnosis?","options":["Anaphylaxis","Drug allergy","Respiratory problem","Angioedema","Asthma"],"answer":0,"topic":"Alergi-Imunologi","explanation":"ANAFILAKSIS: reaksi alergi sistemik berat yang mengancam jiwa. Kriteria anafilaksis TERPENUHI: onset cepat (30 menit setelah paparan obat) + melibatkan >=2 sistem organ: (1) KULIT: diffuse hives + angioedema bibir dan ke..."},{"id":"cbt_92","q":"A 4-year old girl had high fever for 3 days, colicky abdominal pain and bloody diarrhea, 9 bowel movements/day with nausea and vomiting, sunken eyes. Stool: mucus, blood and leucocytes. Diagnosis?","options":["Ascariasis","E. coli infection","Shigellosis","Taeniasis","Giardiasis"],"answer":2,"topic":"Gastroenterologi","explanation":"SHIGELLOSIS (Disentri Basiler): diare BERDARAH + berlendir + leukosit di feses (tanda INFLAMASI KOLON) + kolik abdomen + demam + mual/muntah = gambaran KLASIK DISENTRI."},{"id":"cbt_93","q":"Blood electrolyte of a 4 years old patient showed potassium level 6.5 mEq/L. What is the possible ECG finding?","options":["Inverted T wave","P mitral","Prolonged QTc","T-tall (peaked T wave)","Prolonged QR interval"],"answer":3,"topic":"Kegawatdaruratan","explanation":"HIPERKALEMIA (K+ 6.5 mEq/L) - perubahan EKG sesuai tingkat keparahan: K+ 5.5-6.5 mEq/L = PEAKED T WAVE (gelombang T tinggi, runcing, narrow) = tanda PALING AWAL hiperkalemia. K+ 6.5-7.0 = PR memanjang, QRS melebar."},{"id":"cbt_94","q":"At newborn screening, TSH value was 60 mU/L. What is your next step?","options":["Perform a confirmatory test","Perform mother thyroid function test","Treat with levothyroxine","Repeat the newborn screening","Perform thyroid ultrasound"],"answer":0,"topic":"Endokrinologi","explanation":"SKRINING HIPOTIROID NEONATAL - TSH 60 mU/L (tinggi, Normal <10-20 mU/L): LANGKAH SELANJUTNYA = UJI KONFIRMATORIS. Konfirmasi: ambil darah vena lalu periksa TSH serum + FT4 (bukan DBS ulang)."},{"id":"cbt_95","q":"A girl, 6 years old, short stature (height-for-age z score -3SD). Physical examination: webbed neck, cubitus valgus, and wide-spaced nipples. Diagnosis?","options":["Kallmann syndrome","Edward syndrome","Patau syndrome","Turner syndrome","Down syndrome"],"answer":3,"topic":"Genetika","explanation":"SINDROM TURNER (45,X): kariotipe 45,X (monosomi X) - perempuan. Ciri KHAS: (1) SHORT STATURE (perawakan pendek -3SD = khas); (2) WEBBED NECK (pterygium colli = kulit berlebih di leher = SANGAT KHAS Turner);"},{"id":"cbt_97","q":"A 6 years old girl with tremor for 10 days, sweating, restless and thin. Pulse 112x/minute, exophthalmia and dry skin. Diagnosis?","options":["Acquired hypothyroid","Hyperthyroid","Subclinical hypothyroid","Congenital hypothyroid","Supraventricular tachycardia"],"answer":1,"topic":"Endokrinologi","explanation":"HIPERTIROID (Graves Disease): TREMOR + EKSOFTALMUS (proptosis = tanda SPESIFIK Graves ophthalmopathy) + TAKIKARDI 112/menit + kurus + berkeringat + gelisah = HIPERTIROID KLASIK."},{"id":"cbt_100","q":"A 9-year old girl admitted to ER with wheats almost all over her body and breathing difficulty after consuming lobsters. What is the possible type of hypersensitivity?","options":["Type 1 Hypersensitivity","Type 2 Hypersensitivity","Type 4 Hypersensitivity","Type 3 Hypersensitivity","Mixed type Hypersensitivity"],"answer":0,"topic":"Alergi-Imunologi","explanation":"HIPERSENSITIVITAS TIPE 1 (IgE-mediated): sama dengan kasus lobster sebelumnya. Reaksi ANAFILAKSIS cepat setelah makan lobster."},{"id":"cbt_101","q":"A 8 years old girl diagnosed with nephrotic syndrome. What are the possible clinical manifestations?","options":["Polyuria","Ketonuria","Hematuria","Proteinuria","Glucosuria"],"answer":3,"topic":"Nefrologi","explanation":"SINDROM NEFROTIK: PROTEINURIA MASIF (>40 mg/m2/jam atau >3.5 g/hari atau dipstick >=3+) adalah HALLMARK sindrom nefrotik. Tetrad SN: proteinuria masif + hipoalbuminemia (<2.5 g/dL) + edema anasarka + hiperlipidemia."},{"id":"cbt_102","q":"A four years old girl had sudden onset of dyspnea for 6 hours, low grade fever with barking cough for two days. Respiratory distress, suprasternal retraction, inspiratory stridor, X-ray steeple sign. Diagnosis?","options":["Influenza","Diphtheria","Pneumonia","Croup","Pertussis"],"answer":3,"topic":"Pulmonologi","explanation":"CROUP: STEEPLE SIGN adalah tanda PATOGNOMONIK croup pada X-ray AP leher/dada. Normal: trakea subglotis lebar dan simetris."},{"id":"mcq_1","q":"Anak 5 tahun datang ke IGD, sadar, HR 210x/menit, dada tidak nyaman. TD 82/50, tidak ada tanda gagal jantung, ekstremitas hangat. EKG narrow QRS takikardi. Inisial intervensi?","options":["IV amiodarone","IV adenosine","Epinephrine","Vagal maneuver","Synchronized cardioversion"],"answer":3,"topic":"Kardiologi","explanation":"SVT (Supraventricular Tachycardia) dengan HEMODINAMIK STABIL: HR 210 + narrow QRS + ekstremitas hangat + tidak ada gagal jantung = SVT STABIL. Algoritma SVT: LANGKAH PERTAMA = VAGAL MANEUVER."},{"id":"mcq_2","q":"Anak tidak sadar, GCS 6. Tidak bisa patensi airway karena tone muscle lemah. Tatalaksana?","options":["OPA (Oropharyngeal Airway)","Mask ventilation","Intubasi ET","NPA","Jaw thrust"],"answer":0,"topic":"Kegawatdaruratan","explanation":"OPA (Oropharyngeal Airway/Gudel Airway): pada anak tidak sadar dengan HIPOTONIA (tonus otot lemah) menyebabkan lidah jatuh ke belakang dan obstruksi jalan napas. GCS 6 = tidak sadar tapi masih ada respons."},{"id":"mcq_3","q":"Anak tidak sadar. EKG wide QRS. Tatalaksana?","options":["Defibrilasi","Adenosine","Epinephrine","Cek arteri karotis","Synchronized cardioversion"],"answer":0,"topic":"Kardiologi","explanation":"ANAK TIDAK SADAR + EKG WIDE QRS = CARDIAC ARREST dengan SHOCKABLE RHYTHM (VF atau Pulseless VT). Tatalaksana: (1) Konfirmasi tidak ada pulse (<10 detik); (2) DEFIBRILASI SEGERA: 2-4 J/kg untuk VF/pulseless VT."},{"id":"mcq_4","q":"Anak hemodinamik stabil. EKG wide QRS. Tatalaksana?","options":["Defibrilasi","Adenosine","Epinephrine","Amiodarone","Synchronized cardioversion"],"answer":3,"topic":"Kardiologi","explanation":"ANAK HEMODINAMIK STABIL + WIDE QRS = VT (Ventricular Tachycardia) STABIL. Tatalaksana VT stabil: AMIODARONE IV (5 mg/kgBB selama 20-60 menit) atau PROCAINAMIDE IV."},{"id":"mcq_5","q":"Anak tidak sadar, tidak ada pulse, tidak ada napas, tidak respons. Apa yang dilihat sebagai inisial untuk memastikan diagnosis cardiac arrest?","options":["Pengembangan dada tidak adekuat saat ventilasi","Bibir biru","SpO2 di pulse oksimetri tidak terdeteksi","Nadi tidak ada dan gasping","Dilated and fixed pupils"],"answer":3,"topic":"Kegawatdaruratan","explanation":"KONFIRMASI CARDIAC ARREST secara KLINIS: tanda UTAMA = TIDAK ADA NADI + TIDAK ADA NAPAS NORMAL (atau gasping)."},{"id":"mcq_6","q":"Anak tidak sadar, pada monitor defib muncul irama tidak teridentifikasi gelombang P ataupun QRS, pasien tidak ada nadi. Diagnosis?","options":["PEA (Pulseless Electrical Activity), unshockable","Pulseless VT, shockable","VF (Ventricular Fibrillation), shockable","Asistol, unshockable","VT dengan nadi, shockable"],"answer":2,"topic":"Kardiologi","explanation":"IRAMA TANPA GELOMBANG P DAN QRS YANG TERIDENTIFIKASI + TIDAK ADA NADI = VENTRICULAR FIBRILLATION (VF)."},{"id":"mcq_10","q":"16 year old with hives after dinner consuming seafood and mango juice, itchy all over body. What mechanism does this happen through?","options":["Eosinophil mediated histamine release","IgE mediated histamine release","IgG mediated histamine release","Neutrophil mediated oxygen burst","IgE mediated basophil release"],"answer":1,"topic":"Alergi-Imunologi","explanation":"REAKSI ALERGI TIPE 1 - IgE-MEDIATED HISTAMINE RELEASE dari SEL MAST. Langkah: (1) Sensitisasi: paparan pertama antigen seafood membentuk IgE spesifik;"},{"id":"mcq_11","q":"6 month baby, after consuming formula milk, suddenly difficult breathing and sucking from bottle. No allergy history but same symptoms before. Parents have allergy to shrimp. What is assessment?","options":["Allergy to shrimp","Anaphylaxis","Milk allergy","Urticaria","Acute respiratory problem"],"answer":2,"topic":"Alergi-Imunologi","explanation":"ALERGI SUSU SAPI: bayi 6 bulan + sesak napas + kesulitan menyedot botol SETELAH minum susu formula + gejala REKUREN (sama sebelumnya) + riwayat alergi keluarga (orang tua alergi udang = atopik)."},{"id":"mcq_12","q":"10 bulan, riwayat kejang 30 menit di rumah, setelah kejang tidak sadar, di UGD kejang lagi 15 menit. Tatalaksana di UGD?","options":["Stesolid rektal 3x, lanjut IV midazolam","IV midazolam","Stesolid rektal 2x, lanjut IV fenitoin jika kejang","IV fenitoin, lanjut IV fenobarbital jika kejang","IV diazepam, lanjut IV fenobarbital, lanjut IV fenitoin"],"answer":1,"topic":"Neurologi","explanation":"STATUS EPILEPTIKUS (SE) - ALGORITMA TATALAKSANA: Total durasi kejang >30 menit + masih berlanjut di UGD = STATUS EPILEPTIKUS."},{"id":"mcq_13","q":"Anak sekolah sering tidur di kelas, nilai menurun, saat bercerita tampak tidak nyambung. Tatalaksana?","options":["EEG dan pemeriksaan neurologis","Konsul psikiater","EEG dan MRI","CT scan kepala dan EEG","EEG dengan hiperventilasi"],"answer":4,"topic":"Neurologi","explanation":"KLUE KUAT ABSENCE SEIZURE: sering melamun/tidak responsif di kelas + nilai turun + tidak nyambung saat bicara (episode blank stare yang tidak disadari) + anak sekolah. Ini sangat menyarankan CHILDHOOD ABSENCE EPILEPSY."},{"id":"mcq_16","q":"A male infant 2.4 kg delivered by C-section at 36 weeks gestational age. Tachypnea, subcostal retractions, nasal flaring, RR 70. CXR: air bronchogram, USG: comet tail artifact. Diagnosis?","options":["Pneumonia","Pneumothorax","HMD (Hyaline Membrane Disease)","MAS (Meconium Aspiration Syndrome)","TTNB (Transient Tachypnea of Newborn)"],"answer":4,"topic":"Neonatologi","explanation":"TRANSIENT TACHYPNEA OF NEWBORN (TTNB): Klue: (1) SC ELECTIVE usia 36 minggu (late preterm/near term), (2) Sesak napas, (3) CXR: AIR BRONCHOGRAM (cairan di saluran udara), (4) USG paru: COMET TAIL ARTIFACT (B-lines = cair..."},{"id":"mcq_20","q":"A 5-days old female term infant with jaundice, total serum bilirubin 21 mg/dL. Plan for phototherapy. Explain the mechanism?","options":["Isomerization of bilirubin to water-soluble lumirubin, excreted by kidney","Splitting bilirubin to water-soluble molecules excreted by kidney","Induction of glucuronyl transferase in liver, increases bilirubin conjugation","Isomerization causing sequestration in skin destroyed by skin macrophages","Direct conjugation of bilirubin molecule to be excreted by liver"],"answer":0,"topic":"Neonatologi","explanation":"MEKANISME FOTOTERAPI: cahaya (panjang gelombang 430-490 nm = biru-hijau) mengubah bilirubin indirek melalui 3 reaksi fotokimia: (1) FOTOISOMERISASI: bilirubin 4Z,15Z menjadi isomer lebih larut yang diekskresikan lewat em..."},{"id":"mcq_22","q":"What is the reason for early detection in Congenital Hypothyroidism?","options":["To ensure proper brain development","To avoid growth retardation","To support comprehensive management and improve long-term outcomes","To maintain normal TSH levels","To prevent delayed puberty"],"answer":0,"topic":"Endokrinologi","explanation":"ALASAN UTAMA DETEKSI DINI HIPOTIROID KONGENITAL: MEMASTIKAN PERKEMBANGAN OTAK YANG OPTIMAL (proper brain development)."},{"id":"mcq_32","q":"A mother of a 6 months old baby wants to start complementary feeding. Based on WHO recommendation, which calorie amount from solid food do you suggest?","options":["150 kcal","200 kcal","300 kcal","550 kcal","800 kcal"],"answer":1,"topic":"Nutrisi","explanation":"MPASI - KEBUTUHAN KALORI DARI MAKANAN PADAT (WHO Energy Gap): Total kebutuhan energi bayi 6-8 bulan: ~615-680 kkal/hari. ASI masih memberikan ~500 kkal/hari pada usia 6-8 bulan."},{"id":"mcq_34","q":"Boy with hypertension, hematuria, and edema. Diagnosis?","options":["Post streptococcal glomerulonephritis","IgA nephropathy","Nephrotic syndrome","HSP","Minimal change disease"],"answer":0,"topic":"Nefrologi","explanation":"GNAPS (Glomerulonefritis Pasca Streptococcus): TRIAS = HIPERTENSI + HEMATURIA + EDEMA = SINDROM NEFRITIK AKUT. Ini adalah presentasi KLASIK GNAPS pada anak."},{"id":"mcq_36","q":"Boy, 4 years old, pitting edema (+++), hypoalbuminemia, urinalysis normal limit. What will you do first?","options":["Perform urinalysis morning and UPCR","Renal ultrasound","Echocardiography","Sweat chloride test","Liver ultrasound"],"answer":0,"topic":"Nefrologi","explanation":"ANAK 4 TAHUN: edema (+++), hipoalbuminemia, urinalisis normal limit = kemungkinan besar SINDROM NEFROTIK tapi perlu konfirmasi proteinuria. Urinalisis awal normal mungkin karena urin encer atau dipstick kurang sensitif."},{"id":"mcq_39","q":"A 3-week-old infant has a TSH level >40 mIU/L on newborn screening but shows no clinical symptoms. Most appropriate next step?","options":["Confirm with repeat thyroid function test","Start treatment immediately with levothyroxine","Repeat the test in 2 weeks without treatment","No treatment is needed","Retest using dried blood spot (DBS)"],"answer":0,"topic":"Endokrinologi","explanation":"TSH >40 mIU/L pada skrining neonatal (DBS/heel prick) = NILAI KRITIS. LANGKAH SELANJUTNYA = KONFIRMASI dengan pemeriksaan thyroid function test dari DARAH VENA (bukan DBS ulang)."},{"id":"mcq_40","q":"What is the main reason for detecting congenital hypothyroidism as early as possible?","options":["To improve long-term outcomes","To support optimal brain development","To prevent delayed puberty","To prevent delayed growth","To maintain normal TSH levels"],"answer":1,"topic":"Endokrinologi","explanation":"ALASAN UTAMA DETEKSI DINI HIPOTIROID KONGENITAL = MENDUKUNG PERKEMBANGAN OTAK YANG OPTIMAL (optimal brain development)."},{"id":"mcq_42","q":"A boy with polyuria and polydipsia, not obese. Random blood glucose elevated, C-peptide level low. What is the most appropriate initial treatment?","options":["Insulin","Metformin","Glucagon","Glimepiride","Sitagliptin"],"answer":0,"topic":"Endokrinologi","explanation":"DM TIPE 1 (C-peptide rendah + anak tidak gemuk + 3P) = INSULIN adalah terapi WAJIB dan SATU-SATUNYA yang dapat menggantikan insulin yang tidak diproduksi."},{"id":"mcq_44","q":"4 years old patient with pale. Physical examination: pale conjunctiva. Lab: Hb 9.2, MCV 68, MCH 22, serum ferritin 8, TIBC 420. Most possible diagnosis?","options":["Vitamin B12 deficiency","Anemia of chronic disease","Iron Deficiency Anemia","Hemolytic anemia","Thalassemia trait"],"answer":2,"topic":"Hematologi-Onkologi","explanation":"ANEMIA DEFISIENSI BESI (ADB): (1) Hb 9.2 = ANEMIA; (2) MCV 68 = MIKROSITIK (<80); (3) MCH 22 = HIPOKROMIK (<27);"},{"id":"san_1","q":"Anak perempuan usia 16 tahun belum pernah menstruasi. Status pubertas P1M1. Apa kemungkinan diagnosis?","options":["Amenorea primer","Amenorea sekunder","Delayed puberty","Pubertas prekoks","Pseudo amenore"],"answer":0,"topic":"Endokrinologi","explanation":"Status pubertas P1M1 = belum ada perkembangan payudara (M1) dan belum ada rambut pubis (P1) = BELUM ADA TANDA PUBERTAS SAMA SEKALI pada usia 16 tahun. Ini adalah AMENOREA PRIMER dengan delayed puberty."},{"id":"san_2","q":"Obat antihipertensi yang juga berfungsi sebagai antiproteinuria pada anak dengan penyakit ginjal adalah?","options":["ACE inhibitor","Calcium Channel Blocker (CCB)","Beta blocker","Diuretik","ARB"],"answer":0,"topic":"Nefrologi","explanation":"ACE INHIBITOR (ACEI, contoh: captopril, enalapril) adalah antihipertensi yang JUGA berfungsi sebagai ANTIPROTEINURIA: (1) ANTIHIPERTENSI: menghambat ACE sehingga angiotensin II turun dan vasodilasi."},{"id":"san_3","q":"Komplikasi dari Streptococcus hemolyticus grup A yang spesifik berasal dari infeksi FARING adalah?","options":["Demam skarlatina","Demam rematik","Glomerulonefritis","Sepsis streptococcus","Peritonsillar abscess"],"answer":1,"topic":"Infeksi","explanation":"DEMAM REMATIK AKUT (DRA) adalah komplikasi NON-SUPURATIF yang SPESIFIK dari infeksi GABHS di FARING. KUNCI: DRA HANYA terjadi setelah infeksi faring (TIDAK setelah infeksi kulit/impetigo)."},{"id":"san_4","q":"Gold standard untuk diagnosis dermatitis alergi kontak adalah?","options":["Skin prick test","Patch test (uji tempel)","IgE spesifik","IgE total","Intradermal test"],"answer":1,"topic":"Alergi-Imunologi","explanation":"PATCH TEST (Uji Tempel) adalah GOLD STANDARD diagnosis DERMATITIS KONTAK ALERGI (DKA). Mekanisme DKA: hipersensitivitas Tipe IV (cell-mediated/delayed, BUKAN IgE-mediated)."},{"id":"san_5","q":"Anak datang dengan productive cough 2 minggu. Ayah pengobatan TB BTA++. Mantoux 15 mm. Apa yang harus diberikan?","options":["FDC 2HRZE/4HR","FDC 2HRZ/4HR","FDC 2HRZE/7-10HR","Isoniazid profilaksis saja","OAT tidak perlu"],"answer":1,"topic":"Infeksi","explanation":"TERAPI TB ANAK: Skor TB = kontak BTA ++ (3 poin) + uji tuberkulin positif 15 mm (3 poin) + batuk >2 minggu (1 poin) = total >=6 poin = TERAPI TB AKTIF."},{"id":"san_6","q":"Anak Down Syndrome, penyakit jantung bawaan yang paling sering ditemukan adalah?","options":["ASD","Koarktasio Aorta","VSD","Tetralogy of Fallot","AVSD (Atrioventricular Septal Defect)"],"answer":4,"topic":"Kardiologi","explanation":"AVSD (Atrioventricular Septal Defect) atau ENDOCARDIAL CUSHION DEFECT adalah PJB yang paling sering ditemukan pada Sindrom Down (Trisomi 21), terjadi pada sekitar 40-50% PJB Down Syndrome."},{"id":"san_7","q":"Kasus dengue dengan Rumple Leed (+) tanpa konfirmasi lab. Klasifikasi?","options":["Probable dengue","Dengue with warning sign","Dengue without warning sign","Confirmed dengue","Expanded dengue syndrome"],"answer":0,"topic":"Infeksi","explanation":"KLASIFIKASI DENGUE WHO 2009: Probable Dengue = gambaran klinis sesuai dengue TAPI BELUM ADA KONFIRMASI LABORATORIS (NS1/IgM/IgG belum diperiksa atau negatif)."},{"id":"san_8","q":"Kasus dengue dengan mual dan muntah persisten. Klasifikasi dengue?","options":["Probable dengue","Dengue with warning sign","Dengue without warning sign","Confirmed dengue","Expanded dengue syndrome"],"answer":1,"topic":"Infeksi","explanation":"DENGUE DENGAN TANDA BAHAYA (Dengue WITH WARNING SIGN): Tanda bahaya dengue WHO 2009 = (1) Nyeri perut atau nyeri tekan abdomen; (2) MUNTAH PERSISTEN (>=3x/24 jam); (3) Akumulasi cairan (asites, efusi pleura);"},{"id":"san_9","q":"Anak akan dilakukan operasi cabut gigi, sebelumnya ada riwayat operasi penutupan katup jantung. Hal yang paling penting diperhatikan adalah?","options":["Uncontrolled bleeding","Infective endocarditis","Adverse drug reaction","Aritmia perioperatif","Gagal napas"],"answer":1,"topic":"Kardiologi","explanation":"INFECTIVE ENDOCARDITIS (IE): anak dengan riwayat operasi penutupan/prostetik katup jantung termasuk RISIKO TINGGI IE. Prosedur gigi menyebabkan BAKTEREMIA sementara (S."},{"id":"san_10","q":"Anak datang dengan nyeri paha dan kaki, pemeriksaan fisik ditemukan rash palpable di pantat dan kaki. Obat yang tepat diberikan?","options":["Dexamethasone","Ibuprofen","Prednison","Antibiotik","Observasi saja"],"answer":1,"topic":"Alergi-Imunologi","explanation":"HENOCH-SCHONLEIN PURPURA (HSP/IgA Vaskulitis): nyeri paha dan kaki + palpable rash di pantat dan kaki = KHAS HSP."},{"id":"san_11","q":"Anak datang dengan BB/U <-2SD, TB/U <-3SD, BB/TB <-2SD. Apa kesimpulan dari data antropometri?","options":["Underweight, severely stunted, wasted","Underweight, stunted, severely wasted","Underweight, severely stunted, severely wasted","Normoweight, severely stunted, obese","Normal, stunted, wasted"],"answer":0,"topic":"Nutrisi","explanation":"Interpretasi STATUS GIZI LENGKAP WHO: (1) BB/U (Weight for Age) <-2 SD = UNDERWEIGHT. (2) TB/U (Height for Age) <-3 SD = SEVERELY STUNTED (sangat pendek). (3) BB/TB (Weight for Height) <-2 SD = WASTED (kurus)."},{"id":"san_12","q":"Seorang anak datang dengan bengkak kelopak mata, tekanan darah 170/110 mmHg. Obat yang tepat untuk hipertensi emergensi?","options":["Furosemide","Nifedipine oral","Labetalol infus","Nicardipine infus","Captopril oral"],"answer":3,"topic":"Nefrologi","explanation":"HIPERTENSI EMERGENSI pada anak: TD 170/110 mmHg = sangat tinggi + edema (tanda keterlibatan organ). Terapi: NICARDIPINE INFUS atau LABETALOL INFUS = pilihan utama hipertensi emergensi anak di rawat inap."},{"id":"san_13","q":"Antihipertensi pilihan untuk anak dengan sindrom nefrotik dan hipertensi yang memiliki efek antiproteinuria adalah?","options":["Diuretik","Beta blocker","Calcium channel blocker","ARB","ACE Inhibitor"],"answer":3,"topic":"Nefrologi","explanation":"ARB (Angiotensin Receptor Blocker, contoh: losartan, irbesartan) adalah antihipertensi dengan efek RENO-PROTEKTIF (antiproteinuria) melalui blokade reseptor AT1 di arteriola eferen glomerulus, mengurangi tekanan intraglo..."},{"id":"san_14","q":"Anak dengue setelah resusitasi cairan: TD 82/45, RR 40x/mnt, rhonki bilateral, akral dingin. Tindakan selanjutnya?","options":["Pemberian vasoaktif/inotropik","Pemberian furosemide IV","Restriksi cairan","Lanjutkan resusitasi cairan","Transfusi PRC"],"answer":1,"topic":"Kegawatdaruratan","explanation":"Kasus ini: SETELAH resusitasi cairan pada dengue, muncul tanda KELEBIHAN CAIRAN (fluid overload): RR 40x/mnt + rhonki bilateral (edema paru)."},{"id":"san_15","q":"Anak dengue dengan demam dan muntah persisten 3 hari. Lab: trombositopenia dan leukopenia. Diagnosis?","options":["Probable dengue with warning sign","Probable dengue without warning sign","Expanded dengue syndrome","Confirmed dengue with warning sign","Probable dengue"],"answer":0,"topic":"Infeksi","explanation":"ANALISIS: (1) Muntah PERSISTEN (>=3x/24 jam) = TANDA BAHAYA dengue. (2) Trombositopenia + leukopenia mendukung dengue. (3) Tidak disebutkan ada konfirmasi lab (NS1/IgM/IgG positif) = PROBABLE."},{"id":"san_16","q":"Anak diare >2 minggu, keadaan umum baik, turgor kembali cepat, CRT <2 detik, anak aktif. Diagnosis?","options":["Diare persisten dengan tanda dehidrasi","Diare kronik tanpa dehidrasi","Diare persisten tanpa dehidrasi","Diare akut dengan tanda dehidrasi","Sindrom diare kronik"],"answer":2,"topic":"Gastroenterologi","explanation":"KLASIFIKASI DIARE: Diare AKUT <14 hari; Diare PERSISTEN >=14 hari (>2 minggu); Diare KRONIK biasanya >4 minggu dengan penyebab organik. Soal: diare >2 minggu = PERSISTEN."},{"id":"san_17","q":"Anak tidak bisa berdiri, mudah capek, sulit naik tangga. Dasar kelainan ada di organ mana?","options":["Muskuloskeletal","Neurologi","Jantung","Ginjal","Paru"],"answer":1,"topic":"Neurologi","explanation":"KELEMAHAN OTOT PROKSIMAL (sulit berdiri dari duduk, sulit naik tangga, mudah capek) adalah pola kelainan NEUROLOGIS/NEUROMUSKULAR, khususnya MIOPATI."},{"id":"san_18","q":"Anak tidak bisa berdiri saat pengukuran tinggi badan, diukur secara tiduran hasilnya 90 cm. Dicatat berapa di lembar pemeriksaan?","options":["89.3 cm","90.7 cm","90 cm","89.7 cm","91 cm"],"answer":0,"topic":"Tumbuh Kembang","explanation":"KOREKSI PENGUKURAN PANJANG vs TINGGI BADAN: Panjang badan (tiduran/recumbent length) LEBIH PANJANG 0.7 cm dibanding tinggi badan (berdiri/standing height) pada orang yang sama."},{"id":"san_19","q":"Bayi lahir tidak menangis, tonus lemah, HR 120, tidak sianosis. Langkah awal yang dilakukan?","options":["Taruh di infant warmer, hangatkan, keringkan, rangsang taktil","Intubasi segera","Berikan CPAP","RJP","Berikan epinefrin IV"],"answer":0,"topic":"Neonatologi","explanation":"RESUSITASI NEONATUS (NRP): Penilaian awal: bayi tidak menangis + tonus lemah = membutuhkan resusitasi. HR 120 (>100) + tidak sianosis = tidak ada bradikardia berat."},{"id":"san_20","q":"Bayi lahir dari ibu HIV positif. Tatalaksana yang tepat diberikan kepada bayi?","options":["Profilaksis zidovudine 4 mg/kgBB/12 jam","Tidak perlu diberikan profilaksis","Cotrimoxazole saja","Hanya observasi","Nevirapine dosis tunggal"],"answer":0,"topic":"Infeksi","explanation":"PROFILAKSIS ARV pada BAYI LAHIR DARI IBU HIV: Semua bayi dari ibu HIV WAJIB mendapatkan profilaksis ARV."},{"id":"san_21","q":"Bayi lahir dengan kelainan jantung kongenital. Untuk menegakkan etiologi (infeksi maternal), pemeriksaan apa yang dilakukan?","options":["IgM pada ibu","IgG pada ibu","IgM pada bayi","IgG pada bayi","IgM dan IgG pada bayi"],"answer":3,"topic":"Kardiologi","explanation":"Untuk mengetahui apakah PJK disebabkan infeksi maternal (terutama rubella/TORCH): IgG PADA BAYI adalah yang paling tepat. IgG ibu dapat melewati plasenta ke bayi (transmisi transplasental IgG)."},{"id":"san_22","q":"Seorang anak di IGD dengan kejang umum tonik klonik yang sedang berlangsung. Tatalaksana segera yang diberikan?","options":["Berikan high flow oxygen","Diazepam suppositoria 5 mg","Midazolam 0.1 mg/kgBB IV","Fenobarbital IV","Fenitoin IV"],"answer":2,"topic":"Neurologi","explanation":"TATALAKSANA KEJANG AKTIF di IGD (sudah ada akses IV): MIDAZOLAM IV 0.1-0.2 mg/kgBB adalah PILIHAN UTAMA di IGD jika sudah ada akses IV. Atau: Diazepam IV 0.2-0.3 mg/kgBB."},{"id":"san_23","q":"Anak kejang umum tonik klonik disertai demam tinggi 40 derajat. Ada riwayat kejang TANPA DEMAM sebelumnya. Setelah kejang, kondisi pasien normal. Diagnosisnya?","options":["Epilepsi","Status epilepticus","Kejang demam","First provoked seizure","Kejang demam plus"],"answer":0,"topic":"Neurologi","explanation":"KUNCI DIAGNOSIS: riwayat KEJANG TANPA DEMAM sebelumnya + sekarang kejang DENGAN DEMAM."},{"id":"san_24","q":"Anak dengan kelainan katup jantung akan dicabut giginya. Antibiotik profilaksis untuk mencegah infeksi endokarditis?","options":["Amoksisilin","Eritromisin","Klindamisin","Sefazolin","Vankomisin"],"answer":0,"topic":"Kardiologi","explanation":"PROFILAKSIS ENDOKARDITIS INFEKTIF (IE) - AHA Guidelines: Antibiotik pilihan utama = AMOKSISILIN 50 mg/kgBB oral (maks 2 g), diberikan 30-60 menit SEBELUM prosedur gigi. Mencegah bakteremia S."},{"id":"san_25","q":"Pasien anak datang dengan demam, strawberry tongue, pembesaran KGB leher, dan ruam pada kaki. Diagnosis?","options":["Kawasaki disease","Scarlet fever","Demam rematik","Morbili","Rubela"],"answer":1,"topic":"Infeksi","explanation":"SCARLET FEVER (Demam Skarlatina): infeksi S. pyogenes (GABHS) yang menghasilkan toksin eritrogenik."},{"id":"san_26","q":"Obat yang diberikan untuk kasus scarlet fever adalah?","options":["Penicillin G IV","Eritromisin","Amoksisilin oral","Klindamisin","Sefadroksil"],"answer":0,"topic":"Infeksi","explanation":"TERAPI SCARLET FEVER: S. pyogenes (GABHS) paling sensitif terhadap penisilin. Terapi pilihan: (1) RAWAT INAP/BERAT: PENISILIN G IV 100.000-400.000 unit/kgBB/hari IV selama 10 hari."},{"id":"san_27","q":"Pasien datang tidak sadar, nafas cepat tidak retraksi, akral hangat, sianosis (-). Kesimpulan PAT?","options":["Respiratory failure","Gawat napas (Respiratory distress)","Compensated shock","Cardiopulmonary failure","Metabolic/CNS disturbance"],"answer":2,"topic":"Kegawatdaruratan","explanation":"Paediatric Assessment Triangle (PAT): (1) APPEARANCE: ABNORMAL karena TIDAK SADAR. (2) WORK OF BREATHING: napas cepat TAPI TIDAK ADA RETRAKSI = tidak ada tanda distres napas primer."},{"id":"san_28","q":"Ibu konsultasi anaknya usia 7 hari karena terdapat small PDA. Edukasi yang tepat diberikan?","options":["Pemberian ibuprofen segera","PDA akan menutup sendiri secara pasti","Evaluasi beberapa minggu lagi dengan echocardiography","Operasi segera diperlukan","Tidak perlu diapa-apakan"],"answer":2,"topic":"Kardiologi","explanation":"PDA KECIL pada bayi CUKUP BULAN usia 7 hari: manajemen KONSERVATIF dengan EVALUASI ECHOCARDIOGRAPHY dalam beberapa minggu. Mayoritas PDA kecil pada bayi cukup bulan menutup SPONTAN dalam minggu-bulan pertama."},{"id":"san_29","q":"Pasien curiga RHD, auskultasi bising jantung terdengar di daerah mana?","options":["ICS 2-3 parasternal kiri","ICS 2-3 parasternal kanan","ICS 3-4 parasternal kiri","ICS 3-4 parasternal kanan","ICS 5 linea midklavikula kiri (apex)"],"answer":4,"topic":"Kardiologi","explanation":"RHD (Rheumatic Heart Disease) paling sering mengenai KATUP MITRAL. Insufisiensi Mitral (MR) - bising tersering pada RHD: BISING HOLOSISTOLIK (pansistolik) paling keras di APEX (ICS 5 linea midklavikula kiri) dan menjalar..."},{"id":"san_30","q":"Anak 12 bulan datang konsultasi. Ibu ingin tahu perkembangan anak sesuai milestone usia 12 bulan. Apa yang diedukasi?","options":["Anak bisa duduk sendiri","Anak menoleh ketika dipanggil namanya","Minum dari cangkir tanpa tutup saat dipegang","Berjalan mandiri","Berlari"],"answer":2,"topic":"Tumbuh Kembang","explanation":"MILESTONE USIA 12 BULAN: Motorik kasar: berdiri mandiri, berjalan dengan pegangan. Motorik halus: mengambil benda kecil dengan pincer grasp, MINUM DARI CANGKIR dengan bantuan (dipegang orang tua) = MILESTONE 12 BULAN."},{"id":"san_31","q":"Anak berkata kalimat: apakah saya dapat bermain dengan Alex. Kalimat ini sesuai dengan anak usia berapa?","options":["1 tahun","2 tahun","3 tahun","4 tahun","5 tahun"],"answer":3,"topic":"Tumbuh Kembang","explanation":"MILESTONE BAHASA: kalimat kompleks dengan kata tanya dan lebih dari 4 kata seperti kalimat ini menunjukkan kemampuan bahasa yang cukup matang. Milestone bahasa: 12 bulan = 1 kata; 18 bulan = 5-10 kata;"},{"id":"san_32","q":"Milestone motorik halus yang khas untuk usia 4 tahun adalah?","options":["Menggambar dari 3 bagian tubuh","Menggambar lingkaran","Menggambar tanda plus (+)","Berdiri satu kaki 10 detik","Lompat dengan dua kaki"],"answer":0,"topic":"Tumbuh Kembang","explanation":"MILESTONE MENGGAMBAR usia 4 tahun: MENGGAMBAR ORANG/FIGUR MANUSIA dari 3 BAGIAN (kepala + badan + kaki atau anggota gerak) = KHAS 4 TAHUN. Urutan milestone menggambar: 2 tahun = garis lurus; 3 tahun = lingkaran (O);"},{"id":"san_33","q":"Anak usia 2 tahun, perkembangan fisik yang sesuai dengan usianya adalah?","options":["Dapat mengambil barang dengan ibu jari dan jari telunjuk (small food)","Dapat makan dengan sendok","Dapat mengambil baju sendiri","Dapat mengambil air minum sendiri dengan pendampingan","Dapat berlari dengan baik"],"answer":1,"topic":"Tumbuh Kembang","explanation":"MILESTONE PERSONAL-SOSIAL DAN MOTORIK HALUS USIA 2 TAHUN: MAKAN DENGAN SENDOK = milestone 18-24 bulan = SESUAI usia 2 tahun. Anak usia 2 tahun sudah bisa makan sendiri dengan sendok meski masih berantakan."},{"id":"san_34","q":"Bayi lahir BBL 2000 gram dari ibu HBsAg positif. Tatalaksana yang diberikan?","options":["HyperHEP B dan Vaksin Hepatitis B dalam waktu <12 jam","HyperHEP B dan Vaksin Hepatitis B dalam waktu >24 jam","Ditunda dulu sampai BB naik","Vaksin Hepatitis B saja","HyperHEP B saja"],"answer":0,"topic":"Imunisasi","explanation":"BAYI LAHIR DARI IBU HBsAg POSITIF: Tatalaksana STANDAR: HBIG (Hepatitis B Immunoglobulin/HyperHEP B) + Vaksin Hepatitis B diberikan dalam waktu <12 JAM setelah lahir, di sisi berbeda tubuh."},{"id":"san_35","q":"Bayi lahir dari ibu golongan darah O negatif, Coombs test positif. Bayi kuning di wajah dan dada, bilirubin 13, suhu 35 derajat. Apa yang menjadi concern utama?","options":["Bilirubin tinggi","Hemoglobin (anemia)","Suhu rendah (hipotermia)","Ikterus grade 3","Inkompatibilitas Rh"],"answer":2,"topic":"Neonatologi","explanation":"ANALISIS KASUS: Suhu 35 derajat = HIPOTERMIA (normal neonatus: 36.5-37.5 derajat Celsius)."},{"id":"san_36","q":"Anak 15 bulan kelewat imunisasi MR usia 9 bulan. Apa yang akan diberikan sekarang?","options":["MMR saja","MR kemudian MMR selang 1 bulan","MR kemudian MMR selang 2 bulan","MR saja tanpa MMR","MR kemudian MMR 6 bulan kemudian"],"answer":1,"topic":"Imunisasi","explanation":"CATCH-UP IMUNISASI pada anak 15 bulan yang belum pernah mendapat vaksin MR/MMR (terlewat usia 9 bulan): Berikan MR sekarang (program nasional Indonesia), kemudian MMR setelah MINIMAL 1 BULAN (28-30 hari = jarak minimal a..."},{"id":"san_37","q":"Anak datang diukur antropometri. IMT berada di persentil 85-95. Klasifikasi anak?","options":["Overweight","Obesitas","Normal","Underweight","Risk of overweight"],"answer":0,"topic":"Nutrisi","explanation":"KLASIFIKASI STATUS GIZI BERDASARKAN IMT/U menggunakan PERSENTIL (CDC Growth Chart): Underweight: IMT <persentil 5; Normal: persentil 5-84; Overweight: persentil 85-95; Obese: >persentil 95."},{"id":"san_38","q":"Anak datang diukur antropometri: WFA z-score +1.5, HFA z-score +1.3. Kesimpulan?","options":["Risk for overweight","Risk for obesity","Obese","Normal","Underweight"],"answer":0,"topic":"Nutrisi","explanation":"INTERPRETASI WFA +1.5 SD dan HFA +1.3 SD pada WHO Growth Chart: WFA (BB/U) +1.5 SD = berat badan di atas rata-rata antara +1 dan +2 SD. HFA (TB/U) +1.3 SD = tinggi badan di atas rata-rata = NORMAL."},{"id":"san_39","q":"Bayi prematur lahir dari ibu usia kehamilan 30 minggu, kondisi lahir baik. Bila dilakukan delayed cord clamping (DCC), sebaiknya bagaimana?","options":["DCC baik bila lebih dari 30 detik, tidak baik bila <30 detik","DCC baik bila lebih dari 25 detik, tidak baik bila <25 detik","DCC dilakukan minimal 60 detik","DCC tidak direkomendasikan pada prematur","DCC dilakukan 3-5 menit"],"answer":0,"topic":"Neonatologi","explanation":"DELAYED CORD CLAMPING (DCC) pada PREMATUR: WHO dan berbagai guideline merekomendasikan DCC MINIMAL 30-60 detik pada bayi prematur."},{"id":"san_40","q":"Untuk menilai kelainan kongenital mayor (kelainan jantung) pada bayi baru lahir, pemeriksaan apa yang dilakukan?","options":["Pengukuran lingkar kepala","Pemeriksaan telinga","Pemeriksaan fisik lengkap","Pulse oximetry screening","Echocardiography"],"answer":3,"topic":"Neonatologi","explanation":"PULSE OXIMETRY SCREENING untuk CCHD (Critical Congenital Heart Disease): pemeriksaan NON-INVASIF yang direkomendasikan untuk deteksi PJK KRITIS pada SEMUA bayi baru lahir."},{"id":"san_41","q":"Anak datang dengan keluhan nyeri perut. Dari pemeriksaan fisik didapatkan suara metallic sound (bunyi logam). Diagnosisnya?","options":["Ileus obstruktif","Appendisitis","Intususepsi","Peritonitis","Volvulus"],"answer":0,"topic":"Gastroenterologi","explanation":"METALLIC SOUND (bunyi logam/nada tinggi) pada auskultasi abdomen adalah tanda KHAS ILEUS OBSTRUKTIF."},{"id":"san_42","q":"Nyamuk yang dapat menurunkan angka kejadian dengue adalah?","options":["Aedes aegypti","Aedes wolbachia","Aedes albopictus","Culex quinquefasciatus","Anopheles"],"answer":1,"topic":"Infeksi","explanation":"AEDES DENGAN BAKTERI WOLBACHIA: Nyamuk Ae. aegypti yang telah terinfeksi bakteri Wolbachia. Wolbachia adalah bakteri endosimbion yang secara alami ditemukan pada banyak serangga. Nyamuk Ae."},{"id":"san_43","q":"Bayi punya masalah latching saat menetek. Bagaimana posisi yang benar supaya latching bagus?","options":["Hidung sejajar dengan nipple (puting susu)","Hidung sejajar dengan areola","Telinga, bahu, badan sejajar","Dagu menyentuh payudara dan mulut terbuka lebar menutup areola","Semua komponen di atas diperlukan"],"answer":3,"topic":"Nutrisi","explanation":"TEKNIK LATCHING YANG BENAR: (1) Mulut bayi harus TERBUKA LEBAR dan menutup SEBAGIAN BESAR AREOLA (bukan hanya puting), bibir bawah terlipat ke luar. (2) DAGU MENYENTUH PAYUDARA: menandakan latch yang dalam (deep latch)."},{"id":"san_44","q":"Anak dengan hasil CBC pansitopenia. Pemeriksaan untuk mengkonfirmasi diagnosis?","options":["Analisis sumsum tulang","Pungsi sumsum tulang (bone marrow puncture/biopsy)","Pemeriksaan darah tepi","Rontgen tulang","Skin biopsy"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"PANSITOPENIA (anemia + leukopenia + trombositopenia): etiologi yang paling ditakuti = ANEMIA APLASTIK atau LEUKEMIA."},{"id":"san_45","q":"Anak asma serangan akut. Tatalaksana yang tepat?","options":["Nebulisasi bronkodilator (salbutamol) + O2","Injeksi steroid IV terlebih dahulu","Antibiotik empiris","Observasi saja","Oksigen saja"],"answer":0,"topic":"Pulmonologi","explanation":"TATALAKSANA ASMA AKUT pada anak: LANGKAH PERTAMA = NEBULISASI BRONKODILATOR SABA (Short-Acting Beta-2 Agonist) = salbutamol (albuterol) 2.5-5 mg nebul (0.15 mg/kgBB), dapat diulang setiap 20 menit selama 1 jam pertama, B..."},{"id":"san_46","q":"Anak bersin-bersin dan hidung tersumbat di pagi hari, ayah ada riwayat asma. Bagaimana mekanisme hidung tersumbat?","options":["Peningkatan permeabilitas mukosa hidung","Degranulasi sel mast (cell mast rupture) di kavum nasal","Leukotriene release di kavum nasal","Bradikinin release","Infiltrasi eosinofil"],"answer":1,"topic":"Alergi-Imunologi","explanation":"RHINITIS ALERGI - MEKANISME KONGESTI HIDUNG: Pajanan alergen pada mukosa hidung yang tersensitisasi lalu cross-linking IgE pada sel mast lalu DEGRANULASI SEL MAST = pelepasan mediator preformed: HISTAMIN (vasodilasi dan ..."},{"id":"san_47","q":"Bayi saat lahir tidak disuntik vitamin K karena stok habis. Pasien mengalami perdarahan. Bagaimana hasil labnya?","options":["PT dan APTT memanjang","PT memanjang saja, APTT normal","APTT memanjang saja, PT normal","PT dan APTT normal, trombosit rendah","Trombosit rendah saja"],"answer":0,"topic":"Hematologi-Onkologi","explanation":"VITAMIN K DEFICIENCY BLEEDING (VKDB) / Hemorrhagic Disease of Newborn: Vitamin K diperlukan untuk sintesis faktor koagulasi II (protrombin), VII, IX, X."},{"id":"san_48","q":"Anak dengan curiga RHD, auskultasi bising jantung terdengar di daerah mana?","options":["ICS 2-3 parasternal kiri","ICS 2-3 parasternal kanan","ICS 3-4 parasternal kiri","ICS 3-4 parasternal kanan","ICS 5 linea midklavikula kiri (apex)"],"answer":4,"topic":"Kardiologi","explanation":"RHD paling sering mengenai KATUP MITRAL. Insufisiensi Mitral (MR): BISING HOLOSISTOLIK paling keras di APEX (ICS 5 linea midklavikula kiri) dan menjalar ke AKSILA KIRI."},{"id":"san_49","q":"Anak usia 2 tahun dengan Hb menurun dan TIBC meningkat. Diagnosis?","options":["Anemia defisiensi besi","Anemia aplastik","Anemia hemolitik","Talasemia","Anemia defisiensi B12"],"answer":0,"topic":"Hematologi-Onkologi","explanation":"ANEMIA DEFISIENSI BESI (ADB): TIBC (Total Iron Binding Capacity) MENINGKAT = tanda KHAS ADB. Saat besi kurang, tubuh memproduksi LEBIH BANYAK TRANSFERIN sebagai kompensasi untuk menangkap besi yang sedikit."},{"id":"san_50","q":"Anak minum obat TB lalu mengalami badan kuning (ikterus). Obat mana yang menyebabkan hal tersebut?","options":["Streptomisin","Etambutol","Rifampisin","Isoniazid","Pirazinamid"],"answer":4,"topic":"Infeksi","explanation":"HEPATOTOKSISITAS OAT: PIRAZINAMID (PZA) adalah obat TB yang paling HEPATOTOKSIK dan paling sering menyebabkan drug-induced liver injury (DILI) dengan ikterus."},{"id":"san_51","q":"Anak dengan hemofilia A diberikan injeksi faktor VIII. Anak kemudian merasa sesak dan ada wheezing. Bagaimana patomekanismenya?","options":["Histamin release dari sel mast (reaksi hipersensitivitas tipe I)","Sitotoksisitas sel NK","Deposisi kompleks imun","Reaksi hipersensitivitas tipe IV","Aktivasi komplemen jalur klasik"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Reaksi SETELAH INJEKSI FAKTOR VIII pada hemofilia A: sesak + wheezing = BRONKOSPASME = REAKSI ANAFILAKSIS."},{"id":"san_52","q":"Sudah makan udang, muncul reaksi berupa gatal dan edema pada mata. Mekanisme yang mendasari?","options":["Ruptur eosinofil","Degranulasi sel mast (rupture cell mast)","Degranulasi neutrofil","Aktivasi limfosit T","Deposisi kompleks imun"],"answer":1,"topic":"Alergi-Imunologi","explanation":"REAKSI ALERGI MAKANAN UDANG - URTIKARIA dan ANGIOEDEMA: Mekanisme = HIPERSENSITIVITAS TIPE I (IgE-mediated): Protein udang (alergen) lalu IgE spesifik pada sel mast (di konjungtiva dan submukosa kelopak mata) lalu cross-..."},{"id":"san_53","q":"Anak usia 4 tahun datang dengan ulkus oral, BB sulit naik, ibu meninggal dengan keadaan sangat kurus. Apa yang harus diperiksakan?","options":["PCR RNA HIV","Antibodi HIV serologis","ELISA HIV","Western Blot","Antigen p24 HIV"],"answer":0,"topic":"Infeksi","explanation":"DIAGNOSIS HIV PADA ANAK: anak 4 tahun + ulkus oral (kandidosis/herpetik = imunosupresi) + BB tidak naik + ibu meninggal sangat kurus (kemungkinan AIDS) = sangat curiga HIV."},{"id":"san_54","q":"Anak usia 6 tahun tampak pucat. Supaya efisien, apa yang diperiksakan pertama kali?","options":["Hb dan TIBC","Hb dan MCV","Hb dan bilirubin","Hb dan feritin","Hb dan retikulosit"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"SKRINING ANEMIA YANG EFISIEN = Hb + MCV (Mean Corpuscular Volume). Mengapa Hb + MCV? (1) Hb: konfirmasi ADA/TIDAK anemia. (2) MCV: menentukan JENIS anemia berdasarkan ukuran eritrosit."},{"id":"san_55","q":"Dapat laporan lutut anak 6 tahun nyeri. Ibu bekerja. Asesmen apa yang digunakan untuk menilai keparahan (severity) nyeri?","options":["VAS (Visual Analog Scale)","Rontgen sendi","ESR","CBC","Pemeriksaan fisik sendi"],"answer":0,"topic":"Kegawatdaruratan","explanation":"VAS (Visual Analog Scale) = alat SUBYEKTIF untuk mengukur KEPARAHAN/INTENSITAS NYERI yang dirasakan pasien. VAS nyeri: garis 10 cm dari 0 (tidak nyeri) sampai 10 (nyeri terberat)."},{"id":"san_56","q":"Bayi lahir dengan petekie minimal, usia 3 hari mengalami kuning dan petekie menjadi purpura. Langkah awal yang sebaiknya dilakukan?","options":["Cek USG liver","Pisahkan bayi dari bangsal maternal (isolasi)","Cek hormon tiroid","Cek trombosit dan koagulasi","CBC dan hapusan darah tepi"],"answer":1,"topic":"Neonatologi","explanation":"Bayi baru lahir dengan PURPURA + IKTERUS NEONATAL = kemungkinan INFEKSI KONGENITAL (TORCH) seperti RUBELA atau CMV KONGENITAL."},{"id":"san_57","q":"Terapi rhinitis alergi lini pertama yang direkomendasikan adalah?","options":["Antihistamin generasi 2 selama 1-2 minggu","Dekongestan nasal","Steroid intranasal","Kortikosteroid sistemik","Imunoterapi alergen"],"answer":2,"topic":"Alergi-Imunologi","explanation":"TERAPI RHINITIS ALERGI - LINI PERTAMA berdasarkan guideline ARIA: STEROID INTRANASAL (Intranasal Corticosteroid/INCS) seperti flutikason, mometason, budesonid adalah terapi PALING EFEKTIF untuk SEMUA gejala rhinitis aler..."},{"id":"san_58","q":"Anak stridor inspirasi. Foto rontgen apa yang dilakukan untuk evaluasi?","options":["Foto rontgen dada AP","Foto rontgen leher AP dan lateral","Foto rontgen sinus paranasal","CT scan thorax","MRI leher"],"answer":1,"topic":"Pulmonologi","explanation":"STRIDOR INSPIRASI = obstruksi jalan napas EKSTRA-TORAKAL (laring, subglotis, trakea servikalis). Evaluasi radiologis PERTAMA: FOTO RONTGEN LEHER AP DAN LATERAL."},{"id":"san_59","q":"Anak perempuan dengan menstruasi deras, Hb turun, trombosit rendah, leukosit normal. Diagnosis?","options":["Anemia aplastik","ITP (Immune Thrombocytopenic Purpura)","Von Willebrand disease","Leukemia","Hemofilia"],"answer":1,"topic":"Hematologi-Onkologi","explanation":"ITP (Immune Thrombocytopenic Purpura): (1) Trombositopenia TERISOLASI (trombosit rendah) dengan leukosit NORMAL = BUKAN pansitopenia."},{"id":"san_60","q":"Anak datang dengan demam, batuk, sesak. Alat yang digunakan untuk penilaian emergensi pertama kali?","options":["Foto thorax","CBC","AGD (Analisa Gas Darah)","Pulse oximetry","Auskultasi paru"],"answer":3,"topic":"Kegawatdaruratan","explanation":"PENILAIAN EMERGENSI ANAK - ALAT PERTAMA = PULSE OXIMETRY (saturasi oksigen/SpO2). Pulse oximetry: non-invasif, segera tersedia dalam detik, memberikan informasi vital: (1) SpO2: <92% = hipoksemia = tindakan SEGERA;"},{"id":"san_61","q":"Anak demam >2 bulan. Tatalaksana yang tepat?","options":["Cari penyebab (evaluasi komprehensif)","Paracetamol setiap 8 jam rutin","Antibiotik empiris","Kortikosteroid","Antipiretik dan observasi"],"answer":0,"topic":"Infeksi","explanation":"DEMAM >2 BULAN = FEVER OF UNKNOWN ORIGIN (FUO) / Demam Berkepanjangan pada anak. Definisi FUO: demam >=38.3 derajat Celsius selama >=3 minggu tanpa penyebab jelas setelah investigasi awal."},{"id":"san_62","q":"Anak dengan bengkak leher, terasa nyeri saat minum lemon. Diagnosis?","options":["Mumps (parotitis epidemika)","Limfadenitis servikalis","Abses peritonsil","Tiroiditis","Selulitis leher"],"answer":0,"topic":"Infeksi","explanation":"MUMPS (Parotitis Epidemika): demam + bengkak di LEHER (kelenjar PAROTIS) + NYERI SAAT MINUM ASAM/LEMON (makanan asam merangsang produksi saliva melalui ductus parotis yang edematous = NYERI = TANDA PATOGNOMONIK MUMPS)."},{"id":"san_63","q":"Anak terlambat berjalan dan ada rigiditas. Apa jenis kelainan yang terjadi?","options":["Gross motor delay","Fine motor delay","Language delay","Social delay","Cognitive delay"],"answer":0,"topic":"Tumbuh Kembang","explanation":"TERLAMBAT BERJALAN + RIGIDITAS (kekakuan/hipertonia): Berjalan adalah kemampuan MOTORIK KASAR (gross motor). Terlambat mencapai milestone berjalan = GROSS MOTOR DELAY."},{"id":"m2_1","q":"Seorang ibu membawa anaknya usia 11 bulan untuk imunisasi. Anak alergi telur. Riwayat vaksinasi: DPT 3x, Hib 3x, Polio 4x, HepB 3x. Kapan akan diberikan imunisasi BCG yang belum pernah diberikan?","options":["Saat ini bersamaan dengan vaksin diatas","Apabila tidak terdapat riwayat kontak TBC","Bila uji Mantoux positif","Bila uji Mantoux negatif","Bila uji BCG negatif"],"answer":3,"topic":"Imunisasi","explanation":"BCG pada anak >3 bulan sebaiknya didahului uji tuberkulin (Mantoux test). Jika hasilnya negatif, BCG dapat diberikan. Jika positif, kemungkinan anak sudah terinfeksi TB."},{"id":"m2_2","q":"Kemampuan perkembangan anak usia 11 bulan yang paling benar adalah:","options":["Berjalan dan mengucapkan satu kata","Berbalik dari telungkup dan telentang, menirukan bunyi","Mengangkat kepala tegak dan tertawa","Merambat dan mengucapkan ma..ma.., da..da..","Menggenggam mainan dan tersenyum ketika melihat mainan"],"answer":3,"topic":"Tumbuh Kembang","explanation":"Milestone perkembangan usia 11 bulan: motorik kasar - merambat/berdiri berpegangan, bahasa - mengucapkan mama-papa (babbling bermakna)."},{"id":"m2_3","q":"Anak laki-laki 12 tahun, kaki dan tangan dingin setelah suntikan penisilin. TD 90/70, nadi 128x/menit cepat kecil, CRT >3 detik, akral dingin. Obat pertama yang diberikan:","options":["Adrenalin","Hidrokortison","Cairan kristaloid","Antibiotik"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Pada syok anafilaksis, adrenalin/epinefrin merupakan obat lini pertama yang harus segera diberikan secara intramuskular untuk mengatasi vasodilatasi dan bronkospasme."},{"id":"m2_4","q":"Anak perempuan 3 tahun, kejang dua kali hanya sebelah kanan tubuh selama 15 menit, setelah kejang sadar. Demam tinggi. Kemungkinan diagnosis:","options":["Kejang demam sederhana","Kejang demam kompleks","Kejang demam plus","Palsi serebral","Hemiparesis kanan"],"answer":1,"topic":"Neurologi","explanation":"Kejang demam kompleks memenuhi minimal 1 kriteria: kejang fokal (sebelah kanan), durasi >15 menit, atau berulang dalam 24 jam. Pada kasus ini terdapat kejang fokal dan durasi 15 menit."},{"id":"m2_5","q":"Bayi laki-laki usia 11 bulan, BB 9 kg dengan diare dan dehidrasi berat, turgor kulit buruk, penurunan produksi urin, tidak renjatan. Macam cairan untuk mengatasi dehidrasi:","options":["D5 1/2 NS","D5 1/4 NS","RL","NaCl 0,9%"],"answer":2,"topic":"Gastroenterologi","explanation":"Pada dehidrasi berat karena diare, cairan kristaloid isotonis (Ringer Laktat) merupakan pilihan utama untuk rehidrasi intravena karena komposisinya mendekati cairan ekstraselular."},{"id":"m2_6","q":"Anak perempuan 3 tahun, BB 7 kg, TB 80 cm. Wajah seperti orang tua, iga gambang, baggy pants, otot hipotrofi. Diagnosis:","options":["Kwasiorkor","Marasmus","Marasmus kwasiorkor","Malnutrisi ringan","Normal"],"answer":1,"topic":"Nutrisi","explanation":"Marasmus ditandai: wajah old man face, iga gambang, baggy pants (kulit paha berlipat-lipat), otot hipotrofi/atrofi, tanpa edema. BB/TB sangat rendah."},{"id":"m2_7","q":"Bayi 3 bulan, merah-merah di kedua pipi tidak hilang. Gatal, mengusap pipi. Ruam juga di lengan. Mendapat susu formula. Ayah bersin di pagi hari. Diagnosis yang paling mendekati:","options":["Dermatitis atopic","Dermatitis seborrhoik","Dermatitis kontak","Miliaria rubra","Impetigo bullosa"],"answer":0,"topic":"Alergi-Imunologi","explanation":"Dermatitis atopi pada bayi khas: ruam eritematosa di wajah (pipi) dan ekstensor ekstremitas, pruritus, riwayat atopi keluarga (ayah rinitis alergika), dipicu susu formula."},{"id":"m2_8","q":"Anak laki-laki 9 bulan, pucat sejak 2 bulan. Anemia, ikterik ringan, sistolik murmur, hepatosplenomegali. Hb 4,8 g/dL. Diagnosis paling mungkin:","options":["Anemia defisiensi besi","Anemia sideroblastik","Talasemia mayor","Leukemia limfoblastik akut","Anemia karena penyakit kronis"],"answer":2,"topic":"Hematologi","explanation":"Talasemia mayor ditandai: anemia berat (Hb <7) sejak bayi, ikterik, hepatosplenomegali, dan murmur fungsional akibat anemia. Onset gejala pada usia 6-12 bulan saat HbF menurun."},{"id":"m2_9","q":"Pernyataan berikut benar untuk sindrom nefrotik:","options":["Pada anak biasanya lebih berat daripada dewasa","Lebih sering pada anak perempuan","Umumnya bentuk kelainan non minimal","Umumnya disertai hiperkolesterolemia","Kelainan minimal lebih sering pada masa remaja"],"answer":3,"topic":"Nefrologi","explanation":"Sindrom nefrotik ditandai: proteinuria masif, hipoalbuminemia, edema, dan hiperkolesterolemia. Pada anak umumnya tipe kelainan minimal (80%) dan lebih sering pada laki-laki."},{"id":"m2_10","q":"Anak laki-laki 3 tahun, diare cair >10x/hari sejak 3 hari. Lemas, somnolen, nadi 140x/menit halus, napas 40x/menit cepat dalam, TD 70/40 mmHg, mata cekung, turgor kurang, CRT >2 detik. Terapi cairan:","options":["Ringer laktat 20 ml/kgBB secepatnya (10-15 menit)","Dekstrosa 10% 20 ml/kgBB secepatnya","Albumin 5% 20 ml/kgBB secepatnya","Koloid 20 ml/kgBB secepatnya","NaCl 3% 20 ml/kgBB secepatnya"],"answer":0,"topic":"Kegawatdaruratan","explanation":"Pada dehidrasi berat dengan tanda syok, resusitasi cairan kristaloid (RL) 20 ml/kgBB secepatnya (10-15 menit) sebagai bolus pertama. Evaluasi ulang setelah bolus pertama."},{"id":"m2_11","q":"Sebelum bilirubin dapat diekskresi pada bayi baru lahir, bilirubin harus mengalami proses:","options":["Oksidasi di ginjal","Hemolisis di aliran darah","Konjugasi di hati","Dicerna dalam usus"],"answer":2,"topic":"Neonatologi","explanation":"Bilirubin indirek (tidak terkonjugasi) harus mengalami konjugasi di hati oleh enzim UDP-glukuronil transferase menjadi bilirubin direk (terkonjugasi) agar dapat diekskresi melalui empedu."},{"id":"m2_12","q":"Anak 3 tahun, BB sulit naik, sering panas badan, batuk pilek. Pengasuh sakit paru-paru mendapat 4 macam obat. Tata laksana TB paru pada anak:","options":["INH selama 6 bulan","INH dan rifampisin selama 6 bulan","INH, rifampisin, dan pirazinamid 2 bulan pertama, dilanjutkan INH dan rifampisin 4 bulan","INH, rifampisin, pirazinamid, dan etambutol 2 bulan pertama, dilanjutkan INH dan rifampisin 4 bulan","INH, rifampisin, pirazinamid, etambutol, dan streptomisin 2 bulan pertama, dilanjutkan INH dan rifampisin 10 bulan"],"answer":2,"topic":"Infeksi","explanation":"Regimen OAT untuk TB paru anak: fase intensif 2 bulan (INH+Rifampisin+Pirazinamid), fase lanjutan 4 bulan (INH+Rifampisin). Total 6 bulan pengobatan."},{"id":"m2_13","q":"Anak perempuan 7 tahun, batuk akut dan mengi, diberikan nebulisasi salbutamol. Indikasi rawat pada kasus ini apabila:","options":["Nilai peak flow rate 80% sesuai tinggi badan","Batuk berkelanjutan","Laju pernafasan 40x/min","Saturasi oksigen 90%","Anak tampak baik"],"answer":3,"topic":"Respirologi","explanation":"Saturasi oksigen ≤92% merupakan indikasi rawat inap pada asma. PFR 80% menunjukkan serangan ringan. Saturasi 90% menunjukkan hipoksemia yang memerlukan perawatan."},{"id":"m2_14","q":"Anak laki-laki 3 tahun didiagnosa hypercarotenemia. Gambaran kuning paling tampak pada:","options":["Sclera dan Rongga Mulut","Sclera dan Kuku","Rongga Mulut","Sclera","Kulit"],"answer":4,"topic":"Nutrisi","explanation":"Hypercarotenemia menyebabkan kulit kuning tetapi TIDAK mengenai sklera (berbeda dengan ikterus). Karoten terakumulasi di kulit, terutama telapak tangan dan telapak kaki."},{"id":"m2_15","q":"Bayi laki-laki lahir dari ibu dengan plasenta previa totalis, SCTP, usia kehamilan 34 minggu, BBL 1200 gram, AS 5-7. Enam jam setelah lahir sesak, retraksi interkostalis, Downes Score 5. Sesak nafas kemungkinan karena:","options":["Kekurangan glukosa","Kekurangan surfaktan","Hipotermia","Hipoksia","Apneu of prematurity"],"answer":1,"topic":"Neonatologi","explanation":"Bayi prematur 34 minggu dengan BBL 1200g (BBLSR), sesak sejak lahir dengan retraksi dan Downes Score 5 menunjukkan RDS akibat kekurangan surfaktan paru."},{"id":"m2_16","q":"Anak berusia 4 tahun bengkak sejak 5 hari. Bengkak di wajah dan mata, pagi hari menghilang sore hari. Proteinuri +4, ureum 20, creatinin 0,6. Kemungkinan diagnosis:","options":["Sindrom Nefrotik","Infeksi saluran kemih","Gagal ginjal kronis","Glomerulonefritis akut","Gagal ginjal akut"],"answer":0,"topic":"Nefrologi","explanation":"Sindrom nefrotik ditandai: edema (terutama periorbital, lebih jelas pagi hari), proteinuria masif (+4), fungsi ginjal masih normal (ureum/kreatinin normal)."},{"id":"m2_17","q":"Anak perempuan 7 tahun, kuning pada mata dan kulit, demam, mual, muntah, kencing seperti teh. Pembesaran hati. HBsAg (+), Anti HBs (-), Anti HBc (+), IgM Anti HBc (-). Kesimpulan serologi:","options":["Rentan terhadap infeksi Hepatitis B","Mengidap Hepatitis B Khronis","Mengidap Hepatitis B Akut","Immun dari Hepatitis B karena infeksi terdahulu","Immun dari Hepatitis B karena imunisasi"],"answer":1,"topic":"Hepatologi","explanation":"HBsAg (+), Anti-HBs (-), Anti-HBc (+), IgM Anti-HBc (-) menunjukkan hepatitis B kronik. IgM Anti-HBc negatif menyingkirkan infeksi akut."},{"id":"m2_18","q":"Bayi cukup bulan, usia 8 jam mengalami muntah hijau. Tidak sesak, tidak sianosis, tanda vital normal. Abdomen supel, bising usus normal. Pemeriksaan radiologis yang perlu dilakukan:","options":["Foto polos abdomen","Foto toraks AP","Foto leher","Foto toraks AP dan lateral","Tidak memerlukan pemeriksaan penunjang"],"answer":0,"topic":"Gastroenterologi","explanation":"Muntah hijau (bilious vomiting) pada neonatus merupakan tanda obstruksi intestinal sampai terbukti sebaliknya. Foto polos abdomen merupakan pemeriksaan awal untuk evaluasi pola gas usus."},{"id":"m2_19","q":"Anak prepubertas dengan perawakan pendek dan umur tulang terlambat, ada riwayat pubertas terlambat dalam keluarga, laju pertumbuhan linear normal. Kemungkinan diagnosis:","options":["Perawakan pendek familial","Constitutional delay of growth and puberty","Kekurangan hormon pertumbuhan","Pubertas terlambat","Dysplasia tulang"],"answer":1,"topic":"Endokrinologi","explanation":"Constitutional delay of growth and puberty (CDGP): perawakan pendek, bone age terlambat, riwayat pubertas terlambat dalam keluarga, laju pertumbuhan normal. Prognosis baik - akan mencapai tinggi dewasa normal."},{"id":"m3_1","q":"Anak laki-laki 4 tahun, lemas setelah digigit serangga. 5 menit kemudian sesak, napas berbunyi, wajah sembab. Akral dingin, nadi cepat tegangan kurang. Tindakan pertama:","options":["Pasang oksigen, hisap lendir, nebulisasi bronkodilator","Berikan infus RL tetesan cepat","Posisikan, panggil bantuan, resusitasi jantung pulmonal","Kirim ke RS Rujukan","Posisikan, pasang oksigen, injeksi Adrenalin 1:1000 IM"],"answer":4,"topic":"Kegawatdaruratan","explanation":"Pada anafilaksis, langkah pertama: posisikan pasien, amankan jalan napas, dan injeksi adrenalin 1:1000 IM segera. Adrenalin adalah drug of choice anafilaksis."},{"id":"m3_2","q":"Bayi usia 2 hari, tidak mau minum dan letargi. Lahir tidak segera menangis, air ketuban keruh dan bau. Ibu demam tinggi 24 jam sebelum persalinan, keputihan selama hamil. Kemungkinan diagnosis:","options":["Asfiksia neonatorum","Tetanus neonatorum","Kern Ikterus","Sepsis neonatorum","Aspirasi Mekonium"],"answer":3,"topic":"Neonatologi","explanation":"Faktor risiko sepsis neonatorum: ketuban keruh berbau, ibu demam sebelum persalinan, keputihan/infeksi selama hamil. Gejala: malas minum dan letargi merupakan tanda sepsis."},{"id":"m3_3","q":"Antibodi yang pertama muncul setelah pemberian imunisasi biasanya adalah:","options":["Ig A","Ig G","Ig M","Neutralizing antibodies"],"answer":2,"topic":"Imunologi","explanation":"IgM merupakan antibodi pertama yang diproduksi (primary immune response) setelah paparan antigen/imunisasi. IgG muncul kemudian dan bertahan lebih lama."},{"id":"m3_4","q":"Anak perempuan 3 tahun, pucat sejak 1 bulan, rewel, nafsu makan berkurang. Anemia, atrofi papila lidah, tidak ada hepatosplenomegali. Hb 7,2 g/dL, MCV dan MCH rendah. Tata laksana yang paling tepat:","options":["Transfusi darah dan preparat besi sampai Hb normal","Transfusi darah dan preparat besi sampai 2 bulan setelah Hb normal","Preparat besi sampai Hb normal dan eliminasi penyebab","Preparat besi sampai 2 bulan setelah Hb normal dan eliminasi penyebab","Transfusi darah dan eliminasi penyebab"],"answer":3,"topic":"Hematologi","explanation":"Anemia defisiensi besi: terapi besi diberikan sampai 2 bulan SETELAH Hb normal untuk mengisi cadangan besi tubuh, disertai eliminasi faktor penyebab (diet, infeksi cacing, dll)."},{"id":"m3_5","q":"Anak laki-laki 3 tahun, epistaksis sejak 1 hari, petekie dan purpura di lengan dan tungkai. 2 minggu lalu batuk pilek. Hb 7,8 g/dL, trombosit 15.000/mm³. Diagnosis paling mungkin:","options":["Hemofilia A","Hemofilia B","Von Willebrand's disease","Immune Thrombocytopenic Purpura","Thrombocytopathy"],"answer":3,"topic":"Hematologi","explanation":"ITP ditandai: trombositopenia berat (<20.000), petekie/purpura, sering didahului infeksi virus 1-4 minggu sebelumnya, tidak ada hepatosplenomegali atau limfadenopati."},{"id":"m3_6","q":"Anak laki-laki 1,5 tahun tanpa riwayat imunisasi, sesak dan bengkak kedua tungkai bawah. Rontgen toraks: kardiomegali dengan infiltrat bilateral. 15 hari lalu demam, bengkak leher, kejang. Penyebab gangguan kardiovaskular:","options":["Difteria","Abses peritonsilar","Abses perimadibular","Croup","Ensefalitis"],"answer":0,"topic":"Kardiologi","explanation":"Difteria dapat menyebabkan miokarditis yang menimbulkan gagal jantung (kardiomegali, edema). Riwayat: bengkak leher (bull neck), kejang, tidak imunisasi mendukung diagnosis difteria."},{"id":"m3_7","q":"Anak laki-laki 8 tahun, nyeri dan bengkak sendi berpindah-pindah sejak 5 hari, demam 8 hari. Pansistolik murmur gr 3/6 menjalar ke aksila. Kardiomegali. ASTO 700 IU. Tata laksana berikut KECUALI:","options":["Benzatin penisilin G 600.000 IU IM","Aspirin 100 mg/kgBB/hari","Furosemid 1-2 mg/kgBB","Memerlukan bed rest 2-6 minggu","Prednison 1-2 mg/kgBB/hari"],"answer":2,"topic":"Kardiologi","explanation":"Pada demam rematik akut dengan karditis, diberikan: antibiotik (Benzatin penisilin), antiinflamasi (Prednison karena ada karditis), bed rest."},{"id":"m3_8","q":"Bayi 1 hari semakin kuning sejak 3 jam. Apusan darah tepi: fragmentosis, anisositosis, sel target, poikilositosis. Golongan darah ibu O, anak B. Coomb test (+). Rencana penatalaksanaan:","options":["Lebih sering diberi ASI","Lebih sering diberi susu formula","Fototerapi","Dijemur di bawah sinar matahari pagi"],"answer":2,"topic":"Neonatologi","explanation":"Ikterus patologis pada hari pertama akibat inkompatibilitas ABO (ibu O, anak B), Coomb test (+) memerlukan fototerapi segera untuk mencegah kern ikterus."},{"id":"m3_9","q":"Bayi 6 bulan, sesak napas 1 hari, didahului demam, batuk, pilek 3 hari. Napas 60x/menit, suhu 39,1°C, retraksi dinding dada. Auskultasi: crackles dan mengi. Leukosit 7000, hitung jenis 0/1/2/56/36/5. Etiologi paling sering:","options":["Respiratory syncytial virus","Coronavirus","H. Influenzae","Staphilococcus aureus","Streptococcus pneumoniae"],"answer":0,"topic":"Respirologi","explanation":"Bronkiolitis pada bayi paling sering disebabkan oleh RSV (Respiratory Syncytial Virus). Gambaran: wheezing + crackles pada bayi <1 tahun didahului ISPA."},{"id":"m3_10","q":"Anak perempuan 15 bulan, stridor dan sesak napas. Sekret hidung berkrusta 2 hari, subfebris. Terbangun malam hari. Suhu 37,8°C, napas 55x/menit, nadi 150x/menit. Stridor dengan batuk menggonggong. SpO2 95%. Diagnosis paling mendekati:","options":["Abses retropharyngeal","Aspirasi benda asing","Anafilaksis","Croup","Abses peritonsillar"],"answer":3,"topic":"Respirologi","explanation":"Croup (laringotrakeobronkitis) ditandai: stridor inspirasi, batuk menggonggong (barking cough), didahului ISPA, onset akut malam hari pada anak 6 bulan - 3 tahun."},{"id":"m3_11","q":"Anak perempuan 5 tahun, benjolan perut kiri atas, lesu, mata kuning, tidak mau makan, tampak lebih hitam dan kecil dari teman seusia. Anamnesis yang diperlukan:","options":["Saudara lelaki ayah dengan gejala sama","Riwayat hepatitis","Riwayat keluarga lain yang juga tampak pucat","Riwayat transfusi darah putih sebelumnya","Sering infeksi berulang"],"answer":2,"topic":"Hematologi","explanation":"Gejala mengarah ke talasemia: splenomegali, ikterik, tampak kecil dan gelap. Riwayat keluarga yang juga pucat penting karena talasemia merupakan penyakit herediter autosomal resesif."},{"id":"m3_12","q":"Anak laki-laki 9 tahun, bengkak pada kelopak mata sejak 4 hari. TD 160/100, edema palpebra dan ekstremitas. Protein (++), eritrosit 30-40/LPB. Hb 10,5 g/dL, ureum 70, kreatinin 1,6. Albumin 3,8 g/dL. Diagnosis kerja:","options":["Sindrom nefrotik","Glomerulonefritis akut","Infeksi saluran kemih","Sindrom hemolitik uremik","Gagal ginjal terminal"],"answer":1,"topic":"Nefrologi","explanation":"GNAPS ditandai: hipertensi, edema, hematuria (eritrosit >>), proteinuria tidak masif, albumin relatif normal, fungsi ginjal terganggu ringan. Berbeda dengan SN yang proteinuria masif dan albumin sangat rendah."},{"id":"m3_13","q":"Anak usia 2 tahun belum bisa bicara. BB, TB, lingkar kepala antara mean dan -2SD. Bisa berjalan usia 12 bulan. Baru bisa mama dan papa. Menggunakan bahasa isyarat. Pemeriksaan penunjang yang direncanakan:","options":["Test pendengaran","Test intelegensia","Pemeriksaan hormon tiroid","Pemeriksaan darah lengkap","CT Scan Otak"],"answer":0,"topic":"Tumbuh Kembang","explanation":"Keterlambatan bicara (speech delay) dengan perkembangan motorik dan kognitif normal harus dicurigai gangguan pendengaran. Pemeriksaan pendengaran (OAE/BERA) adalah prioritas pertama."},{"id":"m3_14","q":"Bayi lahir cukup bulan, BBL 4200 gram, SCTP karena CPD. Ketuban jernih, langsung menangis. 15 menit setelah lahir napas 80x/menit, merintih, retraksi interkostal. Rontgen: cairan di fissura paru dan prominent pulmonary vascular marking. Diagnosis:","options":["Hernia diafragmatika","Sindroma Aspirasi mekoneum","Pneumonia","Transient tachypnea of the newborn","Penyakit membran hialin"],"answer":3,"topic":"Neonatologi","explanation":"TTN (Transient Tachypnea of the Newborn): bayi cukup bulan lahir SCTP, takipnea onset cepat, gambaran rontgen cairan di fisura dan peningkatan corakan vaskuler paru akibat keterlambatan absorpsi cairan paru."},{"id":"m3_15","q":"Bayi cukup bulan, usia 8 jam muntah hijau. Abdomen supel, hemodinamik stabil. Kemungkinan diagnosis:","options":["Refluks gastroesofageal","Atresia duodenum","Sepsis","Hipertrofi pilorus stenosis","Atresia esofagus"],"answer":1,"topic":"Gastroenterologi","explanation":"Muntah hijau (bilious) pada neonatus merupakan tanda obstruksi intestinal, paling sering atresia duodenum. Gambaran double bubble pada foto abdomen khas untuk atresia duodenum."},{"id":"m3_16","q":"Kontrol bayi baru lahir 2 minggu dengan kolik. Ibu bertanya tentang susu kambing. ASI tidak keluar lagi. Pertimbangan utama tidak menganjurkan susu kambing:","options":["Kalori tidak mencukupi","Folat tidak mencukupi","Whey tidak mencukupi","Casein tidak mencukupi","Lemak tidak mencukupi"],"answer":1,"topic":"Nutrisi","explanation":"Susu kambing mengandung folat yang sangat rendah sehingga dapat menyebabkan anemia megaloblastik pada bayi yang mendapatkannya sebagai satu-satunya sumber nutrisi."},{"id":"m3_17","q":"Anak 10 tahun bintang sepakbola, sakit tenggorokan 2 minggu lalu. Beberapa anak didiagnosis demam rematik. Kriteria diagnostik demam rematik yang paling sering ditemukan:","options":["Karditis","Atralgia","Eritema marginatum","Chorea","Nodul subkutan"],"answer":0,"topic":"Kardiologi","explanation":"Karditis merupakan manifestasi mayor demam rematik yang paling sering ditemukan, terutama pada anak. Dapat berupa valvulitis, miokarditis, atau perikarditis."},{"id":"m3_18","q":"Anak usia 8 tahun terlambat imunisasi DTP. Pada pemeriksaan fisik: bunyi jantung I keras, bunyi jantung II split dan menetap di regio sternal kiri atas. Tidak berubah dengan perubahan posisi. Anda menduga:","options":["ASD","VSD","Regurgitasi trikuspid","Tetralogi Fallot","Prolaps katup mitral"],"answer":0,"topic":"Kardiologi","explanation":"ASD (Atrial Septal Defect) ditandai: wide fixed splitting bunyi jantung II ya
