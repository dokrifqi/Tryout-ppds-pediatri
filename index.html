<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tryout PPDS (Optimized)</title>
</head>
<body>
<h2>Tryout PPDS - Versi Ringan</h2>
<button onclick="startQuiz(50)">Mulai 50 Soal</button>

<script>
async function loadBatch(n){
  const res = await fetch(`batch${n}.json`)
  return await res.json()
}

function getBatch(jumlah){
  return Math.ceil(jumlah / 50)
}

async function startQuiz(jumlah){
  const batch = getBatch(jumlah)
  const soal = await loadBatch(batch)
  console.log("Loaded:", soal.length)
  alert("Soal berhasil dimuat: " + soal.length)
}
</script>
</body>
</html>
